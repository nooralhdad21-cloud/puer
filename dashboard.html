<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مطابقة بيور - الإصدار الاحترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .bill-card { display: flex; flex-direction: column; padding: 15px; background: white; border-radius: 18px; border: 1px solid #e2e8f0; margin-bottom: 10px; transition: 0.3s ease; }
        .is-active { border-right: 8px solid #10b981; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .not-active { border-right: 8px solid #ef4444; background-color: #fff1f2; opacity: 0.7; }
        .note-input { width: 100%; margin-top: 10px; border: 1px dashed #cbd5e1; border-radius: 12px; padding: 8px 15px; font-size: 11px; outline: none; background: #fcfcfc; }
        .note-input:focus { border-color: #6366f1; background: white; }
        #toggleArrow { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .rotate-180 { transform: rotate(180deg); }
        @media print { .no-print { display: none !important; } #billsList { display: block !important; } .report-container { border: none !important; box-shadow: none !important; width: 100%; padding: 0; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="no-print bg-slate-900 text-white p-8 rounded-[2.5rem] mb-8 shadow-2xl">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                <div><label class="block text-[10px] mb-2 text-slate-400 font-black uppercase tracking-widest">المحاسب المسؤول</label>
                    <input type="text" id="myNameInput" oninput="sync()" class="w-full bg-slate-800 border-none rounded-xl p-3 text-xs"></div>
                <div><label class="block text-[10px] mb-2 text-indigo-400 font-black uppercase tracking-widest">المحافظة</label>
                    <select id="provInput" onchange="updateCities(); sync();" class="w-full bg-slate-800 border-none rounded-xl p-3 text-xs font-bold"></select></div>
                <div><label class="block text-[10px] mb-2 text-indigo-400 font-black uppercase tracking-widest">القضاء / الناحية</label>
                    <select id="cityInput" onchange="sync()" class="w-full bg-slate-800 border-none rounded-xl p-3 text-xs font-bold"></select></div>
                <div><label class="block text-[10px] mb-2 text-emerald-400 font-black uppercase tracking-widest">خصم المطابقة الحالية %</label>
                    <select id="currDiscPerc" onchange="calculate()" class="w-full bg-slate-800 border-none rounded-xl p-3 text-xs font-bold text-emerald-400"></select></div>
            </div>
            <div class="flex gap-4">
                <button onclick="document.getElementById('pdfFile').click()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 p-4 rounded-2xl text-xs font-black transition-all shadow-lg">رفع كشف PDF</button>
                <button onclick="window.print()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 p-4 rounded-2xl text-xs font-black transition-all shadow-lg">طباعة التقرير</button>
            </div>
            <input type="file" id="pdfFile" class="hidden" accept=".pdf">
        </header>

        <div class="bg-white p-10 md:p-16 rounded-[3.5rem] report-container min-h-[1100px] flex flex-col shadow-sm border border-slate-200">
            <div class="flex justify-between items-start border-b-4 border-slate-900 pb-10 mb-10">
                <div>
                    <h1 class="text-5xl font-black text-slate-900 tracking-tighter">مكتب بيور العلمي</h1>
                    <p class="text-[11px] font-black text-slate-400 uppercase italic mt-1">Pure Scientific Bureau / Financial Audit</p>
                </div>
                <div class="text-left text-[11px] font-bold space-y-1">
                    <p>الموقع: <span id="outLoc" class="text-indigo-600 font-black italic">..</span></p>
                    <p>التاريخ: <span id="outDate" class="font-mono">..</span></p>
                </div>
            </div>

            <div class="mb-10 p-10 bg-slate-900 rounded-[3rem] text-white flex justify-between items-center shadow-xl">
                <div class="flex-1">
                    <p class="text-[10px] font-black text-indigo-400 mb-2 italic uppercase tracking-widest">اسم العميل / الصيدلية / المذخر</p>
                    <input type="text" id="outClient" placeholder="اسم العميل..." class="text-4xl font-black bg-transparent border-none outline-none w-full text-white placeholder-slate-700">
                </div>
                <div class="text-left border-r-2 border-slate-700 pl-4 pr-10">
                    <p class="text-[10px] font-black text-slate-500 mb-1 italic">Sub-Total:</p>
                    <p id="outFullOrig" class="text-2xl font-black text-slate-300 font-mono italic">0.00 IQD</p>
                </div>
            </div>

            <div class="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 mb-10 shadow-inner">
                <p id="officialMsg" class="text-sm font-black text-slate-800 text-center italic font-bold">يرجى رفع الملف لبدء المطابقة...</p>
                <div id="notesSummary" class="mt-6 space-y-2 border-t border-slate-200 pt-6"></div>
            </div>

            <div class="flex justify-between items-center mb-6 no-print">
                <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest italic">تفاصيل الفواتير المشمولة</h3>
                <button onclick="toggleBills()" class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 px-5 py-2 rounded-full transition-all">
                    <span id="btnText" class="text-[10px] font-black text-slate-600">إخفاء القائمة</span>
                    <svg id="toggleArrow" class="w-4 h-4 text-slate-600 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
            </div>

            <div id="billsList" class="space-y-4 mb-12"></div>

            <div class="border-t-4 border-slate-900 pt-12 mt-auto">
                <div class="flex justify-between items-end gap-10">
                    <div class="flex-1">
                        <p class="text-[11px] font-black text-slate-400 mb-2 italic uppercase tracking-widest">Total Amount / المجموع الكلي للفواتير:</p>
                        <p id="resTotalDisplay" class="text-6xl font-black text-slate-900 tracking-tighter italic font-mono mb-8">0.00 IQD</p>
                        
                        <div class="bg-indigo-600 p-6 rounded-[2rem] inline-block shadow-lg border-b-8 border-indigo-900">
                            <p class="text-[10px] font-black text-indigo-200 mb-1 italic uppercase tracking-widest">Final Net / الصافي النهائي المطلوب دفعه:</p>
                            <p id="resFinal" class="text-5xl font-black text-white tracking-tighter italic font-mono">0.00 IQD</p>
                        </div>
                        <div class="mt-8">
                            <p id="tafgeet" class="text-[13px] font-black text-indigo-700 bg-indigo-50 px-8 py-4 rounded-2xl border-2 border-indigo-100 inline-block italic shadow-sm"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        const iraqGeo = {"بغداد": ["الرصافة", "الكرخ"], "صلاح الدين": ["تكريت", "الشرقاط", "سامراء"]};

        function initApp() {
            const pSel = document.getElementById('provInput');
            pSel.innerHTML = '<option value="">المحافظة</option>';
            Object.keys(iraqGeo).sort().forEach(p => pSel.innerHTML += `<option value="${p}">${p}</option>`);
            for(let i=0; i<=15; i++) document.getElementById('currDiscPerc').innerHTML += `<option value="${i}">${i}%</option>`;
            document.getElementById('outDate').innerText = new Date().toLocaleDateString('en-GB');
            updateCities();
        }

        function updateCities() {
            const p = document.getElementById('provInput').value;
            const cSel = document.getElementById('cityInput');
            cSel.innerHTML = '<option value="">القضاء</option>';
            if(p && iraqGeo[p]) iraqGeo[p].forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
        }

        function sync() {
            document.getElementById('outLoc').innerText = (document.getElementById('provInput').value || '..') + " / " + (document.getElementById('cityInput').value || '..');
            calculate();
        }

        document.getElementById('pdfFile').onchange = async (e) => {
            const file = e.target.files[0]; if (!file) return;
            db = [];
            const pdfJS = window['pdfjs-dist/build/pdf'];
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const pdf = await pdfJS.getDocument({data: await file.arrayBuffer()}).promise;
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const text = await page.getTextContent();
                const items = text.items;
                const client = items.map(it => it.str).find(t => t.includes("مذخر")) || "";
                if(client) document.getElementById('outClient').value = client;

                items.forEach(item => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.str)) {
                        let row = items.filter(it => Math.abs(it.transform[5] - item.transform[5]) < 5).sort((a,b) => b.transform[4] - a.transform[4]);
                        const nums = row.filter(r => /[\d,]+\.\d{2}/.test(r.str));
                        if (nums.length >= 2) {
                            let id = row.find(ri => /^\d{5,7}$/.test(ri.str))?.str || "000";
                            db.push({ id, date: item.str, total: nums[0].str, remain: nums[nums.length-1].str, status: 'ok', note: '' });
                        }
                    }
                });
            }
            renderList();
        };

        function renderList() {
            const list = document.getElementById('billsList');
            list.innerHTML = "";
            db.forEach((b, i) => {
                list.innerHTML += `
                    <div class="bill-card ${b.status === 'ok' ? 'is-active' : 'not-active'}">
                        <div class="flex justify-between items-center italic">
                            <div onclick="toggleStatus(${i})" class="flex-1 cursor-pointer">
                                <span class="font-black text-slate-900 text-xl font-mono">${b.remain} IQD</span>
                                <div class="text-[9px] font-bold text-slate-400 mt-1 italic uppercase">Original Total: ${b.total}</div>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="text-right border-r-2 border-slate-100 pr-4">
                                    <span class="text-xs font-black text-slate-800 italic">#${b.id}</span>
                                    <span class="block text-[9px] font-bold text-slate-400 font-mono italic">${b.date}</span>
                                </div>
                                <div class="no-print cursor-pointer hover:scale-110 transition-all p-1" onclick="showNoteField(${i})">📝</div>
                            </div>
                        </div>
                        <input type="text" id="note-${i}" class="note-input no-print ${b.note ? '' : 'hidden'}" placeholder="اكتب ملاحظة هنا..." value="${b.note}" oninput="updateNoteData(${i}, this.value)">
                    </div>`;
            });
            calculate();
        }

        // تحديث الملاحظات والمجاميع دون إعادة مسح القائمة (يمنع قفز المؤشر)
        function updateNoteData(i, val) { 
            db[i].note = val; 
            const notesSum = document.getElementById('notesSummary');
            notesSum.innerHTML = "";
            db.forEach(b => { 
                if(b.note.trim()) notesSum.innerHTML += `<p class="text-[11px] text-indigo-700 font-bold bg-white p-3 rounded-xl border border-indigo-100 italic shadow-sm">• فاتورة #${b.id}: ${b.note}</p>`;
            });
            calculate(); 
        }

        function calculate() {
            let sumRem = 0; let excluded = [];
            db.forEach(b => {
                const valRem = parseFloat(b.remain.replace(/,/g,'')) || 0;
                if (b.status === 'ok') sumRem += valRem; else excluded.push(b.id);
            });

            const msgBox = document.getElementById('officialMsg');
            msgBox.innerHTML = excluded.length 
                ? `تمت المطابقة بنجاح <span class="text-red-600 underline font-black italic">باستثناء الفواتير (#${excluded.join(', #')})</span>.` 
                : "نود إعلامكم بأنه تمت مطابقة الحسابات بنجاح تـام.";
            
            const disc = parseFloat(document.getElementById('currDiscPerc').value) || 0;
            const final = sumRem - (sumRem * (disc / 100));
            
            document.getElementById('outFullOrig').innerText = sumRem.toLocaleString(undefined, {minimumFractionDigits:2}) + " IQD";
            document.getElementById('resTotalDisplay').innerText = sumRem.toLocaleString(undefined, {minimumFractionDigits:2}) + " IQD";
            document.getElementById('resFinal').innerText = final.toLocaleString(undefined, {minimumFractionDigits:2}) + " IQD";
            document.getElementById('tafgeet').innerText = "فقط " + final.toLocaleString('ar-IQ', {minimumFractionDigits:2}) + " دينار عراقي لا غير";
        }

        function toggleStatus(i) { db[i].status = (db[i].status === 'ok' ? 'none' : 'ok'); renderList(); }
        function showNoteField(i) { document.getElementById(`note-${i}`).classList.toggle('hidden'); }

        // وظيفة سهم الإخفاء (Toggle)
        function toggleBills() {
            const list = document.getElementById('billsList');
            const arrow = document.getElementById('toggleArrow');
            const btnText = document.getElementById('btnText');
            
            if (list.classList.contains('hidden')) {
                list.classList.remove('hidden');
                arrow.classList.remove('rotate-180');
                btnText.innerText = "إخفاء القائمة";
            } else {
                list.classList.add('hidden');
                arrow.classList.add('rotate-180');
                btnText.innerText = "إظهار القائمة";
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
