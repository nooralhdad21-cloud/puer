<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURE AI - Ultra Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; font-family: 'Cairo', sans-serif; color: #f8fafc; }
        .glass-morphism { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .client-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .client-card:hover { transform: translateY(-5px); background: rgba(51, 65, 85, 0.8); }
        .invoice-panel { max-height: 0; overflow: hidden; transition: max-height 0.6s ease; }
        .invoice-panel.open { max-height: 3000px; }
        .neon-border { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .custom-check { width: 30px; height: 30px; border: 2px solid #475569; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .custom-check.active { background: #10b981; border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .custom-check.active::after { content: "✓"; color: white; font-weight: 900; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="pb-10">

    <nav class="sticky top-0 z-50 glass-morphism p-4 mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl neon-border">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h1 class="text-xl font-black tracking-widest italic">PURE<span class="text-blue-500 underline">ULTRA</span></h1>
            </div>
            <button id="exportPdf" onclick="generateReport()" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-full text-xs font-black shadow-lg transition-all">تصدير تقرير المطابقة</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-2xl">

        <div id="uploadArea" class="bg-slate-800/50 p-10 rounded-[3rem] border-2 border-dashed border-slate-700 text-center mb-10">
            <h2 class="text-2xl font-black mb-4">نظام الذكاء الميداني</h2>
            <p class="text-slate-400 text-sm mb-8">ارفع كشف "مكتب بيور" لتحويله إلى واجهة تفاعلية</p>
            <label class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-10 py-5 rounded-3xl font-black shadow-xl inline-block transition-all active:scale-95">
                إختر ملف الـ PDF
                <input type="file" id="fileIn" accept=".pdf" class="hidden">
            </label>
        </div>

        <div id="liveDash" class="hidden mb-10">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-morphism p-6 rounded-[2rem] border-l-4 border-blue-500">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">نسبة الإنجاز</p>
                    <h3 id="livePercent" class="text-4xl font-black text-blue-400 italic">0%</h3>
                </div>
                <div class="glass-morphism p-6 rounded-[2rem] border-l-4 border-emerald-500">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">المبلغ المطابق</p>
                    <h3 id="liveMatchAmount" class="text-2xl font-black text-emerald-400">0</h3>
                </div>
            </div>
        </div>

        <div id="searchArea" class="hidden mb-8">
            <input type="text" id="searchInput" onkeyup="renderData()" placeholder="ابحث عن صيدلية، مذخر، أو رقم فاتورة..." class="w-full p-5 bg-slate-800 rounded-[2rem] border-none outline-none text-white font-bold shadow-inner focus:ring-2 focus:ring-blue-600 transition-all">
        </div>

        <div id="mainContainer" class="space-y-6"></div>

    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        let masterData = [];
        let filteredClients = {};

        document.getElementById('fileIn').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let fullContent = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullContent = fullContent.concat(content.items.map(s => s.str));
                }
                processSmartPDF(fullContent);
            };
            reader.readAsArrayBuffer(file);
        });

        function processSmartPDF(lines) {
            masterData = [];
            let currentEntity = { name: "غير معروف", id: "---" };
            
            for (let i = 0; i < lines.length; i++) {
                let text = lines[i].trim();

                // التقاط اسم الجهة والتفاصيل الأساسية (الاسم، العنوان، رقم الموبايل)
                if (text.includes("الاسم") || text.includes("صيدلية") || text.includes("مذخر") || text.includes("مكتب")) {
                    currentEntity.name = text.replace(/الاسم:|ѧ/g, '').trim();
                }

                // التقاط الفواتير وشروطها (رقم، تاريخ، قيمة، مدفوع، متبقي)
                if (/^\d{6}$/.test(text)) {
                    let invoice = {
                        clientName: currentEntity.name,
                        invId: text,
                        date: lines[i+1] || "---",
                        totalVal: "0.00",
                        paidVal: "0.00",
                        remainVal: "0.00",
                        checked: false
                    };

                    // البحث الذكي عن القيم المالية في الأسطر المحيطة
                    let financialValues = [];
                    for (let j = 1; j < 20; j++) {
                        let check = (lines[i+j] || "").trim();
                        if (/^[\d,]+\.\d{2}$/.test(check)) {
                            financialValues.push(check);
                        }
                    }

                    // ترتيب القيم (عادة في كشف بيور: القيمة الأصلية ثم المدفوع ثم المتبقي)
                    if (financialValues.length >= 3) {
                        invoice.totalVal = financialValues[0];
                        invoice.paidVal = financialValues[1];
                        invoice.remainVal = financialValues[2];
                    }
