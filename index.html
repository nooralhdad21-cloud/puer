<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pro - نظام المطابقة الدقيق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none; }
        .tab-active { border-bottom: 4px solid #1e3a8a; color: #1e3a8a; font-weight: 900; background: #eff6ff; }
        input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 35px; height: 35px; border: 3px solid #cbd5e1; border-radius: 12px; cursor: pointer; position: relative; transition: all 0.3s; background: white; }
        input[type="checkbox"]:checked { background-color: #10b981; border-color: #10b981; }
        input[type="checkbox"]:checked::after { content: "✓"; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-black italic">PURE <span class="text-blue-400">PRO</span></h1>
            <div id="userBadge" class="hidden bg-blue-800 px-3 py-1 rounded-full text-[10px] border border-blue-400"></div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-xl">
        
        <div id="statsBoard" class="hidden grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-blue-600 text-center">
                <p class="text-gray-400 text-[10px] font-bold mb-1">عدد الفواتير</p>
                <span id="tCount" class="text-2xl font-black text-slate-800">0</span>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-red-500 text-center">
                <p class="text-gray-400 text-[10px] font-bold mb-1">غير مطابقة</p>
                <span id="uCount" class="text-2xl font-black text-red-600">0</span>
            </div>
        </div>

        <div id="loginStep" class="bg-white p-10 rounded-[2.5rem] shadow-xl mt-10 text-center border">
            <h2 class="text-xl font-black mb-6 text-slate-800">سجل الدخول للمطابقة</h2>
            <input type="text" id="userName" placeholder="اسم المندوب" class="w-full p-4 bg-slate-50 border-2 rounded-2xl mb-4 text-center focus:border-blue-600 outline-none font-bold">
            <button onclick="initSystem()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">فتح النظام</button>
        </div>

        <div id="uploadStep" class="hidden mt-10 text-center">
            <div class="bg-white p-12 rounded-[2.5rem] border-4 border-dashed border-blue-100 shadow-inner">
                <p class="font-bold text-blue-900 mb-6">ارفع ملف كشف الشرقاط (PDF)</p>
                <input type="file" id="pdfFile" accept=".pdf" class="hidden">
                <label for="pdfFile" class="bg-blue-600 text-white px-10 py-4 rounded-2xl cursor-pointer font-black shadow-lg inline-block">اختر الملف الآن</label>
            </div>
        </div>

        <div id="mainContent" class="hidden">
            <div class="flex bg-white rounded-2xl shadow-sm mb-4 overflow-hidden border">
                <button id="pharmacyTab" onclick="switchTab('pharmacy')" class="flex-1 py-4 text-xs font-bold tab-active transition-all">💊 صيدليات</button>
                <button id="storeTab" onclick="switchTab('store')" class="flex-1 py-4 text-xs font-bold text-gray-400 transition-all">🏢 مذاخر</button>
            </div>
            <div id="listStep" class="space-y-4 pb-20"></div>
        </div>

    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let dataStore = [];
        let currentTab = 'pharmacy';

        function initSystem() {
            const name = document.getElementById('userName').value;
            if (name.length < 3) return alert("يرجى كتابة الاسم");
            document.getElementById('userBadge').innerText = "المندوب: " + name;
            document.getElementById('userBadge').classList.remove('hidden');
            document.getElementById('loginStep').classList.add('hidden');
            document.getElementById('uploadStep').classList.remove('hidden');
        }

        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let textLines = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    // تجميع النصوص مع الحفاظ على ترتيب الأسطر لضمان دقة القراءة
                    textLines = textLines.concat(content.items.map(item => item.str));
                }
                processPDF(textLines);
            };
            reader.readAsArrayBuffer(file);
        });
