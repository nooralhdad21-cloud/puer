<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE SYNC | النسخة الذهبية البرو 🇮🇶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; font-family: 'Cairo', sans-serif; color: #f8fafc; }
        .gold-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #475569; border-right: 4px solid #f59e0b; transition: 0.3s; }
        .gold-text { color: #f59e0b; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; }
        .drawer.open { max-height: 5000px; padding: 1rem; background: rgba(30, 41, 59, 0.5); }
        .num-font { font-family: 'Inter', sans-serif; }
        .btn-gold { background: linear-gradient(to right, #f59e0b, #d97706); color: white; font-weight: 900; }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto mb-10 text-center">
        <div class="inline-block p-3 bg-amber-500/10 rounded-3xl mb-4 border border-amber-500/20">
            <span class="gold-text font-black tracking-widest uppercase text-xs italic">The Golden Iraqi Edition PRO</span>
        </div>
        <h1 class="text-3xl md:text-5xl font-black mb-2">منصة <span class="gold-text">الشرقاط</span> للتدقيق 🇮🇶</h1>
        <p class="text-slate-400 font-medium">الإصدار المطور لمعالجة كشوفات أصيل وبيور العلمي</p>
    </header>

    <main class="max-w-4xl mx-auto">
        <div id="uploadBox" class="gold-card p-12 text-center rounded-[2rem] border-dashed border-2 border-amber-500/30 mb-8">
            <div class="text-6xl mb-6">📂</div>
            <h2 class="text-xl font-bold mb-6 italic">ارفع كشف الحساب (PDF) لبدء المعالجة الذهبية</h2>
            <label class="btn-gold px-12 py-5 rounded-2xl cursor-pointer inline-block shadow-2xl transition-all">
                اختر الملف الآن
                <input type="file" id="pdfInput" accept=".pdf" class="hidden">
            </label>
        </div>

        <div id="dashboard" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="gold-card p-6 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">إجمالي الصيدليات</p>
                    <h3 id="shopCount" class="text-3xl font-black gold-text num-font">0</h3>
                </div>
                <div class="gold-card p-6 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">المطابقة المختارة</p>
                    <h3 id="selectedSum" class="text-2xl font-black text-emerald-400 num-font">0</h3>
                </div>
                <div class="gold-card p-6 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">الدين الكلي بالكشف</p>
                    <h3 id="totalDebt" class="text-2xl font-black text-slate-200 num-font">0</h3>
                </div>
            </div>

            <input type="text" id="search" onkeyup="render()" placeholder="ابحث باسم الصيدلية أو رقم الفاتورة..." class="w-full p-5 gold-card rounded-2xl outline-none focus:border-amber-500 font-bold text-slate-200">

            <div id="mainList" class="space-y-4 pb-20"></div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let store = [];

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(this.result) }).promise;
                let pagesData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    // دمج النصوص مع الحفاظ على ترتيب الأسطر تقريباً
                    const items = content.items.map(item => ({ text: item.str, y: item.transform[5] }));
                    pagesData.push(items);
                }
                processGold(pagesData.flat());
            };
            reader.readAsArrayBuffer(file);
        });

        function processGold(data) {
            store = [];
            let currentCustomer = "غير معروف";
            
            // فرز البيانات حسب الارتفاع (Y) لضمان الترتيب الصحيح
            data.sort((a, b) => b.y - a.y);

            for (let i = 0; i < data.length; i++) {
                let line = data[i].text.trim();
                
                // تنظيف "الاسم" وتجاهل "مكتب بيور" كونه المورد وليس الزبون
                if ((line.includes("صيدلية") || line.includes("مذخر") || line.includes("مكتب")) && !line.includes("بيور العلمي")) {
                    currentCustomer = line.replace(/ѧ|:|الاسم|رقم الموبايل|عنوان/g, '').trim();
                }

                // التقاط رقم الفاتورة (نمط أصيل 6 أرقام)
                if (/^\d{5,6}$/.test(line)) {
                    let inv = {
                        shop: currentCustomer,
                        id: line,
                        date: "غير محدد",
                        rem: 0,
                        checked: false
                    };

                    // البحث عن المبلغ والتاريخ في العناصر القريبة من نفس الارتفاع Y
                    const rowItems = data.filter(item => Math.abs(item.y - data[i].y) < 10);
                    rowItems.forEach(item => {
                        if (item.text.includes('/')) inv.date = item.text.trim();
                        if (/^[\d,]+\.\d{2}$/.test(item.text.trim())) {
                            inv.rem = parseFloat(item.text.trim().replace(/,/g, ''));
                        }
                    });

                    if(inv.rem > 0) store.push(inv);
                }
            }
            document.getElementById('uploadBox').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            render();
        }

        function render() {
            const container = document.getElementById('mainList');
            container.innerHTML = "";
            const q = document.getElementById('search').value.toLowerCase();

            // تجميع حسب الصيدلية (طلب المدير)
            let groups = {};
            store.forEach(v => {
                if (v.shop.toLowerCase().includes(q) || v.id.includes(q)) {
                    if (!groups[v.shop]) groups[v.shop] = { items: [], total: 0 };
                    groups[v.shop].items.push(v);
                    groups[v.shop].total += v.rem;
                }
            });

            document.getElementById('shopCount').innerText = Object.keys(groups).length;
            let totalAll = 0;
            store.forEach(s => totalAll += s.rem);
            document.getElementById('totalDebt').innerText = totalAll.toLocaleString() + " د.ع";

            Object.keys(groups).forEach(name => {
                const g = groups[name];
                const card = document.createElement('div');
                card.className = "gold-card rounded-[1.5rem] overflow-hidden";
                card.innerHTML = `
                    <div onclick="this.nextElementSibling.classList.toggle('open')" class="p-6 flex justify-between items-center cursor-pointer hover:bg-slate-800/50">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-xl bg-amber-500/20 flex items-center justify-center font-black gold-text">${g.items.length}</div>
                            <div>
                                <h3 class="font-black text-slate-100">${name}</h3>
                                <p class="text-[10px] font-bold text-slate-500 uppercase">المجموع: ${g.total.toLocaleString()} د.ع</p>
                            </div>
                        </div>
                        <span class="gold-text text-xs">عرض التفاصيل ▼</span>
                    </div>
                    <div class="drawer border-t border-slate-700/50">
                        <div class="grid grid-cols-1 gap-3 p-2">
                            ${g.items.map(inv => `
                                <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
                                    <div>
                                        <p class="text-[10px] font-bold text-slate-500 mb-1">فاتورة رقم: <span class="text-slate-300 num-font">#${inv.id}</span> | ${inv.date}</p>
                                        <p class="text-lg font-black gold-text num-font">${inv.rem.toLocaleString()} <span class="text-[9px]">د.ع</span></p>
                                    </div>
                                    <div onclick="toggle('${inv.id}')" class="w-10 h-10 rounded-xl border-2 flex items-center justify-center cursor-pointer transition-all ${inv.checked ? 'bg-amber-500 border-amber-500 text-white' : 'border-slate-700 text-slate-700'}">
                                        ✓
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            updateSelected();
        }

        function toggle(id) {
            const item = store.find(x => x.id === id);
            item.checked = !item.checked;
            render();
        }

        function updateSelected() {
            let sum = 0;
            store.filter(x => x.checked).forEach(i => sum += i.rem);
            document.getElementById('selectedSum').innerText = sum.toLocaleString() + " د.ع";
        }
    </script>
</body>
</html>
