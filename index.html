<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مطابقة مكاتب بيور العلمي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f6f9; }
        .pure-header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .bill-card { transition: 0.3s ease; border-right: 5px solid transparent; }
        .is-confirmed { border-right-color: #10b981; background-color: #ffffff; }
        .is-ignored { opacity: 0.25; filter: grayscale(1); } /* مبلغ شفاف للفواتير المستبعدة */
        .stamp-area { border: 2px dashed #e2e8f0; border-radius: 15px; }
        @media print { 
            .no-print { display: none !important; } 
            body { background: white; }
            .print-container { box-shadow: none; border: none; width: 100%; padding: 0; }
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-4xl mx-auto">
        <header class="no-print pure-header text-white p-6 rounded-[2rem] mb-6 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[10px] text-indigo-300 font-bold">اسم المذخر / المكتب</label>
                    <input type="text" id="officeName" value="مكتب بيور العلمي" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-indigo-300 font-bold">اسم المندوب التجاري</label>
                    <input type="text" id="repName" placeholder="أدخل اسم المندوب" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-indigo-300 font-bold">المسؤول عن المطابقة (العميل)</label>
                    <input type="text" id="clientContact" placeholder="اسم الشخص السائل" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-indigo-300 font-bold">تاريخ التقرير</label>
                    <input type="date" id="repDate" class="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none">
                </div>
            </div>
            <div class="flex gap-2">
                <input type="file" id="pdfUpload" class="hidden" accept=".pdf">
                <button onclick="document.getElementById('pdfUpload').click()" class="flex-1 bg-indigo-500 p-4 rounded-2xl font-black shadow-lg">رفع كشف الحساب</button>
                <button onclick="window.print()" class="bg-green-600 px-8 rounded-2xl font-black">طباعة التقرير الرسمي</button>
            </div>
        </header>

        <div id="printableReport" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 print-container">
            <div class="flex justify-between items-center border-b-2 border-slate-900 pb-6 mb-6">
                <div>
                    <h1 id="outOfficeName" class="text-2xl font-black text-slate-900 leading-tight">مكتب بيور العلمي</h1>
                    <p class="text-xs font-bold text-slate-500">للمستلزمات الطبية والأدوية</p>
                </div>
                <div class="text-left text-sm font-bold space-y-1">
                    <p>التاريخ: <span id="outDate">--/--/----</span></p>
                    <p>المندوب: <span id="outRep" class="text-indigo-600">......</span></p>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-2xl mb-6 flex justify-between items-center border border-slate-100">
                <div>
                    <p class="text-[10px] font-black text-slate-400">اسم الصيدلية / العميل:</p>
                    <h2 id="outClientName" class="text-xl font-black text-slate-800 italic">بانتظار البيانات...</h2>
                </div>
                <div class="text-left">
                    <p class="text-[10px] font-black text-slate-400">المسؤول عن المطابقة:</p>
                    <p id="outContact" class="font-bold text-slate-700">......</p>
                </div>
            </div>

            <div class="space-y-2 mb-8" id="billsList">
                </div>

            <div id="aiSummary" class="hidden bg-indigo-50 p-6 rounded-[2rem] border-2 border-indigo-100 mb-8">
                <p id="aiMessage" class="text-center font-bold text-indigo-900 leading-relaxed">
                    </p>
            </div>

            <div class="flex justify-between items-end mt-12">
                <div class="text-sm font-bold">
                    <p class="mb-1">مجموع مبلغ المطابقة (✓):</p>
                    <p id="finalTotal" class="text-3xl font-black text-green-600">0.00 IQD</p>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="stamp-area w-32 h-24 flex items-center justify-center text-[10px] text-slate-300 font-bold">ختم المكتب الرسمي</div>
                    <p class="text-xs font-bold">توقيع المدير المالي</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let storeData = [];
        document.getElementById('repDate').valueAsDate = new Date();

        // تحديث البيانات حياً
        const sync = (id, outId) => document.getElementById(id).oninput = (e) => document.getElementById(outId).innerText = e.target.value;
        sync('officeName', 'outOfficeName');
        sync('repName', 'outRep');
        sync('clientContact', 'outContact');
        document.getElementById('repDate').onchange = (e) => document.getElementById('outDate').innerText = e.target.value;

        document.getElementById('pdfUpload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const pdfJS = window['pdfjs-dist/build/pdf'];
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const buffer = await file.arrayBuffer();
            const pdf = await pdfJS.getDocument({data: buffer}).promise;
            
            storeData = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const items = content.items.map(it => it.str.trim());
                
                let client = items.find(t => t.length > 10 && !t.includes("بيور")) || "عميل غير معروف";
                let bills = [];
                
                content.items.forEach((item, idx) => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.str)) {
                        let id = "---", price = "0.00";
                        for(let n=-6; n<=6; n++){
                            let v = content.items[idx+n]?.str || "";
                            if(/^\d{5,7}$/.test(v)) id = v;
                            if(/^(\d{1,3}(,\d{3})*(\.\d{2}))$/.test(v)) price = v;
                        }
                        bills.push({ id, date: item.str, price, status: 'none' });
                    }
                });
                if(bills.length > 0) storeData.push({ client, bills });
            }
            render();
        };

        function render() {
            const list = document.getElementById('billsList');
            list.innerHTML = "";
            let totalMatch = 0;
            let confirmedIds = [];

            if(storeData.length > 0) {
                document.getElementById('outClientName').innerText = storeData[0].client;
            }

            storeData.forEach((group, gIdx) => {
                group.bills.forEach((b, bIdx) => {
                    if (b.status === 'ok') {
                        totalMatch += parseFloat(b.price.replace(/,/g,''));
                        confirmedIds.push(parseInt(b.id));
                    }

                    list.innerHTML += `
                        <div class="bill-card flex justify-between items-center p-3 border-b border-slate-50 ${b.status === 'ok' ? 'is-confirmed' : ''} ${b.status === 'warn' ? 'is-ignored' : ''}">
                            <div class="flex items-center gap-4">
                                <div class="no-print flex gap-1">
                                    <button onclick="setStatus(${gIdx},${bIdx},'ok')" class="w-7 h-7 rounded-lg font-bold bg-slate-100 text-slate-400 ${b.status === 'ok' ? '!bg-green-600 !text-white' : ''}">✓</button>
                                    <button onclick="setStatus(${gIdx},${bIdx},'warn')" class="w-7 h-7 rounded-lg font-bold bg-slate-100 text-slate-400 ${b.status === 'warn' ? '!bg-amber-500 !text-white' : ''}">!</button>
                                </div>
                                <div>
                                    <p class="font-black text-sm text-slate-800">#${b.id}</p>
                                    <p class="text-[9px] text-slate-400 font-bold">${b.date}</p>
                                </div>
                            </div>
                            <div class="text-left">
                                <p class="font-black ${b.status === 'ok' ? 'text-green-600 text-lg' : 'text-slate-400 text-sm'}">${b.price}</p>
                            </div>
                        </div>
                    `;
                });
            });

            document.getElementById('finalTotal').innerText = totalMatch.toLocaleString(undefined, {minimumFractionDigits: 2}) + " IQD";
            
            // توليد الرسالة الاحترافية
            if(confirmedIds.length > 0) {
                document.getElementById('aiSummary').classList.remove('hidden');
                let first = Math.min(...confirmedIds);
                let last = Math.max(...confirmedIds);
                document.getElementById('aiMessage').innerText = `نود إعلامكم بأنه تمت مطابقة الحسابات بنجاح من فاتورة رقم (${first}) إلى آخر فاتورة رقم (${last})، باستثناء القوائم المشار إليها بعلامة تعجب، حيث تم استبعادها من صافي مبلغ المطابقة الحالي.`;
            } else {
                document.getElementById('aiSummary').classList.add('hidden');
            }
        }

        function setStatus(g, b, st) {
            storeData[g].bills[b].status = (storeData[g].bills[b].status === st) ? 'none' : st;
            render();
        }
    </script>
</body>
</html>
