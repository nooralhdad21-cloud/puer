<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurePharma | مراجع الفواتير الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f4f8; }
        .card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .medical-blue { color: #0056b3; }
        .bg-medical { background-color: #0056b3; }
        .status-checked { background-color: #d1fae5; border-color: #10b981; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-600">
            <div>
                <h1 class="text-2xl font-black medical-blue leading-none">PUREPHARMA</h1>
                <p class="text-xs text-gray-500 mt-1 font-bold">نظام التدقيق الذكي - مكتب بيور العلمي</p>
            </div>
            <div id="status" class="text-sm font-bold text-gray-400 italic">بانتظار الملف...</div>
        </div>

        <div id="uploadBox" class="bg-white p-12 rounded-3xl border-2 border-dashed border-blue-200 text-center mb-8 shadow-inner">
            <input type="file" id="pdfInput" accept=".pdf" class="hidden">
            <label for="pdfInput" class="cursor-pointer group">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-600 transition-colors">
                    <svg class="w-10 h-10 text-blue-600 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <p class="text-lg font-bold text-gray-700">اضغط لرفع "كشف الشرقاط" أو أي ملف أصيل</p>
                <p class="text-sm text-gray-400 mt-2">سيتم استخراج الأسماء والمبالغ تلقائياً</p>
            </label>
        </div>

        <div id="results" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-4 rounded-xl shadow-sm">
                    <p class="text-xs font-bold text-gray-400 uppercase">إجمالي المطالبة</p>
                    <h2 id="totalAmount" class="text-xl font-black text-blue-700">0</h2>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm">
                    <p class="text-xs font-bold text-gray-400 uppercase">تمت مطابقتها</p>
                    <h2 id="checkedAmount" class="text-xl font-black text-emerald-600">0</h2>
                </div>
            </div>
            
            <div id="customersList" class="space-y-6"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const pdfInput = document.getElementById('pdfInput');
        let invoicesData = [];

        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = "جاري القراءة...";
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(this.result) }).promise;
                let fullTextData = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    fullTextData.push(...textContent.items.map(item => item.str));
                }
                
                parseInvoices(fullTextData);
            };
            reader.readAsArrayBuffer(file);
        });

        function parseInvoices(lines) {
            invoicesData = [];
            let currentCustomer = "غير معروف";

            lines.forEach((line, index) => {
                let cleanLine = line.replace(/ѧ/g, '').trim();

                // قاعدة استخراج الاسم: ابحث عن سطر يحتوي على "مذخر" أو "صيدلية" ولا يحتوي على "بيور"
                if ((cleanLine.includes("مذخر") || cleanLine.includes("صيدلية") || cleanLine.includes("متر") || cleanLine.includes("مستخر")) 
                     && !cleanLine.includes("بيور العلمي") 
                     && !cleanLine.includes("صاحب الفاتورة")) {
                    currentCustomer = cleanLine.replace(/الاسم|:|العنوان|الشرقاط/g, '').trim();
                }

                // قاعدة استخراج الفاتورة: إذا كان السطر عبارة عن رقم فاتورة (5-6 أرقام)
                if (/^\d{5,6}$/.test(cleanLine)) {
                    // محاولة العثور على المبلغ في الأسطر القريبة
                    let amount = 0;
                    for (let j = -5; j <= 5; j++) {
                        let potentialAmount = lines[index + j]?.replace(/,/g, '');
                        if (/^\d+\.\d{2}$/.test(potentialAmount)) {
                            amount = parseFloat(potentialAmount);
                            break;
                        }
                    }

                    if (amount > 0) {
                        invoicesData.push({
                            id: cleanLine,
                            customer: currentCustomer,
                            amount: amount,
                            checked: false
                        });
                    }
                }
            });

            renderUI();
        }

        function renderUI() {
            document.getElementById('uploadBox').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('status').innerText = "تم استخراج البيانات";

            const list = document.getElementById('customersList');
            list.innerHTML = "";

            // تجميع الفواتير حسب اسم العميل
            const grouped = invoicesData.reduce((acc, inv) => {
                if (!acc[inv.customer]) acc[inv.customer] = [];
                acc[inv.customer].push(inv);
                return acc;
            }, {});

            let grandTotal = 0;

            for (const customer in grouped) {
                let customerTotal = 0;
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl p-6 shadow-sm border border-gray-100";
                
                const itemsHtml = grouped[customer].map(inv => {
                    customerTotal += inv.amount;
                    grandTotal += inv.amount;
                    return `
                        <div onclick="toggleCheck('${inv.id}')" class="flex justify-between items-center p-3 border-b border-gray-50 cursor-pointer hover:bg-gray-50 ${inv.checked ? 'opacity-40' : ''}">
                            <div class="flex items-center gap-3">
                                <div class="w-5 h-5 border-2 border-blue-400 rounded flex items-center justify-center ${inv.checked ? 'bg-blue-600 border-blue-600' : ''}">
                                    ${inv.checked ? '<svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>' : ''}
                                </div>
                                <span class="text-sm font-bold text-gray-600">فاتورة #${inv.id}</span>
                            </div>
                            <span class="font-mono font-bold text-gray-800">${inv.amount.toLocaleString()}</span>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-end mb-4 border-b-2 border-blue-50 pb-2">
                        <h3 class="text-lg font-black text-gray-800">${customer}</h3>
                        <div class="text-left">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">المجموع</p>
                            <p class="text-md font-black text-blue-600">${customerTotal.toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="space-y-1">${itemsHtml}</div>
                `;
                list.appendChild(card);
            }

            document.getElementById('totalAmount').innerText = grandTotal.toLocaleString() + " د.ع";
            updateCheckedStats();
        }

        function toggleCheck(id) {
            const inv = invoicesData.find(x => x.id === id);
            inv.checked = !inv.checked;
            renderUI();
        }

        function updateCheckedStats() {
            const checkedTotal = invoicesData.filter(x => x.checked).reduce((sum, x) => sum + x.amount, 0);
            document.getElementById('checkedAmount').innerText = checkedTotal.toLocaleString() + " د.ع";
        }
    </script>
</body>
</html>
