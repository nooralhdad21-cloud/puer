<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مطابقة كشوفات بيور - الشرقاط</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f0f4f8; font-family: 'Cairo', sans-serif; }
        .group-card { transition: all 0.3s ease; }
        .invoice-details { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .invoice-details.open { max-height: 2000px; }
        .check-custom { width: 28px; height: 28px; border: 2px solid #cbd5e1; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; background: white; }
        .check-custom.checked { background: #10b981; border-color: #10b981; }
        .check-custom.checked::after { content: "✓"; color: white; font-weight: bold; }
    </style>
</head>
<body class="pb-10">

    <nav class="bg-blue-900 text-white p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-black tracking-tighter italic">PURE <span class="text-blue-400">SYNC</span></h1>
        <div id="liveStats" class="hidden flex gap-3 text-[10px] font-bold">
            <span id="statDone" class="bg-green-600 px-3 py-1 rounded-full text-white">مكتمل: 0</span>
            <span id="statTotal" class="bg-blue-800 px-3 py-1 rounded-full text-white">الكلي: 0</span>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-xl">

        <div id="uploadBox" class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center border-4 border-white mt-10">
            <div class="text-5xl mb-4">📈</div>
            <h2 class="text-2xl font-black text-slate-800 mb-6">مطابقة كشف الشرقاط</h2>
            <div class="border-4 border-dashed border-blue-100 p-10 rounded-[2rem] relative hover:bg-blue-50 transition-all cursor-pointer">
                <input type="file" id="pdfInput" accept=".pdf" class="absolute inset-0 opacity-0 cursor-pointer">
                <p class="text-blue-600 font-black">اضغط لرفع ملف الـ PDF</p>
                <p class="text-xs text-slate-400 mt-2">سيعالج النظام الأسماء والتواريخ تلقائياً</p>
            </div>
        </div>

        <div id="searchBox" class="hidden mt-6">
            <input type="text" id="searchInput" onkeyup="renderGroups()" placeholder="بحث باسم الصيدلية أو رقم الفاتورة..." class="w-full p-5 rounded-3xl shadow-sm border-none font-bold text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
        </div>

        <div id="contentList" class="mt-6 space-y-4"></div>

    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        let rawData = [];
        let filteredGroups = {};

        // معالجة النصوص العربية المقطعة في ملفات بيور
        function cleanText(text) {
            if (!text) return "";
            return text.replace(/[ѧ_:]/g, '').replace(/\s+/g, ' ').trim();
        }

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let fullLines = [];
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullLines = fullLines.concat(content.items.map(item => item.str));
                }
                parsePureData(fullLines);
            };
            reader.readAsArrayBuffer(file);
        });

        function parsePureData(lines) {
            rawData = [];
            let currentName = "غير محدد";
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();

                // التقاط اسم الصيدلية/المذخر (كما في المربع الأزرق بالصورة)
                if (line.includes("الاس") || line.includes("صيدلية") || line.includes("مذخر") || line.includes("مكتب")) {
                    let nameCandidate = cleanText(line.split("تاريخ")[0]);
                    if(nameCandidate.length > 5) currentName = nameCandidate;
                }

                // التقاط الفواتير (رقم مكون من 6 أرقام)
                if (/^\d{6}$/.test(line)) {
                    let inv = {
                        client: currentName,
                        id: line,
                        date: "---",
                        price: "0.00",
                        checked: false
                    };

                    // البحث عن التاريخ والمبلغ في الأسطر المجاورة
                    for (let j = -5; j <= 15; j++) {
                        let neighbor = (lines[i+j] || "").trim();
                        if (/^\d{2}\/\d{2}\/\d{4}$/.test(neighbor)) inv.date = neighbor;
                        if (/^[\d,]+\.\d{2}$/.test(neighbor)) inv.price = neighbor;
                    }
                    rawData.push(inv);
                }
            }

            document.getElementById('uploadBox').classList.add('hidden');
            document.getElementById('searchBox').classList.remove('hidden');
            document.getElementById('liveStats').classList.remove('hidden');
            renderGroups();
        }

        function renderGroups() {
            const container = document.getElementById('contentList');
            container.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();

            // تجميع الفواتير حسب العميل
            let groups = {};
            rawData.forEach(item => {
                if (item.client.toLowerCase().includes(search) || item.id.includes(search)) {
                    if (!groups[item.client]) groups[item.client] = [];
                    groups[item.client].push(item);
                }
            });

            Object.keys(groups).forEach(name => {
                const invoices = groups[name];
                const doneCount = invoices.filter(v => v.checked).length;
                const isAllDone = doneCount === invoices.length;

                const card = document.createElement('div');
                card.className = `group-card bg-white rounded-[2rem] shadow-sm overflow-hidden border-2 ${isAllDone ? 'border-green-500' : 'border-transparent'}`;
                
                card.innerHTML = `
                    <div onclick="toggleDetails(this)" class="p-5 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-blue-50 flex items-center justify-center font-black text-blue-600 text-lg">
                                ${invoices.length}
                            </div>
                            <div>
                                <h3 class="font-black text-slate-800 text-sm">${name}</h3>
                                <p class="text-[10px] text-slate-400 font-bold">تمت مطابقة ${doneCount} من أصل ${invoices.length}</p>
                            </div>
                        </div>
                        <span class="text-slate-300 text-xs">▼</span>
                    </div>
                    <div class="invoice-details px-5 bg-slate-50 border-t">
                        <div class="py-4 space-y-3">
                            ${invoices.map(inv => `
                                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-xs border border-white">
                                    <div class="flex-1">
                                        <div class="flex gap-2 items-center mb-1">
                                            <span class="text-[9px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-black">#${inv.id}</span>
                                            <span class="text-[9px] text-gray-400 font-bold">${inv.date}</span>
                                        </div>
                                        <p class="text-xs font-black text-slate-700 italic">المبلغ: ${inv.price} دينار</p>
                                    </div>
                                    <div onclick="toggleCheck('${inv.id}')" class="check-custom ${inv.checked ? 'checked' : ''}"></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            updateStats();
        }

        function toggleDetails(el) {
            el.nextElementSibling.classList.toggle('open');
        }

        function toggleCheck(id) {
            const index = rawData.findIndex(x => x.id === id);
            rawData[index].checked = !rawData[index].checked;
            renderGroups();
        }

        function updateStats() {
            const total = rawData.length;
            const done = rawData.filter(x => x.checked).length;
            document.getElementById('statDone').innerText = `مكتمل: ${done}`;
            document.getElementById('statTotal').innerText = `الكلي: ${total}`;
        }
    </script>
</body>
</html>
