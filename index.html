<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مطابقة أصيل - Ultra Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050a15; font-family: 'Cairo', sans-serif; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .accent-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .invoice-drawer { max-height: 0; overflow: hidden; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .invoice-drawer.active { max-height: 4000px; padding: 1rem 0; }
        .check-pill { cursor: pointer; transition: 0.3s; }
        .check-pill.active { background: #10b981 !important; transform: scale(1.05); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .live-indicator { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="pb-10">

    <nav class="sticky top-0 z-50 glass-card p-4 border-b border-white/5">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 accent-gradient rounded-lg flex items-center justify-center font-black">A</div>
                <h1 class="text-lg font-black tracking-widest">ASEEL<span class="text-blue-500 font-black">SYNC</span></h1>
            </div>
            <div id="topStats" class="hidden flex gap-4 text-[10px] font-bold">
                <span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20">جاهز للمطابقة</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-8 max-w-2xl">

        <div id="uploadView" class="bg-slate-900/50 p-12 rounded-[3rem] border-2 border-dashed border-slate-800 text-center shadow-2xl">
            <div class="mb-6 inline-flex p-5 bg-blue-500/10 rounded-full">
                <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </div>
            <h2 class="text-2xl font-black mb-3">توافق برنامج أصيل</h2>
            <p class="text-slate-500 text-sm mb-10">ارفع كشف "سداد فواتير العملاء" لبدء المعالجة الذكية</p>
            <label class="accent-gradient text-white px-14 py-5 rounded-3xl font-black cursor-pointer shadow-xl shadow-blue-500/20 hover:scale-105 transition-all inline-block">
                اختيار الملف
                <input type="file" id="pdfIn" accept=".pdf" class="hidden">
            </label>
        </div>

        <div id="dashView" class="hidden animate-in fade-in duration-700">
            <div class="glass-card p-6 rounded-[2.5rem] mb-8 relative overflow-hidden">
                <div class="flex justify-between items-center relative z-10">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="w-2 h-2 bg-green-500 rounded-full live-indicator"></span>
                            <p class="text-[9px] text-slate-500 font-black uppercase">إحصائيات المطابقة الحية</p>
                        </div>
                        <h3 id="mainPercent" class="text-5xl font-black italic">0%</h3>
                    </div>
                    <div class="text-right">
                        <p id="matchTotal" class="text-2xl font-black text-blue-500">0</p>
                        <p class="text-[9px] text-slate-500 font-black">دينار تمت مطابقته</p>
                    </div>
                </div>
                <div class="mt-6 h-1 bg-slate-800 rounded-full overflow-hidden">
                    <div id="progressMain" class="h-full accent-gradient transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div class="flex gap-4 mb-6">
                <input type="text" id="searchIn" onkeyup="renderUI()" placeholder="ابحث عن صيدلية أو فاتورة..." class="flex-1 p-5 bg-slate-900 border border-white/5 rounded-3xl text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="downloadFinalReport()" class="bg-emerald-600 px-6 rounded-3xl text-[10px] font-black hover:bg-emerald-500 transition-all">تحميل التقرير</button>
            </div>

            <div id="listBody" class="space-y-4"></div>
        </div>

    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        let allInvoices = [];

        document.getElementById('pdfIn').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let textStore = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    textStore = textStore.concat(content.items.map(s => s.str));
                }
                parseAseelData(textStore);
            };
            reader.readAsArrayBuffer(file);
        });

        function parseAseelData(lines) {
            allInvoices = [];
            let currentEntity = "جهة غير مسجلة";
            
            for (let i = 0; i < lines.length; i++) {
                let text = lines[i].trim();

                // كشف برنامج أصيل يضع اسم الصيدلية غالباً قبل الفواتير
                if (text.includes("الاسم") || text.includes("صيدلية") || text.includes("مذخر") || text.includes("مستشفى") || text.includes("مكتب")) {
                    currentEntity = text.replace(/الاسم:|ѧ|:|_/g, '').trim();
                }

                // كشف أصيل: رقم الفاتورة 6 أرقام
                if (/^\d{6}$/.test(text)) {
                    let inv = {
                        customer: currentEntity,
                        id: text,
                        date: lines[i+1] || "---",
                        total: "0",
                        paid: "0",
                        remain: "0",
                        checked: false
                    };

                    // استخراج المبالغ (قيمة، مدفوع، متبقي)
                    let priceList = [];
                    for (let j = 1; j < 20; j++) {
                        let val = (lines[i+j] || "").trim();
                        if (/^[\d,]+\.\d{2}$/.test(val)) priceList.push(val);
                    }

                    if (priceList.length >= 3) {
                        inv.total = priceList[0];
                        inv.paid = priceList[1];
                        inv.remain = priceList[2];
                    } else if (priceList.length === 2) {
                        inv.total = priceList[0];
                        inv.remain = priceList[1];
                    }
                    allInvoices.push(inv);
                }
            }

            document.getElementById('uploadView').classList.add('hidden');
            document.getElementById('dashView').classList.remove('hidden');
            document.getElementById('topStats').classList.remove('hidden');
            renderUI();
        }

        function renderUI() {
            const container = document.getElementById('listBody');
            container.innerHTML = "";
            const query = document.getElementById('searchIn').value.toLowerCase();

            // تجميع البيانات حسب الصيدلية
            let grouped = {};
            allInvoices.forEach(inv => {
                if (inv.customer.toLowerCase().includes(query) || inv.id.includes(query)) {
                    if (!grouped[inv.customer]) grouped[inv.customer] = { items: [], debt: 0 };
                    grouped[inv.customer].items.push(inv);
                    grouped[inv.customer].debt += parseFloat(inv.remain.replace(/,/g, ''));
                }
            });

            Object.keys(grouped).forEach(name => {
                const group = grouped[name];
                const allDone = group.items.every(v => v.checked);
                
                const card = document.createElement('div');
                card.className = `glass-card rounded-[2.5rem] p-2 transition-all ${allDone ? 'opacity-50 border-emerald-500/50' : ''}`;
                
                card.innerHTML = `
                    <div onclick="this.nextElementSibling.classList.toggle('active')" class="p-5 flex justify-between items-center cursor-pointer">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center font-black text-blue-500 border border-white/5 shadow-inner">
                                ${group.items.length}
                            </div>
                            <div>
                                <h3 class="font-bold text-sm text-white">${name}</h3>
                                <p class="text-[9px] text-slate-500 font-black">المتبقي الكلي: <span class="text-blue-400">${group.debt.toLocaleString()}</span></p>
                            </div>
                        </div>
                        <div class="text-slate-600 text-xs">▼</div>
                    </div>
                    <div class="invoice-drawer">
                        <div class="p-4 space-y-4">
                            ${group.items.map(inv => `
                                <div class="bg-black/20 p-5 rounded-3xl border border-white/5 flex justify-between items-center">
                                    <div class="flex-1">
                                        <div class="flex gap-2 items-center mb-3">
                                            <span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-[9px] font-black"># ${inv.id}</span>
                                            <span class="text-[9px] text-slate-500 font-bold">${inv.date}</span>
                                        </div>
                                        <div class="grid grid-cols-3 gap-2">
                                            <div class="text-center bg-slate-800/50 p-2 rounded-xl">
                                                <p class="text-[7px] text-slate-500 mb-1">القيمة</p>
                                                <p class="text-[10px] font-bold">${inv.total}</p>
                                            </div>
                                            <div class="text-center bg-slate-800/50 p-2 rounded-xl">
                                                <p class="text-[7px] text-slate-500 mb-1">المدفوع</p>
                                                <p class="text-[10px] font-bold text-emerald-400">${inv.paid}</p>
                                            </div>
                                            <div class="text-center bg-blue-500/10 p-2 rounded-xl border border-blue-500/20">
                                                <p class="text-[7px] text-slate-500 mb-1">المتبقي</p>
                                                <p class="text-[10px] font-black text-blue-400">${inv.remain}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div onclick="toggleCheck('${inv.id}')" class="check-pill ml-4 w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center border border-white/10 ${inv.checked ? 'active' : ''}">
                                        <span class="text-white text-xl">✓</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            updateStats();
        }

        function toggleCheck(id) {
            const item = allInvoices.find(x => x.id === id);
            item.checked = !item.checked;
            renderUI();
        }

        function updateStats() {
            const total = allInvoices.length;
            const done = allInvoices.filter(x => x.checked).length;
            const percent = total === 0 ? 0 : Math.round((done / total) * 100);
            
            let matchedSum = 0;
            allInvoices.filter(x => x.checked).forEach(x => {
                matchedSum += parseFloat(x.remain.replace(/,/g, ''));
            });

            document.getElementById('mainPercent').innerText = percent + "%";
            document.getElementById('matchTotal').innerText = matchedSum.toLocaleString();
            document.getElementById('progressMain').style.width = percent + "%";
        }

        function downloadFinalReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            doc.text("ASEEL SYNC - Final Audit Report", 105, 15, { align: "center" });
            const matched = allInvoices.filter(x => x.checked);
            const rows = matched.map(v => [v.remain, v.paid, v.total, v.customer, v.id]);
            doc.autoTable({
                startY: 25,
                head: [['Remain', 'Paid', 'Value', 'Entity', 'Invoice #']],
                body: rows,
                headStyles: { fillColor: [37, 99, 235] }
            });
            doc.save("Audit_Report.pdf");
        }
    </script>
</body>
</html>
