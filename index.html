<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Match | نظام مطابقة مكتب بيور العلمي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .bill-card { 
            background: white; border-radius: 15px; padding: 15px; 
            margin-bottom: 12px; border-right: 6px solid #10b981;
            transition: 0.3s; cursor: pointer;
        }
        .bill-card.inactive { border-right-color: #ef4444; opacity: 0.7; background-color: #fef2f2; }
        .no-print { display: block; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto">
        <header class="no-print bg-[#1e293b] text-white p-6 rounded-[2rem] mb-6 shadow-2xl">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">المحاسب</label>
                    <input type="text" id="accName" value="نور الدين البغدادي" class="w-full bg-slate-800 border-none rounded-lg p-2 text-xs">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">المحافظة</label>
                    <select id="province" class="w-full bg-slate-800 border-none rounded-lg p-2 text-xs">
                        <option>صلاح الدين</option>
                        <option>بغداد</option>
                        <option>نينوى</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">القضاء</label>
                    <input type="text" id="district" value="الشرقاط" class="w-full bg-slate-800 border-none rounded-lg p-2 text-xs">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="document.getElementById('pdfInput').click()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 p-3 rounded-xl text-xs font-black italic">رفع الكشف PDF</button>
                <button onclick="window.print()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 p-3 rounded-xl text-xs font-black">طباعة التقرير</button>
            </div>
            <input type="file" id="pdfInput" class="hidden" accept=".pdf">
        </header>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 min-h-[1000px]">
            <div class="flex justify-between items-start border-b pb-6 mb-8">
                <div>
                    <h1 class="text-3xl font-black text-slate-900">مكتب بيور العلمي</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Pure Scientific Bureau</p>
                </div>
                <div class="text-left text-[11px] font-bold text-slate-500">
                    <p>التاريخ: <span id="dateText"></span></p>
                    <p>الموقع: <span id="locText" class="text-indigo-600">صلاح الدين / الشرقاط</span></p>
                </div>
            </div>

            <div class="bg-[#1e293b] p-8 rounded-[2rem] text-white flex justify-between items-center mb-8">
                <div>
                    <p class="text-[10px] text-indigo-400 font-bold mb-2 uppercase">اسم العميل / المذخر</p>
                    <input type="text" id="clientDisplay" placeholder="بانتظار الملف..." class="bg-transparent text-2xl font-black outline-none w-full">
                </div>
                <div class="text-left border-r border-slate-700 pr-6">
                    <p class="text-[9px] text-slate-500 font-bold mb-1">TOTAL INVOICES</p>
                    <p id="totalDisplay" class="text-xl font-black font-mono">IQD 0.00</p>
                </div>
            </div>

            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl mb-6 border border-slate-200">
                <div class="text-[12px] font-bold text-slate-700 italic">نود إعلامكم بأنه تمت مطابقة الحسابات بنجاح</div>
                <button onclick="toggleDetails()" class="text-slate-400 hover:text-slate-900 transition-all" id="arrowIcon">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>

            <div id="billsList" class="space-y-3 transition-all duration-500 overflow-hidden"></div>

            <div class="mt-auto border-t-2 border-slate-900 pt-8 flex justify-between items-end mt-12">
                <div class="flex-1">
                    <p class="text-[11px] font-bold text-slate-400 mb-1 italic uppercase">صافي المبلغ النهائي (Final):</p>
                    <p id="netDisplay" class="text-5xl font-black text-slate-900 font-mono italic">0.00</p>
                    <p id="tafgeet" class="text-[12px] font-black text-indigo-700 bg-indigo-50 px-4 py-2 rounded-xl mt-4 inline-block border border-indigo-100 italic">....</p>
                </div>
                <div class="flex gap-6 no-print">
                    <div class="text-center italic"><div class="w-24 h-16 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 mb-1"></div><p class="text-[9px] font-bold text-slate-400">توقيع العميل</p></div>
                    <div class="text-center italic"><div class="w-24 h-16 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 mb-1"></div><p class="text-[9px] font-bold text-slate-400">ختم المكتب</p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataStore = [];
        document.getElementById('dateText').innerText = new Date().toLocaleDateString('en-GB');

        // سهم إخفاء الفواتير (لغيته؟ لا، هذا هو يعمل كما في طلبك)
        function toggleDetails() {
            const list = document.getElementById('billsList');
            const arrow = document.getElementById('arrowIcon');
            if (list.style.maxHeight === "0px") {
                list.style.maxHeight = "5000px";
                arrow.style.transform = "rotate(0deg)";
            } else {
                list.style.maxHeight = "0px";
                arrow.style.transform = "rotate(180deg)";
            }
        }

        document.getElementById('pdfInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const pdfJS = window['pdfjs-dist/build/pdf'];
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const pdf = await pdfJS.getDocument({data: await file.arrayBuffer()}).promise;
            
            dataStore = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const text = await page.getTextContent();
                const items = text.items;

                // محاولة التقاط اسم المذخر من الملف
                let nameLine = items.map(it => it.str).find(t => t.includes("مذخر") || t.includes("صيدلية"));
                if(nameLine) document.getElementById('clientDisplay').value = nameLine.split("/")[0].trim();

                items.forEach(item => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.str)) {
                        const row = items.filter(it => Math.abs(it.transform[5] - item.transform[5]) < 5);
                        const nums = row.filter(r => /[\d,]+\.\d{2}/.test(r.str));
                        
                        [span_0](start_span)// الخوارزمية الصحيحة: أخذ الرقم الأخير "المتبقي" دائماً لضمان مطابقة الـ 27 مليون[span_0](end_span)
                        if (nums.length >= 1) {
                            let val = nums[nums.length - 1].str; 
                            let id = row.find(ri => /^\d{5,7}$/.test(ri.str))?.str || "---";
                            // استبعاد المسددة تلقائياً (0.00) لتنظيف التقرير
                            if (parseFloat(val.replace(/,/g,'')) > 0) {
                                dataStore.push({ id, date: item.str, val, active: true });
                            }
                        }
                    }
                });
            }
            render();
        };

        function render() {
            const list = document.getElementById('billsList');
            list.innerHTML = "";
            let total = 0;

            dataStore.forEach((b, i) => {
                const numeric = parseFloat(b.val.replace(/,/g, '')) || 0;
                if (b.active) total += numeric;

                list.innerHTML += `
                    <div class="bill-card ${b.active ? '' : 'inactive'}" onclick="toggleStatus(${i})">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 italic">#${b.id} | ${b.date}</p>
                                <p class="text-sm font-black text-slate-800 font-mono italic">IQD ${b.val}</p>
                            </div>
                            <div class="no-print text-xs">${b.active ? '✅' : '❌'}</div>
                        </div>
                    </div>`;
            });

            const formatted = total.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('totalDisplay').innerText = "IQD " + formatted;
            document.getElementById('netDisplay').innerText = formatted;
            document.getElementById('tafgeet').innerText = "فقط " + total.toLocaleString('ar-IQ') + " دينار عراقي لا غير";
        }

        function toggleStatus(i) {
            dataStore[i].active = !dataStore[i].active;
            render();
        }
    </script>
</body>
</html>
