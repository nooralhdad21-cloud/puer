<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PURE PHARMA | النسخة الفولاذية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; }
        .checked-row { background-color: #064e3b !important; opacity: 0.5; text-decoration: line-through; }
        .pharmacy-card { background: #1e293b; border: 1px solid #334155; transition: all 0.2s; cursor: pointer; }
        .pharmacy-card:hover { border-color: #6366f1; background: #1e293b; transform: scale(1.02); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto">
        <div class="text-center py-10">
            <h1 class="text-4xl font-black text-indigo-500 mb-2 italic">PURE PHARMA PRO</h1>
            <p class="text-slate-400">ارفع الملف وانتظر شريط التحميل.. إذا ما اشتغل بطلت برمجة 😂</p>
        </div>

        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 mb-8">
            <input type="file" id="pdfFile" class="hidden" accept="application/pdf">
            <button onclick="document.getElementById('pdfFile').click()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-6 rounded-2xl font-black text-xl shadow-lg transition-all">
                📂 ارفع كشف الشرقاط أو تكريت
            </button>
            <div id="progressCont" class="hidden mt-6 bg-slate-700 rounded-full h-4 overflow-hidden">
                <div id="progressBar" class="bg-indigo-500 h-full w-0 transition-all"></div>
            </div>
            <p id="status" class="text-center mt-3 text-sm font-bold text-indigo-300"></p>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-3xl max-h-[90vh] rounded-[2rem] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <button onclick="closeModal()" class="text-slate-400 hover:text-white font-bold">إغلاق ✕</button>
                <button id="wa" class="bg-green-600 px-6 py-2 rounded-xl font-bold text-sm">واتساب</button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto text-right text-white"></div>
        </div>
    </div>

    <script>
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let store = {};

        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('progressCont').classList.remove('hidden');
            const status = document.getElementById('status');
            const bar = document.getElementById('progressBar');
            
            status.innerText = "جاري كسر حماية الملف واستخراج البيانات...";
            
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjs.getDocument({data: arrayBuffer}).promise;
            store = {};

            for (let i = 1; i <= pdf.numPages; i++) {
                bar.style.width = (i / pdf.numPages * 100) + "%";
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const text = content.items.map(s => s.str).join(' ');

                // البحث عن الاسم والحساب (Logic مطور لملفات أصيل)
                let idMatch = text.match(/(?:رقم|الحساب|رق م)[:\-\s]*(\d{2,6})/);
                let nameMatch = text.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|رق م|الموبايل|العن)/);

                if (idMatch) {
                    let id = idMatch[1];
                    let name = nameMatch ? nameMatch[1].replace(/ѧ/g, '').replace(/([ا-ي])\s(?=[ا-ي])/g, '$1').trim() : "جهة غير معروفة";

                    if (!store[id]) store[id] = { id, name, bills: [], total: 0 };

                    // التقاط الفواتير
                    let billRegex = /(\d{5,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                    let m;
                    while ((m = billRegex.exec(text)) !== null) {
                        store[id].bills.push({ n: m[1], d: m[2], a: m[3] });
                        store[id].total += parseFloat(m[3].replace(/,/g, ''));
                    }
                }
            }

            render();
            status.innerText = "تم التحميل! اضغط على أي صيدلية للمطابقة ✅";
        });

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            Object.values(store).forEach(c => {
                if (c.total > 0) {
                    grid.innerHTML += `
                    <div class="p-6 rounded-2xl pharmacy-card" onclick="openModal('${c.id}')">
                        <div class="text-xs text-indigo-400 font-bold mb-1">ID: ${c.id}</div>
                        <h3 class="text-lg font-black text-white mb-4 text-right">${c.name}</h3>
                        <div class="text-left text-2xl font-black text-indigo-500 border-t border-slate-700 pt-3">
                            ${c.total.toLocaleString()} <small class="text-[10px] text-slate-500 italic">IQD</small>
                        </div>
                    </div>`;
                }
            });
        }

        function openModal(id) {
            const c = store[id];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('wa').onclick = () => {
                window.open(`https://wa.me/?text=*كشف حساب مكتب بيور*%0A*العميل:* ${c.name}%0A*الإجمالي:* ${c.total.toLocaleString()} د.ع`, '_blank');
            };

            document.getElementById('modalBody').innerHTML = `
                <div class="mb-6">
                    <h2 class="text-2xl font-black text-indigo-400">${c.name}</h2>
                    <p class="text-slate-500">الحساب: ${c.id}</p>
                </div>
                <div class="space-y-3">
                    ${c.bills.map((b, i) => `
                        <div id="row-${i}" class="flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700">
                            <input type="checkbox" onchange="document.getElementById('row-${i}').classList.toggle('checked-row', this.checked)" class="w-6 h-6 accent-indigo-500">
                            <div class="text-center font-mono font-bold">${b.n}</div>
                            <div class="text-left font-black text-indigo-400">${b.a}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="mt-8 bg-indigo-600 p-6 rounded-2xl text-center font-black text-2xl">
                    الإجمالي: ${c.total.toLocaleString()} د.ع
                </div>`;
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
