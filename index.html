<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE SYNC - Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7fa; font-family: 'Cairo', sans-serif; color: #1e293b; }
        .official-card { background: white; border-radius: 1.25rem; border: 1px solid #e2e8f0; transition: 0.3s; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer.open { max-height: 5000px; border-top: 1px solid #f1f5f9; padding-top: 1rem; }
        .btn-sync { background: #1e3a8a; color: white; transition: 0.3s; box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2); }
        .btn-sync:hover { background: #2563eb; transform: translateY(-1px); }
        .num-font { font-family: 'system-ui', sans-serif; font-weight: 800; }
        .province-tag { background: #eff6ff; color: #1d4ed8; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b p-4 shadow-sm">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 btn-sync rounded-2xl flex items-center justify-center font-black text-xl">CS</div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 tracking-tighter uppercase">CORE SYNC</h1>
                    <p class="text-[9px] font-bold text-blue-600 tracking-widest uppercase italic">Audit System V7</p>
                </div>
            </div>
            <div id="statusLoader" class="hidden w-6 h-6 border-4 border-blue-200 border-t-blue-800 rounded-full animate-spin"></div>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-2xl mt-8">

        <div id="uploadView" class="official-card p-12 text-center border-2 border-dashed border-blue-200">
            <div class="text-5xl mb-4">📄</div>
            <h2 class="text-2xl font-black mb-2">منصة التدقيق الذكية</h2>
            <p class="text-slate-500 text-sm mb-10 font-medium leading-relaxed">ارفع كشف "سداد فواتير البيع" للبدء بالمعالجة</p>
            <label class="btn-sync px-12 py-4 rounded-2xl font-black cursor-pointer shadow-xl inline-block">
                اختيار الملف المصدري
                <input type="file" id="pdfFile" accept=".pdf" class="hidden">
            </label>
        </div>

        <div id="controlPanel" class="hidden space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="official-card p-6 border-r-4 border-blue-600">
                    <p class="text-[10px] text-slate-400 font-black uppercase">إنجاز المطابقة</p>
                    <h3 id="percLabel" class="text-4xl font-black text-slate-800">0%</h3>
                </div>
                <div class="official-card p-6 border-r-4 border-emerald-500">
                    <p class="text-[10px] text-slate-400 font-black uppercase">المبلغ المسدد</p>
                    <h3 id="sumLabel" class="text-xl font-black text-emerald-600 num-font">0</h3>
                </div>
            </div>

            <div class="relative">
                <input type="text" id="searchInput" onkeyup="render()" placeholder="بحث باسم الجهة، رقم الفاتورة، أو التاريخ..." class="w-full p-5 official-card outline-none font-bold text-sm focus:border-blue-600 focus:ring-4 focus:ring-blue-50/50 transition-all">
            </div>

            <div id="mainList" class="space-y-4"></div>
        </div>

    </main>
