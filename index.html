<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE SYNC | ULTRA X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: 'Cairo', sans-serif; color: #334155; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0,0,0,0.04); }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1); }
        .drawer.open { max-height: 5000px; transition: max-height 1s ease-in-out; }
        .num-font { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: -0.5px; }
        .status-btn { width: 44px; height: 44px; border-radius: 12px; transition: 0.3s; cursor: pointer; border: 2px solid #e2e8f0; }
        .status-btn.checked { background: #10b981; border-color: #10b981; color: white; transform: scale(1.05); }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 p-4 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <span class="text-white font-black text-xl italic">X</span>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tighter">CORE SYNC <span class="text-blue-600">ULTRA X</span></h1>
                    <div id="loader" class="hidden text-[10px] font-bold text-blue-500 animate-pulse uppercase">جاري معالجة البيانات...</div>
                </div>
            </div>
            <div id="statsHead" class="hidden flex gap-4 text-left">
                <div class="text-right">
                    <p class="text-[9px] font-bold text-slate-400 uppercase">المطابقة</p>
                    <p id="totalPerc" class="text-xl font-black text-slate-800 leading-none">0%</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-2xl">

        <div id="uploadBox" class="bg-white rounded-[2.5rem] p-12 text-center border-2 border-dashed border-slate-200 hover:border-blue-400 transition-all card-shadow">
            <div class="w-24 h-24 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">منصة التدقيق الميداني</h2>
            <p class="text-slate-400 text-sm mb-10 font-medium">نظام ذكي متوافق مع ترميز أصيل ومكتب بيور</p>
            <label class="bg-blue-600 hover:bg-blue-700 text-white px-14 py-5 rounded-2xl font-black cursor-pointer shadow-xl shadow-blue-100 transition-all inline-block">
                تحميل كشف الحساب
                <input type="file" id="pdfIn" accept=".pdf" class="hidden">
            </label>
        </div>

        <div id="mainUI" class="hidden space-y-6">
            <div class="relative group">
                <input type="text" id="search" onkeyup="render()" placeholder="ابحث باسم الصيدلية، رقم الفاتورة، أو الكود..." class="w-full p-6 bg-white rounded-[2rem] border border-slate-200 shadow-sm outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-500 transition-all font-bold text-sm">
                <div class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <div class="bg-blue-600 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-blue-200 relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-2">إجمالي المطابقة الحالية</p>
                    <h3 id="totalMoney" class="text-4xl font-black num-font">0 <span class="text-lg opacity-60">د.ع</span></h3>
                </div>
                <div class="absolute -right-10 -bottom-10 opacity-10">
                    <svg class="w-48 h-48" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.82v-1.91c-1.62-.35-3-1.3-3.13-2.91h2.12c.11.75.92 1.2 1.01 1.2.91 0 1.5-.41 1.5-1.15 0-2.31-4.62-1.21-4.62-4.62 0-1.42 1.05-2.52 2.62-2.91V6h2.82v1.91c1.23.27 2.45.92 2.76 2.31h-2.12c-.22-.62-.9-1.02-1.64-1.02-.75 0-1.5.3-1.5 1.01 0 2.11 4.62 1.1 4.62 4.5 0 1.5-1.05 2.51-2.62 2.88z"></path></svg>
                </div>
            </div>

            <div id="results" class="space-y-4"></div>
        </div>

    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let store = [];

        document.getElementById('pdfIn').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loader').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(this.result) }).promise;
                let fullContent = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    fullContent = fullContent.concat(text.items.map(s => s.str));
                }
                parse(fullContent);
            };
            reader.readAsArrayBuffer(file);
        });

        function parse(lines) {
            store = [];
            let currentEntity = "جهة غير معروفة";

            for (let i = 0; i < lines.length; i++) {
                let txt = lines[i].trim();

                // تنظيف اسم الصيدلية والمحافظة
                if (txt.includes("صيدلية") || txt.includes("مذخر") || txt.includes("مكتب") || txt.includes("الاسم")) {
                    currentEntity = txt.replace(/الاسم:|ѧ|:|_|عنوان|رقم الموبايل/g, '').trim();
                    if (currentEntity === "") currentEntity = (lines[i+1] || "").replace(/ѧ|:|_/g, '').trim();
                }

                // كشف الفاتورة والمبالغ
                if (/^\d{5,6}$/.test(txt)) {
                    let inv = {
                        shop: currentEntity,
                        id: txt,
                        date: lines[i+1] || "---",
                        province: currentEntity.includes("الشرقاط") ? "صلاح الدين" : "عام",
                        total: "0.00", paid: "0.00", rem: "0.00",
                        active: false
                    };

                    let prices = [];
                    for (let j = 1; j < 25; j++) {
                        let c = (lines[i+j] || "").trim();
                        if (/^[\d,]+\.\d{2}$/.test(c)) prices.push(c);
                    }

                    if (prices.length >= 3) {
                        inv.total = prices[0]; inv.paid = prices[1]; inv.rem = prices[2];
                    } else if (prices.length === 2) {
                        inv.total = prices[0]; inv.rem = prices[1];
                    }
                    store.push(inv);
                }
            }

            document.getElementById('uploadBox').classList.add('hidden');
            document.getElementById('mainUI').classList.remove('hidden');
            document.getElementById('statsHead').classList.remove('hidden');
            document.getElementById('loader').classList.add('hidden');
            render();
        }

        function render() {
            const list = document.getElementById('results');
            list.innerHTML = "";
            const q = document.getElementById('search').value.toLowerCase();

            // تجميع البيانات حسب الصيدلية
            let groups = {};
            store.forEach(inv => {
                if (inv.shop.toLowerCase().includes(q) || inv.id.includes(q)) {
                    if (!groups[inv.shop]) groups[inv.shop] = { items: [], totalDebt: 0, prov: inv.province };
                    groups[inv.shop].items.push(inv);
                    groups[inv.shop].totalDebt += parseFloat(inv.rem.replace(/,/g, ''));
                }
            });

            Object.keys(groups).forEach(name => {
                const g = groups[name];
                const card = document.createElement('div');
                card.className = "bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden mb-4";
                card.innerHTML = `
                    <div onclick="this.nextElementSibling.classList.toggle('open')" class="p-6 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-all">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center font-black text-slate-500 text-sm">
                                ${g.items.length}
                            </div>
                            <div>
                                <h3 class="font-black text-slate-800 text-[15px] mb-1">${name}</h3>
                                <div class="flex items-center gap-2">
                                    <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-lg text-[10px] font-black">${g.prov}</span>
                                    <span class="text-[10px] font-bold text-slate-400">الدين الكلي: <span class="text-blue-600 num-font">${g.totalDebt.toLocaleString()}</span></span>
                                </div>
                            </div>
                        </div>
                        <span class="text-slate-300">▼</span>
                    </div>
                    <div class="drawer">
                        <div class="p-4 space-y-3 bg-slate-50/50 border-t border-slate-100">
                            ${g.items.map(inv => `
                                <div class="bg-white p-5 rounded-[1.5rem] border border-slate-200 flex justify-between items-center shadow-sm">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 mb-3">
                                            <span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[10px] font-black num-font">#${inv.id}</span>
                                            <span class="text-[10px] text-slate-400 font-bold">${inv.date}</span>
                                        </div>
                                        <div class="grid grid-cols-3 gap-3">
                                            <div class="bg-slate-50 p-3 rounded-2xl text-center">
                                                <p class="text-[8px] text-slate-400 font-bold uppercase mb-1">الفاتورة</p>
                                                <p class="text-[12px] font-black num-font text-slate-700">${inv.total}</p>
                                            </div>
                                            <div class="bg-emerald-50 p-3 rounded-2xl text-center border border-emerald-100">
                                                <p class="text-[8px] text-emerald-500 font-bold uppercase mb-1">المدفوع</p>
                                                <p class="text-[12px] font-black num-font text-emerald-600">${inv.paid}</p>
                                            </div>
                                            <div class="bg-blue-600 p-3 rounded-2xl text-center shadow-lg shadow-blue-100">
                                                <p class="text-[8px] text-white opacity-70 font-bold uppercase mb-1">المتبقي</p>
                                                <p class="text-[12px] font-black num-font text-white">${inv.rem}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div onclick="toggle('${inv.id}')" class="status-btn mr-4 flex items-center justify-center ${inv.active ? 'checked' : ''}">
                                        ${inv.active ? '✓' : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
            update();
        }

        function toggle(id) {
            const item = store.find(x => x.id === id);
            item.active = !item.active;
            render();
        }

        function update() {
            const done = store.filter(x => x.active).length;
            const perc = store.length ? Math.round((done / store.length) * 100) : 0;
            let sum = 0;
            store.filter(x => x.active).forEach(v => sum += parseFloat(v.rem.replace(/,/g, '')));

            document.getElementById('totalPerc').innerText = perc + "%";
            document.getElementById('totalMoney').innerHTML = sum.toLocaleString() + ' <span class="text-lg opacity-60">د.ع</span>';
        }
    </script>
</body>
</html>
