<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مطابقة المذاخر | Pure Pharma</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .printable-area { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .stamp-box { border: 2px dashed #cbd5e1; width: 150px; height: 100px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 12px; font-weight: bold; }
        .bill-row { transition: 0.2s; border-right: 4px solid transparent; }
        .is-confirmed { border-right-color: #10b981; background-color: #f0fdf4; }
        .is-issue { border-right-color: #f59e0b; background-color: #fffbeb; }
        @media print { 
            .no-print { display: none !important; } 
            body { background: white; padding: 0; }
            .printable-area { box-shadow: none; border: none; width: 100%; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="no-print bg-slate-900 text-white p-6 rounded-[2rem] mb-8 shadow-2xl space-y-4">
            <h1 class="text-xl font-black text-indigo-400 text-center mb-4">إعدادات التقرير الرسمي</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="myStoreName" placeholder="اسم مذخركم (مثلاً: مذخر الشرقاط العلمي)" class="p-3 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-indigo-500">
                <input type="date" id="reportDate" class="p-3 rounded-xl bg-slate-800 border border-slate-700 outline-none focus:border-indigo-500 text-white">
            </div>
            <div class="flex gap-2">
                <input type="file" id="pdfInput" class="hidden" accept=".pdf">
                <button onclick="document.getElementById('pdfInput').click()" class="flex-1 bg-indigo-600 p-4 rounded-xl font-bold">رفع الكشف للمطابقة</button>
                <button onclick="window.print()" class="bg-green-600 px-8 rounded-xl font-bold">حفظ وطباعة التقرير</button>
            </div>
        </header>

        <div id="printArea" class="printable-area">
            <div class="flex justify-between items-start border-b-4 border-slate-900 pb-6 mb-8">
                <div>
                    <h2 id="displayStoreName" class="text-2xl font-black text-slate-900">اسم المذخر يظهر هنا</h2>
                    <p class="text-sm text-slate-500 font-bold mt-1">قسم الحسابات والمطابقة المالية</p>
                </div>
                <div class="text-left">
                    <p class="text-sm font-bold">التاريخ: <span id="displayDate">--/--/----</span></p>
                    <p class="text-sm font-bold mt-1">العميل: <span id="displayClientName" class="text-indigo-600 text-lg">بانتظار التحميل..</span></p>
                </div>
            </div>

            <div id="dataOutput" class="space-y-4 min-h-[400px]">
                <p class="text-center text-slate-300 py-20 italic">يرجى رفع ملف PDF لعرض الفواتير هنا...</p>
            </div>

            <div class="mt-12 pt-8 border-t flex justify-between items-center">
                <div class="text-sm">
                    <p class="font-bold underline mb-2">ملاحظات التدقيق:</p>
                    <p class="text-slate-500 italic">تمت مطابقة هذه القوائم إلكترونياً وبمراجعة محاسبية دقيقة.</p>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="stamp-box">ختم المذخر الرسمي</div>
                    <p class="text-[10px] font-bold">توقيع المسؤول</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];

        // تحديث البيانات تلقائياً عند الكتابة
        document.getElementById('myStoreName').oninput = function() {
            document.getElementById('displayStoreName').innerText = this.value || "اسم المذخر يظهر هنا";
        };
        document.getElementById('reportDate').onchange = function() {
            document.getElementById('displayDate').innerText = this.value;
        };

        // تعيين تاريخ اليوم تلقائياً
        document.getElementById('reportDate').valueAsDate = new Date();
        document.getElementById('displayDate').innerText = new Date().toLocaleDateString('ar-EG');

        document.getElementById('pdfInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const pdfJS = window['pdfjs-dist/build/pdf'];
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const buffer = await file.arrayBuffer();
            const pdf = await pdfJS.getDocument({data: buffer}).promise;
            
            rawData = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const items = content.items.map(it => it.str.trim());
                
                let shop = items.find(t => t.length > 10 && !t.includes("بيور")) || "عميل غير معروف";
                let bills = [];
                
                content.items.forEach((item, idx) => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.str)) {
                        let id = "---", price = "0.00";
                        // بحث بسيط عن الرقم والمبلغ
                        for(let n=-5; n<=5; n++) {
                            let val = content.items[idx+n]?.str || "";
                            if(/^\d{5,7}$/.test(val)) id = val;
                            if(/^(\d{1,3}(,\d{3})*(\.\d{2}))$/.test(val)) price = val;
                        }
                        bills.push({ id, date: item.str, price, status: 'none', note: '' });
                    }
                });
                if(bills.length > 0) rawData.push({ name: shop, bills });
            }
            renderReport();
        };

        function renderReport() {
            const output = document.getElementById('dataOutput');
            output.innerHTML = "";
            
            if(rawData.length > 0) {
                document.getElementById('displayClientName').innerText = rawData[0].name;
            }

            rawData.forEach((shop, sIdx) => {
                let rows = shop.bills.map((b, bIdx) => `
                    <div class="flex justify-between items-center p-3 border-b bill-row ${b.status === 'ok' ? 'is-confirmed' : ''} ${b.status === 'warn' ? 'is-issue' : ''}">
                        <div class="flex items-center gap-3">
                            <div class="no-print flex gap-1">
                                <button onclick="setStatus(${sIdx},${bIdx},'ok')" class="w-6 h-6 rounded bg-slate-100 text-[10px] font-bold">✓</button>
                                <button onclick="setStatus(${sIdx},${bIdx},'warn')" class="w-6 h-6 rounded bg-slate-100 text-[10px] font-bold">!</button>
                            </div>
                            <span class="font-bold text-sm">#${b.id}</span>
                            <span class="text-[10px] text-slate-400">${b.date}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            ${b.note ? `<span class="text-[10px] text-orange-600 font-bold bg-orange-50 px-2 rounded">${b.note}</span>` : ''}
                            <span class="font-black text-slate-800">${b.price}</span>
                        </div>
                    </div>
                `).join('');
                output.innerHTML += `<div class="mb-6">${rows}</div>`;
            });
        }

        function setStatus(s, b, st) {
            rawData[s].bills[b].status = (rawData[s].bills[b].status === st) ? 'none' : st;
            if(st === 'warn' && rawData[s].bills[b].status !== 'none') {
                let note = prompt("اكتب الملاحظة (مثلاً: استرجاع، نقص):");
                rawData[s].bills[b].note = note || "";
            }
            renderReport();
        }
    </script>
</body>
</html>
