<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pro - نظام المطابقة الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen font-['Cairo']">

    <nav class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-2">
            <h1 class="text-xl font-bold tracking-tighter">PURE PRO</h1>
            <div id="userInfo" class="hidden text-xs bg-blue-800 px-3 py-1 rounded-full border border-blue-400"></div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <div id="liveStats" class="hidden grid grid-cols-2 gap-4 mb-6 animate-fade">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-gray-500 text-xs font-bold mb-1">إجمالي الفواتير</p>
                <span id="totalCount" class="text-3xl font-black text-blue-900">0</span>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border-b-4 border-red-500 text-center">
                <p class="text-gray-500 text-xs font-bold mb-1">غير مطابقة</p>
                <span id="unmatchedCount" class="text-3xl font-black text-red-600">0</span>
            </div>
        </div>

        <div id="loginStep" class="bg-white p-10 rounded-[2.5rem] shadow-xl mt-10 text-center border animate-fade">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl">🔑</span>
            </div>
            <h2 class="text-2xl font-bold mb-6 text-gray-800">نظام بيور برو</h2>
            <input type="text" id="empName" placeholder="أدخل اسمك الثلاثي" class="w-full p-5 bg-gray-50 border-2 rounded-2xl mb-4 text-center focus:border-blue-500 outline-none transition-all">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">فتح النظام</button>
        </div>

        <div id="uploadStep" class="hidden mt-10 text-center animate-fade">
            <div class="bg-white p-12 rounded-[2.5rem] border-4 border-dashed border-blue-100 shadow-inner">
                <p class="font-bold text-blue-900 mb-6 text-xl">ارفع كشف PDF (الشرقاط/المحافظات)</p>
                <input type="file" id="pdfInput" accept=".pdf" class="hidden">
                <label for="pdfInput" class="bg-
