<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PurePharma | مكتب بيور العلمي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .pharmacy-card { transition: all 0.2s; border: 1px solid #e5e7eb; background: white; cursor: pointer; }
        .pharmacy-card:hover { transform: translateY(-3px); border-color: #4f46e5; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .checked-row { background-color: #d1fae5 !important; text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="bg-indigo-900 text-white p-8 rounded-2xl shadow-lg mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-black italic">PUREPHARMA</h1>
                <p class="text-indigo-300 text-sm">نظام تدقيق كشوفات الشرقاط وتكريت</p>
            </div>
            <div>
                <input type="file" id="upload" class="hidden" accept=".pdf">
                <button onclick="document.getElementById('upload').click()" class="bg-indigo-500 hover:bg-indigo-400 px-8 py-3 rounded-xl font-bold shadow-md transition-all">
                    📂 ارفع ملف الـ PDF
                </button>
            </div>
        </div>

        <input type="text" id="search" onkeyup="filter()" placeholder="بحث باسم الصيدلية أو رقم الحساب..." class="w-full p-4 rounded-xl border-2 border-gray-200 mb-8 outline-none focus:border-indigo-500 font-bold">

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 font-bold text-2xl">✕</button>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase">Print</button>
                    <button id="wa" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase">WhatsApp</button>
                </div>
            </div>
            <div id="modalContent" class="p-8 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let store = {};

        // دالة تنظيف النصوص من رموز نظام أصيل (ѧ) ودمج الحروف
        function clean(t) {
            return t.replace(/ѧ/g, '').replace(/([ا-ي])\s(?=[ا-ي])/g, '$1').trim();
        }

        document.getElementById('upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const ab = await file.arrayBuffer();
            const pdf = await pdfjs.getDocument({data: ab}).promise;
            store = {};

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const text = content.items.map(s => s.str).join(' ');

                // البحث عن رقم الحساب والاسم
                let idMatch = text.match(/(?:رقم|رق م|الحساب)[:\-\s]*(\d{2,6})/);
                let nameMatch = text.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|رق م|الموبايل|العن)/);

                if (idMatch) {
                    let id = idMatch[1];
                    let name = nameMatch ? clean(nameMatch[1]) : "جهة غير معروفة";

                    if (!store[id]) store[id] = { id, name, bills: [], total: 0 };

                    // سحب الفواتير (رقم، تاريخ، مبلغ)
                    let regex = /(\d{5,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                    let m;
                    while ((m = regex.exec(text)) !== null) {
                        store[id].bills.push({ n: m[1], d: m[2], a: m[3] });
                        store[id].total += parseFloat(m[3].replace(/,/g, ''));
                    }
                }
            }
            render();
        });

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            Object.values(store).forEach(c => {
                if(c.total > 0) {
                    grid.innerHTML += `
                    <div class="p-6 rounded-2xl pharmacy-card shadow-sm" onclick="openDetails('${c.id}')" data-s="${c.name} ${c.id}">
                        <div class="text-[10px] font-black text-indigo-500 mb-2 uppercase italic tracking-widest">ID: ${c.id}</div>
                        <h3 class="text-lg font-black text-gray-800 mb-4 h-12 overflow-hidden">${c.name}</h3>
                        <div class="border-t pt-4 flex justify-between items-center">
                            <span class="text-[10px] text-gray-400 font-bold uppercase">Balance</span>
                            <span class="text-xl font-black text-indigo-600">${c.total.toLocaleString()} د.ع</span>
                        </div>
                    </div>`;
                }
            });
        }

        function openDetails(id) {
            const c = store[id];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('wa').onclick = () => {
                window.open(`https://wa.me/?text=*كشف حساب مكتب بيور*%0A*العميل:* ${c.name}%0A*الإجمالي:* ${c.total.toLocaleString()} د.ع`, '_blank');
            };

            document.getElementById('modalContent').innerHTML = `
                <div class="text-right mb-8">
                    <h2 class="text-3xl font-black text-gray-900">${c.name}</h2>
                    <p class="text-indigo-500 font-bold">رقم الحساب: ${c.id}</p>
                </div>
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b text-gray-400">
                            <th class="p-4 text-xs font-black">مطابقة</th>
                            <th class="p-4 text-xs font-black text-center">رقم الفاتورة</th>
                            <th class="p-4 text-xs font-black text-left">المبلغ المتبقي</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${c.bills.map((b, i) => `
                        <tr id="row-${i}" class="border-b border-gray-50">
                            <td class="p-4"><input type="checkbox" onchange="document.getElementById('row-${i}').classList.toggle('checked-row', this.checked)" class="w-6 h-6 accent-indigo-600 cursor-pointer"></td>
                            <td class="p-4 font-bold text-gray-700 text-center font-mono">${b.n}</td>
                            <td class="p-4 font-black text-indigo-900 text-left text-lg">${b.a} د.ع</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
                <div class="mt-8 bg-indigo-900 text-white p-8 rounded-2xl flex justify-between items-center shadow-xl">
                    <span class="font-bold opacity-60">إجمالي الحساب المتبقي</span>
                    <span class="text-3xl font-black">${c.total.toLocaleString()} د.ع</span>
                </div>
            `;
        }

        function filter() {
            let q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('[data-s]').forEach(card => {
                card.style.display = card.getAttribute('data-s').toLowerCase().includes(q) ? "block" : "none";
            });
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
