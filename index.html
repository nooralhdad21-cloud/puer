<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pharma | المفاعل الشغال</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .card-pharmacy { background: #1e293b; border: 1px solid #334155; transition: 0.3s; cursor: pointer; }
        .card-pharmacy:hover { border-color: #6366f1; transform: scale(1.03); box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        .checked-row { background: #064e3b !important; opacity: 0.5; text-decoration: line-through; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media print { .no-print { display: none !important; } body { background: white; color: black; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl mb-10 border border-slate-700 no-print">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-right">
                    <h1 class="text-4xl font-black italic text-indigo-500">PURE PHARMA</h1>
                    <p class="text-slate-400 font-bold mt-2">نظام كشوفات الشرقاط وتكريت - إصدار القوة</p>
                </div>
                <div class="flex flex-col items-center">
                    <input type="file" id="pdfInput" class="hidden" accept=".pdf">
                    <button onclick="document.getElementById('pdfInput').click()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-5 rounded-2xl font-black text-xl shadow-xl transition-all active:scale-95">
                        📂 ارفع الملف الآن
                    </button>
                    <div id="loadingStatus" class="hidden mt-4 flex items-center gap-3">
                        <div class="loader"></div>
                        <span class="text-indigo-400 font-bold">جاري تحليل البيانات...</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="no-print mb-8">
            <input type="text" id="search" onkeyup="doSearch()" placeholder="ابحث باسم الصيدلية أو رقم الحساب..." class="w-full p-6 rounded-2xl bg-slate-800 border-2 border-slate-700 text-white focus:border-indigo-500 outline-none font-bold text-xl transition-all shadow-inner">
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md no-print">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-4xl max-h-[90vh] rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <button onclick="closeModal()" class="text-slate-400 hover:text-white font-black text-2xl px-4 italic">إغلاق ✕</button>
                <div class="flex gap-4">
                    <button onclick="window.print()" class="bg-white text-black px-6 py-2 rounded-xl font-black text-xs uppercase italic">Print</button>
                    <button id="wa" class="bg-green-600 text-white px-6 py-2 rounded-xl font-black text-xs uppercase italic">WhatsApp</button>
                </div>
            </div>
            <div id="modalContent" class="p-8 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let dataStore = {};

        function clean(str) {
            return str.replace(/ѧ/g, '').replace(/([ا-ي])\s(?=[ا-ي])/g, '$1').trim();
        }

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loadingStatus').classList.remove('hidden');
            const arrayBuffer = await file.arrayBuffer();
            
            try {
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                dataStore = {};

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const text = content.items.map(s => s.str).join(' ');

                    let idMatch = text.match(/(?:رقم|رق م|الحساب)[:\-\s]*(\d{2,6})/);
                    let nameMatch = text.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|رق م|الموبايل|العن)/);

                    if (idMatch) {
                        let id = idMatch[1];
                        let name = nameMatch ? clean(nameMatch[1]) : "جهة: " + id;
                        if (!dataStore[id]) dataStore[id] = { id, name, bills: [], total: 0 };

                        let billRegex = /(\d{5,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                        let m;
                        while ((m = billRegex.exec(text)) !== null) {
                            dataStore[id].bills.push({ n: m[1], d: m[2], a: m[3] });
                            dataStore[id].total += parseFloat(m[3].replace(/,/g, ''));
                        }
                    }
                }
                render();
            } catch (err) { console.error(err); }
            document.getElementById('loadingStatus').classList.add('hidden');
        });

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            Object.values(dataStore).forEach(c => {
                if(c.total > 0) {
                    grid.innerHTML += `
                    <div class="p-8 rounded-[2rem] card-pharmacy" onclick="openDetails('${c.id}')" data-s="${c.name} ${c.id}">
                        <div class="text-[10px] font-black text-indigo-400 mb-2 uppercase italic">ID: ${c.id}</div>
                        <h3 class="text-xl font-black text-white leading-tight mb-8 h-14 overflow-hidden text-right">${c.name}</h3>
                        <div class="flex justify-between items-center border-t border-slate-700 pt-6">
                            <span class="text-slate-500 text-[10px] font-bold uppercase italic">Total Balance</span>
                            <span class="text-indigo-500 font-black text-2xl tracking-tighter">${c.total.toLocaleString()} <small class="text-[10px]">د.ع</small></span>
                        </div>
                    </div>`;
                }
            });
        }

        function openDetails(id) {
            const c = dataStore[id];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('wa').onclick = () => {
                window.open(`https://wa.me/?text=*بيور العلمي*%0A*العميل:* ${c.name}%0A*الإجمالي:* ${c.total.toLocaleString()} د.ع`, '_blank');
            };

            document.getElementById('modalContent').innerHTML = `
                <div class="text-right mb-10 border-r-8 border-indigo-500 pr-6">
                    <h2 class="text-3xl font-black text-white">${c.name}</h2>
                    <p class="text-indigo-500 font-bold italic">Account ID: ${c.id}</p>
                </div>
                <div class="space-y-4">
                    ${c.bills.map((b, i) => `
                        <div id="row-${i}" class="flex justify-between items-center bg-slate-800 p-5 rounded-2xl border border-slate-700">
                            <input type="checkbox" onchange="document.getElementById('row-${i}').classList.toggle('checked-row', this.checked)" class="w-7 h-7 accent-indigo-500 cursor-pointer">
                            <div class="text-center">
                                <span class="block text-[10px] text-slate-500 font-bold">الفاتورة</span>
                                <span class="font-mono font-black text-white">${b.n}</span>
                            </div>
                            <div class="text-left">
                                <span class="block text-[10px] text-indigo-500 font-bold uppercase tracking-widest">${b.d}</span>
                                <span class="font-black text-xl text-white">${b.a} د.ع</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="mt-10 bg-indigo-600 text-white p-10 rounded-[2.5rem] flex justify-between items-center shadow-2xl">
                    <span class="text-sm font-black uppercase italic opacity-70">Final Total</span>
                    <span class="text-4xl font-black italic">${c.total.toLocaleString()} د.ع</span>
                </div>
            `;
        }

        function doSearch() {
            let q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('[data-s]').forEach(card => {
                card.style.display = card.getAttribute('data-s').toLowerCase().includes(q) ? "block" : "none";
            });
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
