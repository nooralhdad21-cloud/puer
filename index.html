<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pharma | نظام الفلترة والتصدير</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="bg-indigo-900 text-white p-8 rounded-[2.5rem] shadow-2xl mb-8 no-print border-b-8 border-indigo-500">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-right">
                    <h1 class="text-3xl font-black italic tracking-tighter">PURE PHARMA SYSTEM</h1>
                    <p class="text-indigo-200 font-bold text-sm mt-1">نظام التصفية، الإخفاء، وتصدير الكشوفات</p>
                </div>
                <div class="flex flex-col items-center">
                    <input type="file" id="pdfInput" class="hidden" accept=".pdf">
                    <button onclick="document.getElementById('pdfInput').click()" class="bg-white text-indigo-900 px-10 py-4 rounded-2xl font-black shadow-lg hover:bg-indigo-50 transition-all active:scale-95">
                        📂 ارفع كشف الـ PDF
                    </button>
                    <div id="loader" class="hidden mt-4 text-xs font-bold animate-pulse text-indigo-300">جاري معالجة الكشوفات...</div>
                </div>
            </div>
        </header>

        <div class="no-print grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <input type="text" id="search" onkeyup="filterUI()" placeholder="ابحث باسم الصيدلية..." class="md:col-span-2 p-5 rounded-2xl border-2 border-slate-200 focus:border-indigo-500 outline-none font-bold shadow-sm">
            <button onclick="resetAll()" class="bg-slate-200 text-slate-700 font-bold p-5 rounded-2xl hover:bg-slate-300 transition">إظهار الكل المحذوف 👁️</button>
        </div>

        <div id="mainGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/90 hidden z-50 flex items-center justify-center p-2 md:p-4 backdrop-blur-md no-print">
        <div class="bg-white rounded-[3rem] w-full max-w-5xl max-h-[92vh] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <button onclick="closeModal()" class="text-red-500 font-black text-2xl w-12 h-12 bg-red-50 rounded-full hover:bg-red-500 hover:text-white transition">✕</button>
                <div class="flex gap-3">
                    <button onclick="window.print()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black text-xs hover:bg-indigo-700 shadow-lg">🖨️ طباعة كشف مفوتر</button>
                    <button id="waBtn" class="bg-green-600 text-white px-8 py-3 rounded-xl font-black text-xs hover:bg-green-700 shadow-lg">📱 إرسال واتساب</button>
                </div>
            </div>
            <div id="modalBody" class="p-6 md:p-10 overflow-y-auto custom-scroll"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
