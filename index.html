<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pharma PRO | Universal Finance</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #4f46e5; --bg-main: #f8fafc; }
        body { background-color: var(--bg-main); font-family: 'Cairo', sans-serif; }
        
        /* تصميم البطاقات */
        .pharmacy-card { transition: all 0.3s ease; border-radius: 2rem; }
        .pharmacy-card:hover { transform: translateY(-5px); shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        
        /* إعدادات الطباعة */
        @media print { .no-print { display: none !important; } body { background: white; } }
        
        /* أنيميشن التحميل */
        .loader-spin { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* مظهر المودال */
        #modalOverlay { backdrop-filter: blur(8px); transition: opacity 0.3s ease; }
        .row-checked { background-color: #f0fdf4 !important; opacity: 0.5; text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="max-w-6xl mx-auto p-4 lg:p-10">
        <header class="bg-slate-900 rounded-[2.5rem] p-8 lg:p-12 shadow-2xl mb-10 no-print text-center lg:text-right relative overflow-hidden">
            <div class="relative z-10 flex flex-col lg:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-4xl lg:text-5xl font-black text-white mb-2 italic">PURE PHARMA <span class="text-indigo-400">PRO</span></h1>
                    <p class="text-slate-400 font-bold">المعالج العالمي: (الأصيل، الأمين، Excel، PDF)</p>
                </div>
                <div class="flex flex-col items-center">
                    <input type="file" id="fileInput" class="hidden" accept=".pdf, .xlsx, .xls, .csv">
                    <button onclick="document.getElementById('fileInput').click()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-4 rounded-2xl font-black shadow-lg transition-all flex items-center gap-3 text-lg">
                        <span>إدراج كشف الحساب</span>
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <div id="loader" class="hidden mt-4 flex items-center gap-2 text-indigo-400 font-bold">
                        <div class="loader-spin"></div> جاري المعالجة...
                    </div>
                </div>
