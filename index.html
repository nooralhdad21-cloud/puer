<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PurePharma | نظام المطابقة الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: 'Cairo', sans-serif; }
        .pharmacy-card { background: white; border-radius: 1rem; border-right: 6px solid #1e40af; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .invoice-row { border-bottom: 1px solid #f1f5f9; transition: 0.2s; }
        .invoice-row:hover { background-color: #f8fafc; }
        .num-font { font-family: sans-serif; font-weight: 700; }
        .sticky-header { position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 2px solid #e2e8f0; }
    </style>
</head>
<body class="p-4">

    <div id="uploadScreen" class="max-w-xl mx-auto mt-20 p-10 bg-white rounded-3xl shadow-2xl text-center border-2 border-dashed border-blue-200">
        <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg rotate-3">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        </div>
        <h2 class="text-2xl font-black text-slate-800 mb-2">مكتب بيور العلمي</h2>
        <p class="text-slate-500 mb-8 font-bold">ارفع كشف "أصيل" لبدء الجرد والتدقيق</p>
        <label class="bg-blue-600 hover:bg-blue-700 text-white px-12 py-4 rounded-2xl font-black cursor-pointer inline-block shadow-xl transition-transform hover:scale-105">
            اختيار الملف
            <input type="file" id="pdfInput" accept=".pdf" class="hidden">
        </label>
    </div>

    <div id="mainDashboard" class="hidden max-w-4xl mx-auto">
        <header class="sticky-header p-4 mb-6 rounded-2xl flex justify-between items-center shadow-sm">
            <div>
                <h1 class="text-xl font-black text-blue-900">PUREPHARMA <span class="text-blue-500">AUDIT</span></h1>
                <p id="fileInfo" class="text-[10px] font-bold text-slate-400"></p>
            </div>
            <div class="flex gap-4">
                <div class="text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase">إجمالي المطابقة</p>
                    <p id="matchTotal" class="text-lg font-black text-emerald-600 num-font">0</p>
                </div>
            </div>
        </header>

        <input type="text" id="search" onkeyup="render()" placeholder="ابحث باسم الصيدلية أو رقم الفاتورة..." class="w-full p-5 mb-6 bg-white rounded-2xl shadow-sm outline-none border-2 border-transparent focus:border-blue-500 font-bold">

        <div id="contentList" class="space-y-6 pb-20"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let store = [];

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(this.result) }).promise;
                let fullData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    fullData.push(...text.items.map(it => ({ str: it.str, y: Math.round(it.transform[5]) })));
                }
                processAseelFile(fullData);
            };
            reader.readAsArrayBuffer(file);
        });

        function processAseelFile(data) {
            store = [];
            let currentShop = "غير معروف";
            
            // ترتيب البيانات من الأعلى للأسفل لضمان قراءة الترويسة قبل الفواتير
            data.sort((a, b) => b.y - a.y);

            data.forEach((item, index) => {
                let txt = item.str.trim();

                // 1. التقاط اسم الصيدلية من "المستطيل الأزرق" (الترويسة)
                if ((txt.includes("صيدلية") || txt.includes("مذخر") || txt.includes("مكتب")) && !txt.includes("بيور")) {
                    currentShop = txt.replace(/ѧ|:|الاسم|رقم الموبايل|العنوان/g, '').trim();
                }

                // 2. التقاط الفواتير المرتبطة بهذا الاسم
                if (/^\d{5,6}$/.test(txt)) {
                    let inv = {
                        shop: currentShop,
                        id: txt,
                        date: "---",
                        amount: 0,
                        checked: false
                    };

                    // البحث عن المبلغ والتاريخ في نفس السطر (Y متقارب)
                    const row = data.filter(it => Math.abs(it.y - item.y) < 10);
                    row.forEach(r => {
                        if (r.str.includes('/')) inv.date = r.str;
                        if (/^[\d,]+\.\d{2}$/.test(r.str)) {
                            inv.amount = parseFloat(r.str.replace(/,/g, ''));
                        }
                    });

                    if (inv.amount > 0) store.push(inv);
                }
            });

            document.getElementById('uploadScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            render();
        }

        function render() {
            const list = document.getElementById('contentList');
            list.innerHTML = "";
            const q = document.getElementById('search').value.toLowerCase();

            let groups = {};
            store.forEach(v => {
                if (v.shop.toLowerCase().includes(q) || v.id.includes(q)) {
                    if (!groups[v.shop]) groups[v.shop] = { items: [], total: 0 };
                    groups[v.shop].items.push(v);
                    groups[v.shop].total += v.amount;
                }
            });

            Object.keys(groups).forEach(name => {
                const g = groups[name];
                const card = document.createElement('div');
                card.className = "pharmacy-card p-6 mb-4";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4 border-b pb-3">
                        <div>
                            <h3 class="text-lg font-black text-slate-800">${name}</h3>
                            <p class="text-[10px] font-bold text-blue-600 uppercase italic">المجموع الكلي: ${g.total.toLocaleString()} د.ع</p>
                        </div>
                        <div class="bg-blue-50 px-3 py-1 rounded-lg border border-blue-100 font-black text-blue-700 text-xs">
                            فواتير: ${g.items.length}
                        </div>
                    </div>
                    <div class="space-y-2">
                        ${g.items.map(inv => `
                            <div onclick="toggleInv('${inv.id}')" class="invoice-row p-3 flex justify-between items-center cursor-pointer rounded-xl ${inv.checked ? 'bg-emerald-50 opacity-60' : ''}">
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6 border-2 rounded flex items-center justify-center ${inv.checked ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200'}">
                                        ${inv.checked ? '✓' : ''}
                                    </div>
                                    <div>
                                        <p class="text-xs font-black text-slate-700">#${inv.id}</p>
                                        <p class="text-[9px] text-slate-400 font-bold uppercase">${inv.date}</p>
                                    </div>
                                </div>
                                <p class="font-black text-slate-800 num-font">${inv.amount.toLocaleString()}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
                list.appendChild(card);
            });
            updateTotal();
        }

        function toggleInv(id) {
            const item = store.find(x => x.id === id);
            item.checked = !item.checked;
            render();
        }

        function updateTotal() {
            let total = 0;
            store.filter(x => x.checked).forEach(i => total += i.amount);
            document.getElementById('matchTotal').innerText = total.toLocaleString() + " د.ع";
        }
    </script>
</body>
</html>
