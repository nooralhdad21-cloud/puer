<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pure Pharma | نظام القراءة المباشرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; }
        .invoice-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; margin-bottom: 2rem; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        @media print { .no-print { display: none !important; } .invoice-card { border: 2px solid #000; box-shadow: none; page-break-inside: avoid; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="bg-slate-900 text-white p-8 rounded-[2.5rem] mb-10 text-center no-print shadow-2xl border-b-8 border-indigo-600">
            <h1 class="text-3xl font-black mb-2 text-indigo-400">PURE PHARMA <span class="text-white">ULTRA</span></h1>
            <p class="text-slate-400 text-sm mb-6 font-bold underline">نظام قراءة الملفات المشفرة (الشرقاط 2026)</p>
            
            <input type="file" id="pdfUpload" class="hidden" accept=".pdf">
            <button onclick="document.getElementById('pdfUpload').click()" class="bg-indigo-600 hover:bg-indigo-500 px-12 py-4 rounded-2xl font-black text-xl transition-all shadow-xl">
                ارفع الملف الآن
            </button>
            <div id="status" class="hidden mt-4 animate-pulse text-indigo-300 font-bold">جاري استخراج البيانات من المواقع المشفرة...</div>
        </header>

        <div id="output" class="space-y-8">
            <div class="text-center py-20 border-4 border-dashed border-slate-300 rounded-[3rem] text-slate-400 font-bold italic">
                بانتظار الملف لسحب الأسماء والتفاصيل..
            </div>
        </div>
    </div>

    <script>
        const pdfJS = window['pdfjs-dist/build/pdf'];
        pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // وظيفة تنظيف احترافية لملفات "بيور"
        function fixPureText(str) {
            if (!str) return "";
            // حذف الرموز الغريبة ودمج الكلمات المقطعة
            return str.replace(/[ѧ\x00-\x1F\x7F-\x9F]/g, "").replace(/\s+/g, " ").trim();
        }

        document.getElementById('pdfUpload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('status').classList.remove('hidden');
            const container = document.getElementById('output');
            container.innerHTML = "";

            const buffer = await file.arrayBuffer();
            const pdf = await pdfJS.getDocument({data: buffer}).promise;

            let finalData = {};

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                
                // سحب النصوص مع الحفاظ على ترتيبها في الصفحة
                const items = content.items.map(it => ({
                    text: fixPureText(it.str),
                    y: it.transform[5] // الارتفاع العمودي في الصفحة
                })).filter(it => it.text.length > 0);

                let pageName = "غير معروف", pageAddr = "الشرقاط", pagePhone = "---";
                let pageBills = [];

                // 1. استخراج الاسم والعنوان (دائماً في أعلى الصفحة - إحداثيات Y عالية)
                items.sort((a, b) => b.y - a.y); // ترتيب من الأعلى للأسفل
                
                const topItems = items.slice(0, 15); // أول 15 نص في الصفحة
                topItems.forEach((item, idx) => {
                    // إذا وجدنا نصاً طويلاً ليس فيه "بيور" ولا أرقام، فهو الاسم
                    if (item.text.length > 10 && !item.text.includes("بيور") && !item.text.includes("202")) {
                        if (pageName === "غير معروف") pageName = item.text;
                    }
                    // إذا وجدنا نصاً يبدأ بـ 07 فهو الموبايل
                    if (item.text.startsWith("07")) pagePhone = item.text;
                    // إذا وجدنا نصاً يحتوي على "حي" أو "شارع" فهو العنوان
                    if (item.text.includes("حي") || item.text.includes("شارع")) pageAddr = item.text;
                });

                // 2. استخراج الفواتير
                items.forEach((item, idx) => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.text)) {
                        let date = item.text;
                        let amt = 0, invId = "---";
                        
                        // البحث عن أقرب مبلغ ورقم قائمة
                        for (let n = -8; n <= 8; n++) {
                            let neighbor = items[idx + n];
                            if (!neighbor) continue;
                            if (/^(\d{1,3}(,\d{3})*(\.\d{2}))$/.test(neighbor.text)) amt = parseFloat(neighbor.text.replace(/,/g, ''));
                            if (/^\d{5,7}$/.test(neighbor.text)) invId = neighbor.text;
                        }

                        if (amt > 100) {
                            pageBills.push({ date, invId, amt });
                        }
                    }
                });

                if (pageBills.length > 0) {
                    if (!finalData[pageName]) finalData[pageName] = { name: pageName, addr: pageAddr, phone: pagePhone, bills: [], total: 0 };
                    pageBills.forEach(b => {
                        if (!finalData[pageName].bills.find(x => x.invId === b.invId)) {
                            finalData[pageName].bills.push(b);
                            finalData[pageName].total += b.amt;
                        }
                    });
                }
            }

            // عرض النتائج
            Object.values(finalData).forEach(shop => {
                let rowsHtml = shop.bills.map(b => `
                    <tr class="border-b border-slate-50">
                        <td class="p-3 text-right font-bold text-slate-500">${b.date}</td>
                        <td class="p-3 text-center text-indigo-600 font-black">${b.invId}</td>
                        <td class="p-3 text-left font-black text-slate-800">${b.amt.toLocaleString()}</td>
                    </tr>
                `).join('');

                container.innerHTML += `
                    <div class="invoice-card">
                        <div class="bg-slate-900 p-8 text-white">
                            <h2 class="text-3xl font-black mb-4 text-indigo-400">${shop.name}</h2>
                            <div class="grid grid-cols-2 gap-4 text-xs opacity-70">
                                <span>📍 الموقع: ${shop.addr}</span>
                                <span>📞 الموبايل: ${shop.phone}</span>
                            </div>
                        </div>
                        <table class="w-full text-sm">
                            <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase border-b">
                                <tr><th class="p-3 text-right">التاريخ</th><th class="p-3 text-center">القائمة</th><th class="p-3 text-left">المبلغ المتبقي</th></tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                        <div class="p-6 bg-indigo-50 flex justify-between items-center border-t border-indigo-100">
                            <span class="font-black text-indigo-900 italic">مجموع الذمة النهائية:</span>
                            <span class="text-3xl font-black text-indigo-700">${shop.total.toLocaleString()} <small class="text-xs">IQD</small></span>
                        </div>
                    </div>
                `;
            });
            document.getElementById('status').classList.add('hidden');
        };
    </script>
</body>
</html>
