<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CORE SYNC | ULTRA SMART</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: 'Cairo', sans-serif; }
        .card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .drawer { max-height: 0; overflow: hidden; transition: all 0.5s ease; }
        .drawer.open { max-height: 10000px; padding: 1rem; }
        .num-font { font-family: sans-serif; font-weight: 700; }
        .btn-primary { background: #1e3a8a; color: white; transition: 0.3s; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4">

    <nav class="max-w-3xl mx-auto mb-6 flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-800 rounded-xl flex items-center justify-center text-white font-black text-xl italic">X</div>
            <h1 class="text-lg font-black text-slate-800">نظام التدقيق الذكي</h1>
        </div>
        <div id="loader" class="hidden animate-spin rounded-full h-6 w-6 border-b-2 border-blue-800"></div>
    </nav>

    <main class="max-w-3xl mx-auto">
        <div id="uploadBox" class="card p-16 text-center border-2 border-dashed border-blue-200">
            <h2 class="text-2xl font-black mb-4">ارفع ملف (كشف الشرقاط) هنا</h2>
            <p class="text-slate-500 mb-8 text-sm font-bold">سأقوم بتنظيف الرموز ѧѧ وفك تشفير الأسماء تلقائياً</p>
            <label class="btn-primary px-12 py-4 rounded-2xl font-black cursor-pointer inline-block shadow-lg">
                اختيار ملف PDF
                <input type="file" id="pdfFile" accept=".pdf" class="hidden">
            </label>
        </div>

        <div id="dashboard" class="hidden space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="card p-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase">إجمالي الدين المتبقي</p>
                    <h3 id="totalSum" class="text-2xl font-black text-blue-800 num-font">0</h3>
                </div>
                <div class="card p-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase">عدد الصيدليات</p>
                    <h3 id="shopCount" class="text-2xl font-black text-slate-800 num-font">0</h3>
                </div>
            </div>

            <input type="text" id="searchInput" onkeyup="render()" placeholder="ابحث باسم الصيدلية أو رقم الفاتورة..." class="w-full p-5 card outline-none focus:border-blue-500 font-bold">

            <div id="results" class="space-y-4"></div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let mainData = [];

        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loader').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let allItems = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    // تحويل مصفوفة النصوص إلى كائنات تحتوي على النص ومكانه (Y-axis)
                    const pageLines = textContent.items.map(item => ({
                        text: item.str,
                        y: Math.round(item.transform[5]), // موقع السطر في الصفحة
                        x: Math.round(item.transform[4])
                    }));
                    allItems = allItems.concat(pageLines);
                }
                processSmart(allItems);
            };
            reader.readAsArrayBuffer(file);
        });

        function processSmart(data) {
            mainData = [];
            let currentShop = "غير محدد";

            // فرز البيانات حسب موقعها في الصفحة (من الأعلى للأسفل)
            data.sort((a, b) => b.y - a.y);

            for (let i = 0; i < data.length; i++) {
                let txt = data[i].text.trim();
                
                // تنظيف الاسم من رموز أصيل
                let cleanTxt = txt.replace(/ѧ|:|الاسم|مذخر|صيدلية|مكتب/g, '').trim();

                if (txt.includes("صيدلية") || txt.includes("مذخر") || txt.includes("مكتب")) {
                    currentShop = txt.replace(/ѧ|:|الاسم/g, '').trim();
                    if (currentShop === "") currentShop = data[i+1]?.text.replace(/ѧ|:/g, '').trim();
                }

                // التقاط رقم الفاتورة (5-6 أرقام)
                if (/^\d{5,6}$/.test(txt)) {
                    let record = {
                        shop: currentShop,
                        id: txt,
                        date: "---",
                        rem: "0.00",
                        checked: false
                    };

                    // البحث عن المبالغ والتاريخ في محيط هذا السطر (نطاق Y متقارب)
                    const rowItems = data.filter(item => Math.abs(item.y - data[i].y) < 15);
                    
                    rowItems.forEach(item => {
                        if (item.text.includes('/')) record.date = item.text;
                        if (/^[\d,]+\.\d{2}$/.test(item.text.trim())) {
                            // نأخذ القيمة الأكبر كـ "متبقي" في حال تداخلت الأرقام
                            record.rem = item.text.trim();
                        }
                    });

                    mainData.push(record);
                }
            }

            document.getElementById('uploadBox').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('loader').classList.add('hidden');
            render();
        }

        function render() {
            const list = document.getElementById('results');
            list.innerHTML = "";
            const query = document.getElementById('searchInput').value.toLowerCase();

            // تجميع حسب الصيدلية
            let groups = {};
            mainData.forEach(inv => {
                if (inv.shop.toLowerCase().includes(query) || inv.id.includes(query)) {
                    if (!groups[inv.shop]) groups[inv.shop] = { items: [], total: 0 };
                    groups[inv.shop].items.push(inv);
                    groups[inv.shop].total += parseFloat(inv.rem.replace(/,/g, ''));
                }
            });

            document.getElementById('shopCount').innerText = Object.keys(groups).length;

            Object.keys(groups).forEach(name => {
                const g = groups[name];
                const card = document.createElement('div');
                card.className = "card overflow-hidden mb-4";
                card.innerHTML = `
                    <div onclick="this.nextElementSibling.classList.toggle('open')" class="p-5 flex justify-between items-center cursor-pointer hover:bg-slate-50">
                        <div>
                            <h3 class="font-black text-slate-800 text-sm">${name}</h3>
                            <p class="text-[10px] text-blue-600 font-bold uppercase mt-1">عدد الفواتير: ${g.items.length} | المجموع: ${g.total.toLocaleString()} د.ع</p>
                        </div>
                        <span class="text-slate-300">▼</span>
                    </div>
                    <div class="drawer border-t bg-slate-50">
                        <div class="space-y-3">
                            ${g.items.map(inv => `
                                <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                                    <div>
                                        <p class="text-[10px] font-black text-slate-400 mb-1">فاتورة #${inv.id} | ${inv.date}</p>
                                        <p class="text-blue-800 font-black num-font">${inv.rem} <span class="text-[9px]">د.ع</span></p>
                                    </div>
                                    <div onclick="toggleCheck('${inv.id}')" class="w-10 h-10 border-2 rounded-xl flex items-center justify-center cursor-pointer ${inv.checked ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-white text-slate-200 border-slate-100'}">
                                        ✓
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
            updateTotal();
        }

        function toggleCheck(id) {
            const item = mainData.find(x => x.id === id);
            item.checked = !item.checked;
            render();
        }

        function updateTotal() {
            let sum = 0;
            mainData.filter(x => x.checked).forEach(v => sum += parseFloat(v.rem.replace(/,/g, '')));
            document.getElementById('totalSum').innerText = sum.toLocaleString() + " د.ع";
        }
    </script>
</body>
</html>
