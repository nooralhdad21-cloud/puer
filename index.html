<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE SYNC | المنصة الأولى للتدقيق في العراق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f0f4f8; font-family: 'Cairo', sans-serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 2px solid #3b82f6; }
        .stat-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .drawer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .drawer.open { max-height: 5000px; padding-top: 1rem; }
        .num-font { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: 700; }
    </style>
</head>
<body class="pb-10 text-slate-800">

    <nav class="sticky top-0 z-50 glass-nav p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-700 rounded-2xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-black text-xl">CS</span>
                </div>
                <div>
                    <h1 class="text-xl font-black text-blue-900 tracking-tighter">CORE SYNC <span class="text-blue-500 font-bold">ELITE</span></h1>
                    <p class="text-[9px] font-bold text-slate-500 tracking-widest uppercase">نظام المطابقة الميداني الأول</p>
                </div>
            </div>
            <button onclick="exportFullReport()" class="hidden id="reportBtn" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-[10px] font-black hover:bg-blue-700 transition-all">تحميل التقرير النهائي</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-2xl mt-8">

        <div id="welcome" class="stat-card p-12 text-center">
            <div class="text-6xl mb-6">🇮🇶</div>
            <h2 class="text-2xl font-black mb-2 italic">أهلاً بك في منصة التدقيق العراقي</h2>
            <p class="text-slate-500 text-sm mb-10 leading-relaxed">ارفع كشف "بيور / أصيل" وسنقوم بالتنظيف العميق للبيانات فوراً.</p>
            <label class="bg-blue-700 hover:bg-blue-800 text-white px-16 py-5 rounded-2xl font-black cursor-pointer shadow-xl inline-block transition-transform hover:scale-105">
                بدء استيراد الكشف
                <input type="file" id="pdfIn" accept=".pdf" class="hidden">
            </label>
        </div>

        <div id="dash" class="hidden space-y-6">
            
            <div class="stat-card p-6 grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">من تاريخ</label>
                    <input type="date" id="dateFrom" onchange="render()" class="w-full p-2 rounded-lg border border-slate-200 text-xs font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1">إلى تاريخ</label>
                    <input type="date" id="dateTo" onchange="render()" class="w-full p-2 rounded-lg border border-slate-200 text-xs font-bold">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="stat-card p-6 border-r-8 border-blue-600">
                    <p class="text-[10px] font-black text-slate-400 uppercase">إجمالي الدين المختار</p>
                    <h3 id="totalSumLabel" class="text-2xl font-black text-blue-900 num-font">0</h3>
                </div>
                <div class="stat-card p-6 border-r-8 border-emerald-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase">فواتير تمت مطابقتها</p>
                    <h3 id="countLabel" class="text-2xl font-black text-emerald-600 num-font">0</h3>
                </div>
            </div>

            <input type="text" id="search" onkeyup="render()" placeholder="ابحث باسم الصيدلية أو رقم الفاتورة..." class="w-full p-5 stat-card outline-none focus:ring-2 focus:ring-blue-500 font-bold text-sm">

            <div id="list" class="space-y-4 pb-20"></div>
        </div>

    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let store = [];

        document.getElementById('pdfIn').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(this.result) }).promise;
                let fullText = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText = fullText.concat(content.items.map(s => s.str));
                }
                deepCleanProcess(fullText);
            };
            reader.readAsArrayBuffer(file);
        });

        function deepCleanProcess(lines) {
            store = [];
            let currentName = "جهة غير معروفة";
            
            for (let i = 0; i < lines.length; i++) {
                let raw = lines[i].trim();
                
                // التنظيف العميق (Deep Cleaning) - مسح الرموز والكلمات الزائدة
                let cleanLine = raw.replace(/ѧ|:|رقم:|الاسم:|عنوان:|رقم الموبايل:|ѧ/g, '').trim();

                if (cleanLine.includes("صيدلية") || cleanLine.includes("مذخر") || cleanLine.includes("مكتب")) {
                    currentName = cleanLine;
                }

                // كشف الفاتورة (نمط أصيل)
                if (/^\d{5,6}$/.test(raw)) {
                    let inv = {
                        shop: currentName,
                        id: raw,
                        date: lines[i+1] ? formatToISO(lines[i+1]) : null,
                        dateRaw: lines[i+1] || "---",
                        total: 0, paid: 0, rem: 0, checked: false
                    };

                    let prices = [];
                    for (let j = 1; j < 25; j++) {
                        let c = (lines[i+j] || "").trim();
                        if (/^[\d,]+\.\d{2}$/.test(c)) prices.push(parseFloat(c.replace(/,/g, '')));
                    }

                    if (prices.length >= 3) {
                        inv.total = prices[0]; inv.paid = prices[1]; inv.rem = prices[2];
                    } else if (prices.length === 2) {
                        inv.total = prices[0]; inv.rem = prices[1];
                    }
                    store.push(inv);
                }
            }
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
            render();
        }

        // تحويل التاريخ من DD/MM/YYYY إلى YYYY-MM-DD
