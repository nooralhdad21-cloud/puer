<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مطابقة بيور - النسخة الكاملة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .bill-card { display: flex; flex-direction: column; padding: 15px; background: white; border-radius: 18px; border: 1px solid #e2e8f0; margin-bottom: 10px; transition: 0.3s ease; }
        .is-active { border-right: 8px solid #10b981; }
        .not-active { border-right: 8px solid #ef4444; background-color: #fff1f2; opacity: 0.7; }
        .rotate-180 { transform: rotate(180deg); }
        #toggleArrow { transition: transform 0.3s ease; }
        .note-input { width: 100%; margin-top: 10px; border: 1px dashed #cbd5e1; border-radius: 10px; padding: 5px 10px; font-size: 11px; outline: none; }
        .stamp-box { border: 2px dashed #cbd5e1; border-radius: 20px; padding: 20px; text-align: center; width: 180px; height: 100px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 10px; font-weight: bold; }
        @media print { 
            .no-print { display: none !important; } 
            .report-container { border: none !important; box-shadow: none !important; width: 100%; padding: 0 !important; } 
            #billsList { display: block !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="no-print bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 grid grid-cols-2 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1 italic">المحاسب المسؤول</label>
                <input type="text" id="accInput" oninput="sync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs font-bold">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1 italic">المحافظة</label>
                <select id="provInput" onchange="updateCities(); sync();" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs font-bold"></select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1 italic">القضاء</label>
                <select id="cityInput" onchange="sync()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs font-bold"></select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-indigo-600 mb-1 italic">خصم المطابقة %</label>
                <select id="discInput" onchange="calculate()" class="w-full bg-indigo-50 border border-indigo-100 rounded-xl p-2.5 text-xs font-bold text-indigo-600"></select>
            </div>
        </div>

        <div class="no-print flex gap-4 mb-8">
            <button onclick="document.getElementById('pdfFile').click()" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl text-xs font-black shadow-lg hover:bg-indigo-700 transition-all">رفع كشف الحساب (PDF)</button>
            <button onclick="window.print()" class="flex-1 bg-emerald-600 text-white p-4 rounded-2xl text-xs font-black shadow-lg hover:bg-emerald-700 transition-all">إصدار وطباعة التقرير</button>
            <input type="file" id="pdfFile" class="hidden" accept=".pdf">
        </div>

        <div class="bg-white p-10 md:p-16 rounded-[3rem] shadow-2xl border border-slate-200 report-container min-h-[1000px] flex flex-col">
            
            <div class="flex justify-between items-start border-b-4 border-slate-900 pb-8 mb-10">
                <div>
                    <h1 class="text-5xl font-black text-slate-900 tracking-tighter">مكتب بيور العلمي</h1>
                    <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mt-1 italic">Pure Scientific Bureau / Financial Audit</p>
                </div>
                <div class="text-left text-[11px] font-black space-y-1">
                    <p>الموقع: <span id="outLoc" class="text-indigo-600 italic">..</span></p>
                    <p>المحاسب: <span id="outAcc" class="text-slate-700 italic">..</span></p>
                    <p>التاريخ: <span id="outDate" class="font-mono">..</span></p>
                </div>
            </div>

            <div class="bg-slate-900 p-10 rounded-[2.5rem] text-white flex justify-between items-center mb-10 shadow-xl">
                <div class="flex-1">
                    <p class="text-[10px] font-bold text-indigo-400 mb-2 uppercase tracking-widest italic">اسم العميل / الصيدلية / المذخر</p>
                    <input type="text" id="outClient" placeholder="..." class="text-4xl font-black bg-transparent border-none outline-none w-full text-white placeholder-slate-800">
                </div>
                <div class="text-left border-r-2 border-slate-700 pr-8 pl-4">
                    <p class="text-[10px] font-bold text-slate-500 mb-1 italic">Sub-Total:</p>
                    <p id="outSubTotal" class="text-2xl font-black text-slate-300 font-mono italic">0.00 IQD</p>
                </div>
            </div>

            <div class="bg-slate-50 p-8 rounded-[2rem] border border-slate-100 mb-10 shadow-inner">
                <p id="officialMsg" class="text-sm font-black text-slate-800 text-center italic">يرجى رفع الملف للمطابقة...</p>
                <div id="notesArea" class="mt-6 space-y-2 border-t border-slate-200 pt-6"></div>
            </div>

            <div class="flex justify-between items-center mb-6 no-print">
                <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest italic">تفاصيل الفواتير المشمولة</h3>
                <button onclick="toggleBills()" class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 px-5 py-2 rounded-full transition-all">
                    <span id="btnText" class="text-[10px] font-black text-slate-600">إخفاء القائمة</span>
                    <svg id="toggleArrow" class="w-4 h-4 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
            </div>

            <div id="billsList" class="space-y-4 mb-12"></div>

            <div class="border-t-4 border-slate-900 pt-12 mt-auto">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[11px] font-black text-slate-400 mb-2 italic uppercase">Final Net / الصافي النهائي:</p>
                        <p id="resFinal" class="text-6xl font-black text-slate-900 tracking-tighter italic font-mono">0.00 IQD</p>
                        <p id="tafgeet" class="text-[13px] font-black text-indigo-700 bg-indigo-50 px-6 py-3 rounded-xl border-2 border-indigo-100 mt-6 inline-block italic"></p>
                    </div>

                    <div class="flex gap-6">
                        <div class="stamp-box">توقيع وختم المحاسب</div>
                        <div class="stamp-box">توقيع وختم العميل</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        const iraqGeo = {"بغداد": ["الرصافة", "الكرخ"], "صلاح الدين": ["تكريت", "الشرقاط", "سامراء"], "نينوى": ["الموصل"], "البصرة": ["المركز"]};

        function init() {
            const pSel = document.getElementById('provInput');
            pSel.innerHTML = '<option value="">المحافظة</option>';
            Object.keys(iraqGeo).sort().forEach(p => pSel.innerHTML += `<option value="${p}">${p}</option>`);
            const dSel = document.getElementById('discInput');
            for(let i=0; i<=15; i++) dSel.innerHTML += `<option value="${i}">${i}%</option>`;
            document.getElementById('outDate').innerText = new Date().toLocaleDateString('en-GB');
            updateCities();
        }

        function updateCities() {
            const p = document.getElementById('provInput').value;
            const cSel = document.getElementById('cityInput');
            cSel.innerHTML = '<option value="">القضاء</option>';
            if(p && iraqGeo[p]) iraqGeo[p].forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
        }

        function sync() {
            document.getElementById('outLoc').innerText = (document.getElementById('provInput').value || '..') + " / " + (document.getElementById('cityInput').value || '..');
            document.getElementById('outAcc').innerText = document.getElementById('accInput').value || '..';
            calculate();
        }

        document.getElementById('pdfFile').onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            db = [];
            const pdfJS = window['pdfjs-dist/build/pdf'];
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const pdf = await pdfJS.getDocument({data: await file.arrayBuffer()}).promise;
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const text = await page.getTextContent();
                const items = text.items;
                const client = items.map(it => it.str).find(t => t.includes("مذخر") || t.includes("صيدلية")) || "";
                if(client) document.getElementById('outClient').value = client;

                items.forEach(item => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.str)) {
                        let row = items.filter(it => Math.abs(it.transform[5] - item.transform[5]) < 5).sort((a,b) => b.transform[4] - a.transform[4]);
                        const nums = row.filter(r => /[\d,]+\.\d{2}/.test(r.str));
                        if (nums.length >= 2) {
                            let id = row.find(ri => /^\d{5,7}$/.test(ri.str))?.str || "000";
                            db.push({ id, date: item.str, total: nums[0].str, remain: nums[nums.length-1].str, status: 'ok', note: '' });
                        }
                    }
                });
            }
            renderList();
        };

        function renderList() {
            const list = document.getElementById('billsList');
            list.innerHTML = "";
            db.forEach((b, i) => {
                list.innerHTML += `
                    <div class="bill-card ${b.status === 'ok' ? 'is-active' : 'not-active'}">
                        <div class="flex justify-between items-center">
                            <div onclick="toggleStatus(${i})" class="flex-1 cursor-pointer">
                                <span class="font-black text-slate-900 text-xl font-mono">${b.remain} IQD</span>
                                <div class="text-[9px] font-bold text-slate-400 mt-1 italic uppercase">Original Total: ${b.total}</div>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="text-right border-r-2 border-slate-100 pr-4">
                                    <span class="text-xs font-black text-slate-800 italic">#${b.id}</span>
                                    <span class="block text-[9px] font-bold text-slate-400 font-mono italic">${b.date}</span>
                                </div>
                                <button class="no-print opacity-40 hover:opacity-100 transition-all" onclick="showNote(${i})">📝</button>
                            </div>
                        </div>
                        <input type="text" id="note-${i}" class="note-input no-print ${b.note ? '' : 'hidden'}" placeholder="أضف ملاحظة لهذه الفاتورة..." value="${b.note}" oninput="updateNote(${i}, this.value)">
                    </div>`;
            });
            calculate();
        }

        function calculate() {
            let sumRem = 0; let excl = [];
            db.forEach(b => {
                if (b.status === 'ok') sumRem += parseFloat(b.remain.replace(/,/g,'')) || 0;
                else excl.push(b.id);
            });
            
            const disc = parseFloat(document.getElementById('discInput').value) || 0;
            const final = sumRem - (sumRem * (disc / 100));
            
            document.getElementById('outSubTotal').innerText = sumRem.toLocaleString(undefined, {minimumFractionDigits:2}) + " IQD";
            document.getElementById('resFinal').innerText = final.toLocaleString(undefined, {minimumFractionDigits:2}) + " IQD";
            document.getElementById('tafgeet').innerText = "فقط " + final.toLocaleString('ar-IQ') + " دينار عراقي لا غير";
            
            document.getElementById('officialMsg').innerHTML = excl.length 
                ? `تمت المطابقة بنجاح <span class="text-red-600 underline font-black italic">باستثناء الفواتير (#${excl.join(', #')})</span>.` 
                : "نود إعلامكم بأنه تمت مطابقة الحسابات بين الطرفين بنجاح تـام.";

            const notesArea = document.getElementById('notesArea');
            notesArea.innerHTML = "";
            db.forEach(b => { if(b.note) notesArea.innerHTML += `<p class="text-[11px] text-indigo-700 font-bold bg-white p-3 rounded-xl border border-indigo-100 italic shadow-sm">• فاتورة #${b.id}: ${b.note}</p>`; });
        }

        function toggleStatus(i) { db[i].status = (db[i].status === 'ok' ? 'none' : 'ok'); renderList(); }
        function showNote(i) { document.getElementById(`note-${i}`).classList.toggle('hidden'); }
        function updateNote(i, v) { db[i].note = v; calculate(); }
        
        function toggleBills() {
            const list = document.getElementById('billsList');
            const arrow = document.getElementById('toggleArrow');
            const txt = document.getElementById('btnText');
            if(list.classList.contains('hidden')) {
                list.classList.remove('hidden'); arrow.classList.remove('rotate-180'); txt.innerText = "إخفاء القائمة";
            } else {
                list.classList.add('hidden'); arrow.classList.add('rotate-180'); txt.innerText = "إظهار القائمة";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
