<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PurePharma | نظام الإدارة والتدقيق المركزي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Cairo', sans-serif; overflow: hidden; }
        .sidebar { width: 350px; height: 100vh; background: white; border-left: 2px solid #e2e8f0; overflow-y: auto; }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; background: #f1f5f9; }
        .live-stat { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .pharmacy-item { cursor: pointer; transition: 0.2s; border-bottom: 1px solid #f1f5f9; }
        .pharmacy-item:hover { background: #eff6ff; }
        .pharmacy-item.active { background: #2563eb; color: white; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar flex flex-col">
        <div class="p-6 bg-white border-b-2 sticky top-0 z-10">
            <h1 class="text-xl font-black text-blue-900 mb-2 italic">PUREPHARMA PRO</h1>
            <input type="file" id="pdfFile" class="hidden" accept=".pdf">
            <button onclick="document.getElementById('pdfFile').click()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all">رفع الملف الرئيسي</button>
            <input type="text" id="search" onkeyup="renderSidebar()" placeholder="بحث عن صيدلية..." class="w-full mt-4 p-3 bg-gray-50 border rounded-lg text-sm outline-none focus:border-blue-500">
        </div>
        <div id="pharmacyList" class="flex-1">
            <div class="p-10 text-center text-gray-400 font-bold">يرجى رفع الملف لعرض قائمة الصيدليات</div>
        </div>
    </aside>

    <main class="main-content flex flex-col">
        <header class="p-6 bg-white shadow-sm flex gap-6">
            <div class="flex-1 bg-blue-900 p-4 rounded-2xl text-white">
                <p class="text-[10px] font-bold opacity-70 uppercase italic">الحالة الحية | Live Status</p>
                <h2 id="liveTotal" class="text-2xl font-black mt-1">0 <span class="text-xs">د.ع</span></h2>
            </div>
            <div class="flex-1 bg-emerald-600 p-4 rounded-2xl text-white">
                <p class="text-[10px] font-bold opacity-70 uppercase italic">إجمالي المطابقة المختارة</p>
                <h2 id="liveMatch" class="text-2xl font-black mt-1">0 <span class="text-xs">د.ع</span></h2>
            </div>
            <button onclick="generateReport()" class="bg-amber-500 text-white px-8 rounded-2xl font-black hover:bg-amber-600 shadow-lg shadow-amber-200">تحميل تقرير المدير</button>
        </header>

        <div id="detailsArea" class="p-8">
            <div class="max-w-3xl mx-auto text-center mt-20">
                <div class="text-6xl mb-6">📊</div>
                <h2 class="text-2xl font-black text-slate-400 italic">بانتظار اختيار صيدلية لعرض تفاصيل الفواتير والعنوان</h2>
            </div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let store = {}; 
        let currentShop = null;

        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(this.result) }).promise;
                let fullData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    fullData.push(...text.items.map(it => ({ str: it.str, y: Math.round(it.transform[5]) })));
                }
                processFile(fullData);
            };
            reader.readAsArrayBuffer(file);
        });

        function processFile(data) {
            store = {};
            let tempShop = "غير معروف";
            let tempAddress = "قيد التدقيق";

            data.sort((a, b) => b.y - a.y);

            data.forEach((item, index) => {
                let txt = item.str.trim();

                // كشف اسم الصيدلية والعنوان (الترويسة الزرقاء في أصيل)
                if ((txt.includes("صيدلية") || txt.includes("مذخر") || txt.includes("مكتب")) && !txt.includes("بيور العلمي")) {
                    tempShop = txt.replace(/ѧ|:|الاسم/g, '').trim();
                    // البحث عن العنوان في نفس النطاق
                    let nearby = data.filter(it => Math.abs(it.y - item.y) < 20);
                    nearby.forEach(n => {
                        if (n.str.includes("الشرقاط") || n.str.includes("العراق") || n.str.includes("صلاح الدين")) {
                            tempAddress = n.str.replace(/ѧ|:/g, '').trim();
                        }
                    });
                    if (!store[tempShop]) store[tempShop] = { address: tempAddress, invoices: [], total: 0 };
                }

                // كشف الفواتير
                if (/^\d{5,6}$/.test(txt)) {
                    let inv = { id: txt, date: "---", amount: 0, checked: false };
                    const row = data.filter(it => Math.abs(it.y - item.y) < 10);
                    row.forEach(r => {
                        if (r.str.includes('/')) inv.date = r.str;
                        if (/^[\d,]+\.\d{2}$/.test(r.str)) inv.amount = parseFloat(r.str.replace(/,/g, ''));
                    });

                    if (inv.amount > 0 && tempShop !== "غير معروف") {
                        store[tempShop].invoices.push(inv);
                        store[tempShop].total += inv.amount;
                    }
                }
            });
            renderSidebar();
            updateLiveStats();
        }

        function renderSidebar() {
            const list = document.getElementById('pharmacyList');
            const q = document.getElementById('search').value.toLowerCase();
            list.innerHTML = "";

            Object.keys(store).forEach(name => {
                if (name.toLowerCase().includes(q)) {
                    const div = document.createElement('div');
                    div.className = `pharmacy-item p-5 ${currentShop === name ? 'active' : ''}`;
                    div.onclick = () => showDetails(name);
                    div.innerHTML = `
                        <p class="text-[10px] font-bold opacity-60 uppercase">${store[name].address}</p>
                        <h3 class="font-black text-sm">${name}</h3>
                        <div class="flex justify-between mt-2">
                            <span class="text-[10px] font-bold">فواتير: ${store[name].invoices.length}</span>
                            <span class="text-[11px] font-black">${store[name].total.toLocaleString()} د.ع</span>
                        </div>
                    `;
                    list.appendChild(div);
                }
            });
        }

        function showDetails(name) {
            currentShop = name;
            renderSidebar();
            const area = document.getElementById('detailsArea');
            const shop = store[name];

            area.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-blue-600">
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <h2 class="text-3xl font-black text-slate-800">${name}</h2>
                            <p class="text-blue-600 font-bold italic mt-1">📍 العنوان: ${shop.address}</p>
                        </div>
                        <div class="text-left">
                            <p class="text-xs font-bold text-slate-400 uppercase">المبلغ الكلي للصيدلية</p>
                            <p class="text-2xl font-black text-slate-800">${shop.total.toLocaleString()} د.ع</p>
                        </div>
                    </div>
                    <div class="space-y-3">
                        ${shop.invoices.map(inv => `
                            <div onclick="toggleInv('${inv.id}')" class="flex justify-between items-center p-5 bg-slate-50 rounded-2xl border-2 cursor-pointer transition-all ${inv.checked ? 'border-emerald-500 bg-emerald-50 shadow-inner' : 'border-transparent hover:border-blue-100'}">
                                <div class="flex items-center gap-4">
                                    <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center ${inv.checked ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300 text-slate-300'}">✓</div>
                                    <div>
                                        <p class="font-black text-slate-800">فاتورة #${inv.id}</p>
                                        <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">${inv.date}</p>
                                    </div>
                                </div>
