<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pharma | نظام الإدارة الذكي</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-header { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); }
        .pharmacy-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e2e8f0; background: white; }
        .pharmacy-card:hover { transform: translateY(-8px); border-color: #6366f1; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .hidden-item { display: none !important; }
        .checked-row { background-color: #f0fdf4 !important; opacity: 0.6; text-decoration: line-through; border-right: 4px solid #22c55e; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .print-area { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; display: block !important; }
            .card-modal { border: none !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="custom-scroll">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="glass-header text-white p-8 rounded-[2.5rem] shadow-2xl mb-10 no-print border-b-8 border-indigo-600">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-right">
                    <h1 class="text-4xl font-black italic tracking-tighter text-indigo-400">PURE PHARMA PRO</h1>
                    <p class="text-slate-300 font-bold text-sm mt-1">نظام تصفية واستخراج فواتير مكتب بيور العلمي</p>
                </div>
                <div class="flex flex-col items-center">
                    <input type="file" id="pdfUpload" class="hidden" accept=".pdf">
                    <button onclick="document.getElementById('pdfUpload').click()" class="bg-indigo-500 hover:bg-indigo-400 text-white px-10 py-4 rounded-2xl font-black shadow-lg transition-all active:scale-95 text-lg">
                        📂 ارفع كشف (PDF)
                    </button>
                    <div id="loading" class="hidden mt-4 flex items-center gap-2">
                        <div class="w-4 h-4 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin"></div>
                        <span class="text-xs font-bold text-indigo-300">جاري تحليل البيانات...</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="no-print flex flex-col md:flex-row gap-4 mb-8">
            <input type="text" id="searchInput" onkeyup="searchFilter()" placeholder="ابحث باسم الصيدلية أو رقم الحساب..." class="flex-grow p-5 rounded-2xl border-2 border-slate-200 focus:border-indigo-500 outline-none font-bold text-lg shadow-sm transition-all">
