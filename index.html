<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام بيور | Pure Pharma V6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .checked-row { background-color: #064e3b !important; opacity: 0.5; text-decoration: line-through; }
        .acc-card { background: #1e293b; border: 2px solid #334155; transition: 0.3s; cursor: pointer; }
        .acc-card:hover { border-color: #6366f1; transform: translateY(-5px); }
        .loader { border: 4px solid #334155; border-top: 4px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="bg-indigo-900 p-8 rounded-[2rem] shadow-2xl mb-8 border-b-4 border-indigo-500">
            <h1 class="text-3xl font-black italic">PURE PHARMA PRO</h1>
            <p class="text-indigo-300 font-bold">نظام استخراج الفواتير بالاعتماد على رقم الحساب</p>
            
            <div class="mt-8 flex flex-col items-center gap-4">
                <input type="file" id="pdfFile" class="hidden" accept="application/pdf">
                <button onclick="document.getElementById('pdfFile').click()" class="w-full bg-white text-indigo-900 py-5 rounded-2xl font-black text-xl hover:bg-indigo-50 transition-all">
                    📁 ارفع الملف (الشرقاط أو تكريت)
                </button>
                <div id="loading" class="hidden flex items-center gap-3">
                    <div class="loader"></div>
                    <span id="loadText" class="font-bold text-sm text-indigo-200">جاري مسح الحسابات...</span>
                </div>
            </div>
        </div>

        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-2xl max-h-[85vh] rounded-[2rem] overflow-hidden flex flex-col">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <button onclick="closeModal()" class="bg-slate-800 px-4 py-2 rounded-lg text-sm font-bold">إغلاق ✕</button>
                <div id="modalTitle" class="text-indigo-400 font-black"></div>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let db = {};

        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loading').classList.remove('hidden');
            const ab = await file.arrayBuffer();
            const pdf = await pdfjs.getDocument({data: ab}).promise;
            db = {};

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const text = content.items.map(s => s.str).join(' ');

                // 1. استخراج رقم الحساب (الرقم اللي يجي بصف صيدلية أو في خانة رقم)
                // يبحث عن رقم مكون من 3 إلى 6 أرقام يتبع كلمات معينة
                let idMatch = text.match(/(?:صيدلية|مذخر|دكتور|رقم|الحساب|الاس م)\s*.*?(\d{2,6})/);
                let nameMatch = text.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|العنوان|الموبايل)/);

                if (idMatch) {
                    let id = idMatch[1];
                    let name = nameMatch ? nameMatch[1].replace(/ѧ/g, '').trim() : "حساب " + id;

                    if (!db[id]) db[id] = { id, name, bills: [], total: 0 };

                    // 2. سحب الفواتير (رقم الفاتورة، التاريخ، المتبقي)
                    let billRegex = /(\d{5,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                    let m;
                    while ((m = billRegex.exec(text)) !== null) {
                        db[id].bills.push({ n: m[1], d: m[2], a: m[3] });
                        db[id].total += parseFloat(m[3].replace(/,/g, ''));
                    }
                }
            }

            renderGrid();
            document.getElementById('loading').classList.add('hidden');
        });

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            Object.values(db).forEach(c => {
                if(c.total > 0) {
                    grid.innerHTML += `
                    <div class="p-6 rounded-2xl acc-card text-center" onclick="openDetails('${c.id}')">
                        <div class="text-indigo-400 font-black text-2xl mb-1">${c.id}</div>
                        <div class="text-[10px] text-slate-400 font-bold truncate">${c.name}</div>
                        <div class="mt-3 text-xs bg-indigo-600/20 text-indigo-300 py-1 rounded-full font-bold">
                            ${c.bills.length} فاتورة
                        </div>
                    </div>`;
                }
            });
        }

        function openDetails(id) {
            const c = db[id];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = "تفاصيل حساب: " + id;
            
            document.getElementById('modalBody').innerHTML = `
                <div class="text-right mb-6">
                    <div class="text-slate-400 text-xs mb-1 uppercase italic">Client Name:</div>
                    <div class="text-xl font-black text-white">${c.name}</div>
                </div>
                <div class="space-y-3">
                    ${c.bills.map((b, index) => `
                    <div id="b-${index}" class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center text-right">
                        <input type="checkbox" onchange="document.getElementById('b-${index}').classList.toggle('checked-row', this.checked)" class="w-6 h-6 accent-indigo-500">
                        <div>
                            <div class="text-[10px] text-slate-500 font-bold">رقم الفاتورة</div>
                            <div class="font-mono font-bold">${b.n}</div>
                        </div>
                        <div>
                            <div class="text-[10px] text-slate-500 font-bold text-left italic uppercase">Amount Due</div>
                            <div class="text-indigo-400 font-black text-lg text-left">${b.a}</div>
                        </div>
                    </div>
                    `).join('')}
                </div>
                <div class="mt-8 p-6 bg-indigo-600 rounded-2xl flex justify-between items-center">
                    <span class="font-black text-sm uppercase italic opacity-70 tracking-widest">Total Remaining</span>
                    <span class="text-2xl font-black italic">${c.total.toLocaleString()} د.ع</span>
                </div>
            `;
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
