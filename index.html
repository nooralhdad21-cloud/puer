<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مطابقة بيور - النسخة الاحترافية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .bill-card { display: flex; flex-direction: column; padding: 15px; background: white; border-radius: 18px; border: 1px solid #e2e8f0; margin-bottom: 10px; transition: 0.3s ease; }
        .is-active { border-right: 8px solid #10b981; }
        .not-active { border-right: 8px solid #ef4444; background-color: #fff1f2; opacity: 0.7; }
        .input-field { background-color: #ffffff; border: 2px solid #e2e8f0; border-radius: 15px; padding: 10px; font-weight: bold; font-size: 13px; width: 100%; }
        .stamp-box { border: 2px dashed #cbd5e1; border-radius: 20px; padding: 20px; text-align: center; width: 180px; height: 100px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 10px; font-weight: bold; }
        @media print { .no-print { display: none !important; } .report-container { border: none !important; box-shadow: none !important; width: 100%; } #billsList { display: block !important; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="no-print bg-white p-8 rounded-[2rem] shadow-md border border-slate-200 mb-8 grid grid-cols-1 md:grid-cols-4 gap-6">
            <div>
                <label class="block text-[11px] font-bold text-slate-600 mb-2">👤 المحاسب المسؤول</label>
                <input type="text" id="accInput" oninput="sync()" class="input-field border-slate-300">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-600 mb-2">📍 المحافظة</label>
                <select id="provInput" onchange="updateCities(); sync();" class="input-field border-slate-300"></select>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-600 mb-2">🏢 القضاء</label>
                <select id="cityInput" onchange="sync()" class="input-field border-slate-300"></select>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-indigo-600 mb-2">📉 نسبة الخصم %</label>
                <select id="discInput" onchange="calculate()" class="input-field border-indigo-200 bg-indigo-50 text-indigo-700"></select>
            </div>
        </div>

        <div class="no-print flex gap-4 mb-8">
            <button onclick="document.getElementById('pdfFile').click()" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl text-xs font-black shadow-lg">رفع كشف PDF</button>
            <button onclick="window.print()" class="flex-1 bg-emerald-600 text-white p-4 rounded-2xl text-xs font-black shadow-lg">طباعة التقرير</button>
            <input type="file" id="pdfFile" class="hidden" accept=".pdf">
        </div>

        <div class="bg-white p-10 md:p-16 rounded-[3rem] shadow-2xl border border-slate-200 report-container min-h-[1000px] flex flex-col">
            
            <div class="flex justify-between items-start border-b-4 border-slate-900 pb-8 mb-10">
                <div>
                    <h1 class="text-5xl font-black text-slate-900 tracking-tighter">مكتب بيور العلمي</h1>
                    <p class="text-[11px] font-black text-slate-400 uppercase mt-1 italic">Financial Audit Report</p>
                </div>
                <div class="text-left text-[11px] font-black space-y-1">
                    <p>الموقع: <span id="outLoc" class="text-indigo-600 italic">..</span></p>
                    <p>المحاسب: <span id="outAcc" class="text-slate-700">..</span></p>
                    <p>التاريخ: <span id="outDate">..</span></p>
                </div>
            </div>

            <div class="bg-slate-900 p-10 rounded-[2.5rem] text-white flex justify-between items-center mb-10 shadow-xl">
                <div class="flex-1">
                    <p class="text-[10px] font-bold text-indigo-400 mb-2 uppercase italic">اسم العميل / الصيدلية / المذخر</p>
                    <input type="text" id="outClient" placeholder="..." class="text-4xl font-black bg-transparent border-none outline-none w-full text-white">
                </div>
            </div>

            <div id="billsList" class="space-y-4 mb-12"></div>

            <div class="border-t-4 border-slate-900 pt-10 mt-auto">
                <div class="grid grid-cols-2 gap-8 mb-10">
                    <div class="space-y-3">
                        <div class="flex justify-between border-b border-slate-100 pb-2">
                            <span class="text-[12px] font-bold text-slate-500">المجموع قبل الخصم:</span>
                            <span id="outBefore" class="text-md font-black text-slate-800 font-mono italic">0.00 IQD</span>
                        </div>
                        <div class="flex justify-between border-b border-slate-100 pb-2">
                            <span class="text-[12px] font-bold text-red-500 italic">مبلغ الخصم المستقطع (<span id="discLabel">0</span>%):</span>
                            <span id="outDiscAmount" class="text-md font-black text-red-500 font-mono italic">- 0.00 IQD</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end">
                        <p class="text-[11px] font-black text-slate-400 mb-1 uppercase italic">الصافي النهائي المطلوب (بعد الخصم):</p>
                        <p id="resFinal" class="text-6xl font-black text-slate-900 tracking-tighter italic font-mono">0.00 IQD</p>
                    </div>
                </div>
                
                <div class="flex justify-between items-end">
                    <p id="tafgeet" class="text-[13px] font-black text-indigo-700 bg-indigo-50 px-6 py-3 rounded-xl border-2 border-indigo-100 italic"></p>
                    <div class="flex gap-6">
                        <div class="stamp-box">توقيع وختم المحاسب</div>
                        <div class="stamp-box">توقيع وختم العميل</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        const iraqGeo = {"بغداد": ["الرصافة", "الكرخ"], "صلاح الدين": ["تكريت", "الشرقاط", "سامراء"], "نينوى": ["الموصل"], "البصرة": ["المركز"]};

        function init() {
            const pSel = document.getElementById('provInput');
            pSel.innerHTML = '<option value="">المحافظة</option>';
            Object.keys(iraqGeo).sort().forEach(p => pSel.innerHTML += `<option value="${p}">${p}</option>`);
            const dSel = document.getElementById('discInput');
            for(let i=0; i<=15; i++) dSel.innerHTML += `<option value="${i}">${i}%</option>`;
            document.getElementById('outDate').innerText = new Date().toLocaleDateString('en-GB');
            updateCities();
        }

        function updateCities() {
            const p = document.getElementById('provInput').value;
            const cSel = document.getElementById('cityInput');
            cSel.innerHTML = '<option value="">القضاء</option>';
            if(p && iraqGeo[p]) iraqGeo[p].forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
        }

        function sync() {
            document.getElementById('outLoc').innerText = (document.getElementById('provInput').value || '..') + " / " + (document.getElementById('cityInput').value || '..');
            document.getElementById('outAcc').innerText = document.getElementById('accInput').value || '..';
            calculate();
        }

        document.getElementById('pdfFile').onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            db = [];
            const pdfJS = window['pdfjs-dist/build/pdf'];
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const pdf = await pdfJS.getDocument({data: await file.arrayBuffer()}).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const text = await page.getTextContent();
                const items = text.items;
                const client = items.map(it => it.str).find(t => t.includes("مذخر") || t.includes("صيدلية")) || "";
                if(client) document.getElementById('outClient').value = client;
                items.forEach(item => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.str)) {
                        let row = items.filter(it => Math.abs(it.transform[5] - item.transform[5]) < 5).sort((a,b) => b.transform[4] - a.transform[4]);
                        const nums = row.filter(r => /[\d,]+\.\d{2}/.test(r.str));
                        if (nums.length >= 2) {
                            let id = row.find(ri => /^\d{5,7}$/.test(ri.str))?.str || "000";
                            db.push({ id, date: item.str, total: nums[0].str, remain: nums[nums.length-1].str, status: 'ok', note: '' });
                        }
                    }
                });
            }
            renderList();
        };

        function renderList() {
            const list = document.getElementById('billsList');
            list.innerHTML = "";
            db.forEach((b, i) => {
                list.innerHTML += `
                    <div class="bill-card ${b.status === 'ok' ? 'is-active' : 'not-active'}">
                        <div class="flex justify-between items-center">
                            <div onclick="toggleStatus(${i})" class="flex-1 cursor-pointer font-black text-slate-900 text-xl font-mono">${b.remain} IQD</div>
                            <div class="text-right border-r-2 border-slate-100 pr-4">
                                <span class="text-xs font-black text-slate-800 italic">#${b.id}</span>
                                <span class="block text-[9px] font-bold text-slate-400 font-mono italic">${b.date}</span>
                            </div>
                        </div>
                    </div>`;
            });
            calculate();
        }

        function calculate() {
            let sumRem = 0;
            db.forEach(b => { if (b.status === 'ok') sumRem += parseFloat(b.remain.replace(/,/g,'')) || 0; });
            
            const discPerc = parseFloat(document.getElementById('discInput').value) || 0;
            const discAmount = sumRem * (discPerc / 100);
            const final = sumRem - discAmount;
            
            document.getElementById('outBefore').innerText = sumRem.toLocaleString(undefined, {minimumFractionDigits:2}) + " IQD";
            document.getElementById('outDiscAmount').innerText = "- " + discAmount.toLocaleString(undefined, {minimumFractionDigits:2}) + " IQD";
            document.getElementById('discLabel').innerText = discPerc;
            document.getElementById('resFinal').innerText = final.toLocaleString(undefined, {minimumFractionDigits:2}) + " IQD";
            document.getElementById('tafgeet').innerText = "فقط " + final.toLocaleString('ar-IQ') + " دينار عراقي لا غير";
        }

        function toggleStatus(i) { db[i].status = (db[i].status === 'ok' ? 'none' : 'ok'); renderList(); }
        window.onload = init;
    </script>
</body>
</html>
