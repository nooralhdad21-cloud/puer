<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مطابقة بيور - النسخة الاحترافية (إصلاح الأسماء الطويلة)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .is-active { border-right: 6px solid #10b981; background-color: #f0fdf4 !important; }
        .not-active { border-right: 6px solid #ef4444; background-color: #fef2f2 !important; }
        .stamp-box { border: 2px dashed #cbd5e1; border-radius: 1.5rem; width: 160px; height: 110px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 11px; font-weight: 800; text-align: center; }
        /* تحسين منطقة الاسم لتظهر بالكامل */
        #outClient { 
            white-space: normal; 
            overflow: visible; 
            display: block; 
            word-wrap: break-word;
            line-height: 1.2;
        }
        @media print { .no-print { display: none !important; } .report-container { border: none !important; box-shadow: none !important; width: 100%; } }
    </style>
</head>
<body class="p-4" onload="loadSavedName()">

    <div class="max-w-4xl mx-auto">
        <header class="no-print bg-[#1e293b] text-white p-6 rounded-[2rem] mb-6 shadow-2xl">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div>
                    <label class="block text-[10px] mb-1 text-slate-400 font-bold">مُعد التقرير</label>
                    <input type="text" id="myNameInput" oninput="saveName(); sync();" class="w-full bg-slate-800 border-none rounded-xl p-2 text-xs text-white">
                </div>
                <div><label class="block text-[10px] mb-1 text-indigo-400 font-bold">المحافظة</label><input type="text" id="provInput" oninput="sync()" class="w-full bg-slate-800 border-none rounded-xl p-2 text-xs"></div>
                <div><label class="block text-[10px] mb-1 text-indigo-400 font-bold">المدينة</label><input type="text" id="cityInput" oninput="sync()" class="w-full bg-slate-800 border-none rounded-xl p-2 text-xs"></div>
                <div><label class="block text-[10px] mb-1 text-indigo-400 font-bold">المندوب</label><input type="text" id="repInput" oninput="sync()" class="w-full bg-slate-800 border-none rounded-xl p-2 text-xs"></div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 border-t border-slate-700 pt-4 mb-6">
                <div><label class="block text-[10px] mb-1 text-orange-400 font-bold">مبلغ سابق</label><input type="number" id="prevShow" oninput="sync()" class="w-full bg-slate-800 border-none rounded-xl p-2 text-xs"></div>
                <div><label class="block text-[10px] mb-1 text-orange-400 font-bold">خصم سابق %</label><input type="text" id="discShow" oninput="sync()" class="w-full bg-slate-800 border-none rounded-xl p-2 text-xs"></div>
                <div>
                    <label class="block text-[10px] mb-1 text-emerald-400 font-bold">خصم الحالي %</label>
                    <select id="currDiscPerc" onchange="calculate()" class="w-full bg-slate-800 border-none rounded-xl p-2 text-xs text-white">
                        <option value="0">0%</option><option value="1">1%</option><option value="2">2%</option><option value="5">5%</option>
                    </select>
                </div>
                <div class="flex items-end gap-2">
                    <button onclick="document.getElementById('pdfFile').click()" class="flex-1 bg-indigo-600 p-2 rounded-xl text-[10px] font-bold">رفع PDF</button>
                    <button onclick="resetAll()" class="bg-red-900/40 p-2 rounded-xl text-[10px] font-bold">تصفير</button>
                </div>
            </div>
            <button onclick="window.print()" class="w-full bg-emerald-600 p-4 rounded-2xl font-black shadow-xl transition active:scale-95">طباعة التقرير</button>
            <input type="file" id="pdfFile" class="hidden" accept=".pdf">
        </header>

        <div class="bg-white p-10 rounded-[3rem] report-container min-h-[1100px] flex flex-col border border-slate-200">
            <div class="flex justify-between items-start border-b-4 border-slate-900 pb-6 mb-8">
                <div>
                    <h1 class="text-3xl font-black text-slate-900">مكتب بيور العلمي</h1>
                    <p class="text-[10px] font-bold text-slate-400">إعداد: <span id="outMyName">....</span></p>
                </div>
                <div class="text-left text-[11px] font-black">
                    <p>الموقع: <span id="outLoc">....</span></p>
                    <p>التاريخ: <span id="outDate">--/--/----</span></p>
                </div>
            </div>

            <div class="mb-6 p-7 bg-slate-900 rounded-[2.5rem] text-white flex justify-between items-center shadow-xl">
                <div class="flex-1 pr-2">
                    <p class="text-[9px] font-bold text-indigo-300 uppercase mb-1">اسم الصيدلية / العميل المعتمد</p>
                    <textarea id="outClient" placeholder="بانتظار الرفع..." rows="1" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'" 
                    class="w-full bg-transparent text-2xl font-black outline-none border-none resize-none overflow-hidden placeholder:text-slate-700"></textarea>
                </div>
                <div class="text-left border-r border-slate-700 pr-6 min-w-[150px]">
                    <p class="text-[8px] font-bold text-slate-500 mb-1">إجمالي الكشف:</p>
                    <p id="outFullOrig" class="text-sm font-black text-slate-400">0.00 IQD</p>
                </div>
            </div>

            <div id="billsList" class="space-y-1.5 mb-8 flex-grow"></div>

            <div class="bg-indigo-50 p-5 rounded-3xl border border-indigo-100 mb-8">
                <p class="text-[12px] font-bold text-slate-700 text-center italic">
                    تمت مطابقة الحسابات بنجاح من فاتورة رقم <span id="firstInv" class="underline font-black">....</span> 
                    إلى رقم <span id="lastInv" class="underline font-black">....</span>، باستثناء المشار إليها بـ (!)
                </p>
            </div>

            <div class="border-t-4 border-slate-900 pt-8 mt-auto">
                <div class="flex justify-between items-end gap-10">
                    <div class="flex-1">
                        <p class="text-[10px] font-black text-slate-400">صافي مبلغ المطابقة:</p>
                        <p id="resFinal" class="text-5xl font-black text-slate-900">0.00 IQD</p>
                        <p id="tafgeet" class="text-[11px] font-bold text-indigo-700 mt-4 bg-indigo-50 px-4 py-1.5 rounded-2xl">....</p>
                    </div>
                    <div class="flex gap-4">
                        <div class="stamp-box">ختم مكتب بيور</div>
                        <div class="stamp-box">ختم العميل</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        document.getElementById('outDate').innerText = new Date().toLocaleDateString('en-GB');

        function saveName() { localStorage.setItem('pure_name', document.getElementById('myNameInput').value); }
        function loadSavedName() {
            const saved = localStorage.getItem('pure_name');
            if(saved) { document.getElementById('myNameInput').value = saved; sync(); }
        }

        function sync() {
            document.getElementById('outMyName').innerText = document.getElementById('myNameInput').value || '....';
            document.getElementById('outLoc').innerText = (document.getElementById('provInput').value || '..') + " / " + (document.getElementById('cityInput').value || '..');
            let pVal = document.getElementById('prevShow').value;
            document.getElementById('outPrevShow').innerText = pVal ? Number(pVal).toLocaleString() : '0';
        }

        document.getElementById('pdfFile').onchange = async (e) => {
            const file = e.target.files[0]; if (!file) return;
            const pdfJS = window['pdfjs-dist/build/pdf'];
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const buffer = await file.arrayBuffer();
            const pdf = await pdfJS.getDocument({data: buffer}).promise;
            db = []; let total = 0;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const items = content.items.sort((a, b) => b.transform[5] - a.transform[5] || a.transform[4] - b.transform[4]);
                
                let client = items.map(it => it.str).find(t => t.length > 10 && !t.includes("بيور")) || "";
                if(client) document.getElementById('outClient').value = client;

                items.forEach(item => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.str)) {
                        let id = "000000", amt = "0";
                        const rowItems = items.filter(it => Math.abs(it.transform[5] - item.transform[5]) < 5);
                        rowItems.forEach(ri => {
                            if (/^\d{5,7}$/.test(ri.str)) id = ri.str;
                            if (/^-?\d{1,3}(,\d{3})*(\.\d{2})?$/.test(ri.str) && ri.str.includes(",")) amt = ri.str;
                        });
                        db.push({ id, date: item.str, amount: amt, status: 'ok', note: '' });
                        total += parseFloat(amt.replace(/,/g,'')) || 0;
                    }
                });
            }
            if(db.length > 0) {
                document.getElementById('firstInv').innerText = db[0].id;
                document.getElementById('lastInv').innerText = db[db.length-1].id;
            }
            document.getElementById('outFullOrig').innerText = total.toLocaleString() + " IQD";
            calculate();
        };

        function calculate() {
            const list = document.getElementById('billsList');
            list.innerHTML = ""; let sumOk = 0;
            db.forEach((b, i) => {
                const val = parseFloat(b.amount.replace(/,/g,'')) || 0;
                if (b.status === 'ok') sumOk += val;
                list.innerHTML += `
                    <div class="flex items-center gap-2">
                        <div onclick="toggle(${i})" class="flex-grow flex justify-between items-center p-2.5 rounded-2xl cursor-pointer ${b.status === 'ok' ? 'is-active shadow-sm' : 'not-active'}">
                            <div class="flex items-center gap-3">
                                <span class="font-black text-[11px]">#${b.id}</span>
                                ${b.status !== 'ok' ? '<span class="text-red-600">!</span>' : ''}
                            </div>
                            <span class="font-black text-[11px]">${b.amount}</span>
                        </div>
                    </div>`;
            });
            const final = sumOk - (sumOk * (parseFloat(document.getElementById('currDiscPerc').value) / 100));
            document.getElementById('resFinal').innerText = final.toLocaleString() + " IQD";
            document.getElementById('tafgeet').innerText = "فقط " + final.toLocaleString('ar-IQ') + " دينار لا غير";
        }

        function toggle(i) { db[i].status = db[i].status === 'ok' ? 'none' : 'ok'; calculate(); }
        function resetAll() { location.reload(); }
    </script>
</body>
</html>
