<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام بيور العلمي | Pure System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .checked-row { background-color: #d1fae5 !important; text-decoration: line-through; opacity: 0.6; }
        .client-card { transition: transform 0.2s; border: 1px solid #e5e7eb; background: white; cursor: pointer; }
        .client-card:hover { transform: translateY(-3px); border-color: #4f46e5; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="bg-indigo-950 text-white p-6 rounded-2xl shadow-lg mb-8 no-print flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black italic">PUREPHARMA PRO</h1>
                <p class="text-indigo-300 text-xs">نظام معالجة كشوفات الشرقاط وتكريت</p>
            </div>
            <div class="flex flex-col items-center">
                <input type="file" id="pdfUpload" class="hidden" accept=".pdf">
                <button onclick="document.getElementById('pdfUpload').click()" class="bg-indigo-500 hover:bg-indigo-400 text-white px-8 py-3 rounded-xl font-bold transition-all active:scale-95 shadow-md">
                    📂 ارفع كشف الـ PDF الآن
                </button>
                <div id="loadingStatus" class="hidden mt-2 text-xs font-bold animate-pulse text-indigo-400">جاري قراءة البيانات...</div>
            </div>
        </div>

        <div class="mb-6 no-print">
            <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="ابحث باسم الصيدلية أو رقم الحساب..." class="w-full p-4 rounded-xl border-2 border-indigo-50 shadow-sm focus:border-indigo-500 outline-none font-bold">
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 no-print">
            </div>

        <div id="detailModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
            <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl flex flex-col">
                <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                    <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 font-bold text-2xl transition-colors">✕</button>
                    <div class="flex gap-2">
                        <button onclick="window.print()" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold">طباعة</button>
                        <button id="whatsappButton" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold">واتساب</button>
                    </div>
                </div>
                <div id="modalContent" class="p-8 overflow-y-auto">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // ضبط المكتبة لتجنب أي تعليق
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let clientsData = {};

        // دالة ذكية لإصلاح تقطع الحروف في ملفات "أصيل"
        function cleanPharmacyName(text) {
            return text.replace(/ѧ/g, '').replace(/([ا-ي])\s(?=[ا-ي])/g, '$1').trim();
        }

        document.getElementById('pdfUpload').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('loadingStatus').classList.remove('hidden');
            const fileReader = new FileReader();

            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                clientsData = {};

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const text = content.items.map(s => s.str).join(' ');

                    // استخراج ID العميل والاسم من ترويسة الصفحة
                    let idMatch = text.match(/(?:رقم|رق م|الحساب)[:\-\s]*(\d{2,6})/);
                    let nameMatch = text.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|رق م|الموبايل|الموباي|العن)/);

                    if (idMatch) {
                        let id = idMatch[1];
                        let name = nameMatch ? cleanPharmacyName(nameMatch[1]) : "جهة غير محددة";

                        if (!clientsData[id]) {
                            clientsData[id] = { id, name, bills: [], total: 0, firstPage: i };
                        }

                        // استخراج الفواتير (رقم، تاريخ، مبلغ)
                        // النمط المخصص لملفاتك: رقم الفاتورة ثم التاريخ ثم المبلغ
                        let billRegex = /(\d{5,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                        let m;
                        while ((m = billRegex.exec(text)) !== null) {
                            clientsData[id].bills.push({ num: m[1], date: m[2], amount: m[3] });
                            clientsData[id].total += parseFloat(m[3].replace(/,/g, ''));
                        }
                    }
                }
                renderGrid();
                document.getElementById('loadingStatus').classList.add('hidden');
            };
            fileReader.readAsArrayBuffer(file);
        });

        function renderGrid() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = "";
            Object.values(clientsData).forEach(c => {
                grid.innerHTML += `
                    <div class="p-6 rounded-2xl client-card shadow-sm" onclick="openModal('${c.id}')" data-search="${c.name} ${c.id}">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-[10px] font-black italic">ID: ${c.id}</span>
                            <span class="text-gray-300 text-[10px]">صـ ${c.firstPage}</span>
                        </div>
                        <h3 class="text-lg font-black text-gray-800 leading-snug mb-4 text-right">${c.name}</h3>
                        <div class="border-t border-gray-50 pt-3 flex justify-between items-center">
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Total</span>
                            <span class="text-indigo-600 font-black text-xl">${c.total.toLocaleString()} د.ع</span>
                        </div>
                    </div>`;
            });
        }

        function openModal(id) {
            const c = clientsData[id];
            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('whatsappButton').onclick = () => {
                let msg = `*مكتب بيور العلمي*%0A*كشف حساب العميل:* ${c.name}%0A*رقم الحساب:* ${c.id}%0A*الإجمالي المتبقي:* ${c.total.toLocaleString()} د.ع`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            };

            document.getElementById('modalContent').innerHTML = `
                <div class="text-right mb-6">
                    <h2 class="text-3xl font-black text-indigo-900">${c.name}</h2>
                    <p class="text-gray-500 font-bold">رقم الحساب الفريد: ${c.id}</p>
                </div>
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 border-b">
                            <th class="p-4 font-black text-xs uppercase">مطابقة</th>
                            <th class="p-4 font-black text-xs text-center uppercase">رقم الفاتورة</th>
                            <th class="p-4 font-black text-xs text-left uppercase">المبلغ</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        ${c.bills.map((b, i) => `
                            <tr id="tr-${i}">
                                <td class="p-4"><input type="checkbox" onchange="document.getElementById('tr-${i}').classList.toggle('checked-row', this.checked)" class="w-6 h-6 accent-indigo-600 cursor-pointer"></td>
                                <td class="p-4 font-bold text-gray-700 font-mono text-center">${b.num}</td>
                                <td class="p-4 font-black text-indigo-900 text-left text-lg">${b.amount} د.ع</td>
                            </tr>`).join('')}
                    </tbody>
                </table>
                <div class="mt-8 bg-indigo-900 text-white p-6 rounded-2xl flex justify-between items-center shadow-xl">
                    <span class="font-bold opacity-70 italic tracking-widest">Grand Total Balance</span>
                    <span class="text-3xl font-black">${c.total.toLocaleString()} د.ع</span>
                </div>
            `;
        }

        function filterItems() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.client-card').forEach(card => {
                card.style.display = card.getAttribute('data-search').toLowerCase().includes(q) ? "block" : "none";
            });
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
    </script>
</body>
</html>
