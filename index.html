<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurePharma | نظام مكتب بيور</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-5px); border-color: #4f46e5; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.1); }
        .checked-row { background-color: #ecfdf5 !important; text-decoration: line-through; opacity: 0.7; border-right: 4px solid #10b981; }
        @media print { .no-print { display: none !important; } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="bg-indigo-950 text-white p-8 rounded-[2rem] shadow-2xl mb-10 no-print border-b-8 border-indigo-500">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-right">
                    <h1 class="text-4xl font-black tracking-tighter italic">PURE PHARMA</h1>
                    <p class="text-indigo-300 mt-2 font-bold">نظام قراءة كشوفات مكتب بيور العلمي</p>
                </div>
                <div class="flex flex-col items-center">
                    <input type="file" id="pdfUpload" class="hidden" accept=".pdf">
                    <button onclick="document.getElementById('pdfUpload').click()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-4 rounded-2xl font-black shadow-lg transition-all active:scale-95">
                        📂 ارفع كشف الـ PDF الجديد
                    </button>
                    <div id="loading" class="hidden mt-4 flex items-center gap-2">
                        <div class="loader"></div>
                        <span class="text-xs font-bold text-indigo-200">جاري معالجة الصفحات...</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-10 no-print">
            <input type="text" id="searchBox" onkeyup="doSearch()" placeholder="ابحث باسم (صيدلية، مذخر) أو رقم الحساب..." class="w-full p-6 rounded-3xl border-2 border-indigo-50 shadow-inner focus:border-indigo-500 outline-none font-bold text-xl transition-all">
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-md no-print">
        <div class="bg-white rounded-[2.5rem] w-full max-w-4xl max-h-[92vh] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <button onclick="closeModal()" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white w-10 h-10 rounded-full font-bold transition-all">✕</button>
                <div class="flex gap-3">
                    <button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-xs font-black hover:bg-black transition shadow-lg uppercase italic">Print Report</button>
                    <button id="waShare" class="bg-green-600 text-white px-6 py-2 rounded-xl text-xs font-black hover:bg-green-700 transition shadow-lg uppercase italic">WhatsApp</button>
                </div>
            </div>
            <div id="modalBody" class="p-8 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const pdfJS = window['pdfjs-dist/build/pdf'];
        pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let masterData = {};

        // تنظيف النصوص ودمج الحروف المقطعة لنظام أصيل
        function fixTitle(str) {
            return str.replace(/ѧ/g, '').replace(/([ا-ي])\s(?=[ا-ي])/g, '$1').trim();
        }

        document.getElementById('pdfUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loading').classList.remove('hidden');
            const ab = await file.arrayBuffer();
            const pdf = await pdfJS.getDocument({data: ab}).promise;
            masterData = {};

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const text = content.items.map(s => s.str).join(' ');

                // سحب رقم الحساب والاسم
                let idMatch = text.match(/(?:رقم|رق م|الحساب)[:\-\s]*(\d{2,6})/);
                let nameMatch = text.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|رق م|الموبايل|العن)/);

                if (idMatch) {
                    let id = idMatch[1];
                    let name = nameMatch ? fixTitle(nameMatch[1]) : "جهة غير محددة";

                    if (!masterData[id]) masterData[id] = { id, name, bills: [], total: 0 };

                    // سحب الفواتير (رقم، تاريخ، مبلغ متبقي)
                    let regex = /(\d{5,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                    let m;
                    while ((m = regex.exec(text)) !== null) {
                        masterData[id].bills.push({ n: m[1], d: m[2], a: m[3] });
                        masterData[id].total += parseFloat(m[3].replace(/,/g, ''));
                    }
                }
            }
            renderGrid();
            document.getElementById('loading').classList.add('hidden');
        });

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            Object.values(masterData).forEach(c => {
                if(c.total > 0) {
                    grid.innerHTML += `
                    <div class="p-8 rounded-[2rem] card bg-white relative overflow-hidden" onclick="openModal('${c.id}')" data-search="${c.name} ${c.id}">
                        <div class="flex justify-between items-start mb-6">
                            <span class="bg-indigo-50 text-indigo-700 px-4 py-1 rounded-full text-[10px] font-black italic border border-indigo-100 uppercase tracking-widest">Account: ${c.id}</span>
                        </div>
                        <h3 class="text-xl font-black text-slate-800 leading-tight mb-8 text-right h-14 overflow-hidden">${c.name}</h3>
                        <div class="flex justify-between items-end border-t border-slate-50 pt-6">
                            <span class="text-slate-400 text-[10px] font-bold uppercase italic">Balance Due</span>
                            <span class="text-indigo-600 font-black text-2xl tracking-tighter">${c.total.toLocaleString()} <small class="text-[10px]">د.ع</small></span>
                        </div>
                    </div>`;
                }
            });
        }

        function openModal(id) {
            const c = masterData[id];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('waShare').onclick = () => {
                let msg = `*مكتب بيور العلمي*%0A*كشف حساب العميل:* ${c.name}%0A*الإجمالي المتبقي:* ${c.total.toLocaleString()} د.ع`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            };

            document.getElementById('modalBody').innerHTML = `
                <div class="text-right mb-10 border-r-8 border-indigo-500 pr-6">
                    <h2 class="text-3xl font-black text-slate-900 leading-none">${c.name}</h2>
                    <p class="text-indigo-500 font-bold mt-2 italic text-sm">رقم الحساب الموحد: ${c.id}</p>
                </div>
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 border-b uppercase text-[10px] font-black italic">
                            <th class="p-4">Check</th>
                            <th class="p-4 text-center">Invoice No.</th>
                            <th class="p-4 text-center">Date</th>
                            <th class="p-4 text-left">Amount</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        ${c.bills.map((b, i) => `
                        <tr id="row-${i}" class="transition-colors hover:bg-indigo-50/30">
                            <td class="p-4"><input type="checkbox" onchange="document.getElementById('row-${i}').classList.toggle('checked-row', this.checked)" class="w-7 h-7 accent-indigo-600 cursor-pointer"></td>
                            <td class="p-4 font-black text-slate-700 font-mono text-center text-lg">${b.n}</td>
                            <td class="p-4 text-slate-400 text-center font-bold text-xs">${b.d}</td>
                            <td class="p-4 font-black text-indigo-900 text-left text-xl">${b.a} <small class="text-xs">د.ع</small></td>
                        </tr>`).join('')}
                    </tbody>
                </table>
                <div class="mt-10 bg-indigo-950 text-white p-10 rounded-[2.5rem] flex justify-between items-center shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <span class="text-indigo-400 font-black text-xs uppercase tracking-[0.3em] mb-1 block">Total Balance</span>
                        <span class="text-lg font-bold opacity-60">مجموع المبالغ غير المسددة</span>
                    </div>
                    <span class="relative z-10 text-4xl font-black text-indigo-400">${c.total.toLocaleString()} <small class="text-sm italic">د.ع</small></span>
                </div>
            `;
        }

        function doSearch() {
            let q = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('[data-search]').forEach(card => {
                card.style.display = card.getAttribute('data-search').toLowerCase().includes(q) ? "block" : "none";
            });
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
