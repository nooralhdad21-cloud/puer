<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pure Pharma | نظام التدقيق والتركيز الذكي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .bill-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .is-ignored { opacity: 0.3; filter: grayscale(0.8); }
        /* إطار التركيز القوي عند البحث */
        .focus-highlight { 
            border: 5px solid #4f46e5 !important; 
            transform: scale(1.05); 
            box-shadow: 0 0 50px rgba(79, 70, 229, 0.4);
            z-index: 50;
            background-color: #eef2ff !important;
        }
        .status-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-weight: 900; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto">
        <div class="sticky top-4 z-[100] bg-white/80 backdrop-blur-md p-6 rounded-[2.5rem] shadow-2xl mb-8 no-print border-2 border-indigo-100 flex flex-wrap items-center gap-4">
            <div class="flex-1 relative">
                <input type="text" id="searchInput" oninput="doSearch()" placeholder="اكتب رقم القائمة أو اسم الصيدلية للقفز إليها..." 
                       class="w-full p-4 pr-12 rounded-2xl bg-white border-2 border-slate-200 focus:border-indigo-600 outline-none font-black text-lg shadow-inner">
                <span class="absolute right-4 top-5">🔎</span>
            </div>
            <input type="file" id="pdfFile" class="hidden" accept=".pdf">
            <button onclick="document.getElementById('pdfFile').click()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black hover:bg-indigo-600 transition-all shadow-lg">رفع ملف الكشف</button>
        </div>

        <div id="mainStage" class="space-y-12">
            <div class="text-center py-40 text-slate-400 font-bold italic">ارفع ملف الـ PDF لتبدأ عملية المطابقة الذكية..</div>
        </div>
    </div>

    <script>
        const pdfJS = window['pdfjs-dist/build/pdf'];
        pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let appData = [];

        function clean(s) { return s.replace(/[ѧ\x00-\x1F\x7F-\x9F]/g, "").replace(/\s+/g, " ").trim(); }
        function toNum(s) { return parseFloat(s.replace(/,/g, '')) || 0; }

        document.getElementById('pdfFile').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            appData = [];
            const buffer = await file.arrayBuffer();
            const pdf = await pdfJS.getDocument({data: buffer}).promise;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const items = content.items.map(it => ({ text: clean(it.str), y: it.transform[5] }));
                items.sort((a,b) => b.y - a.y);

                let name = items.find(it => it.text.length > 10 && !it.text.includes("بيور"))?.text || "غير معروف";
                let bills = [];

                items.forEach((item, idx) => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.text)) {
                        let b = { id: "00000", date: item.text, remain: "0.00", status: 'none', note: '' };
                        for (let n = -10; n <= 10; n++) {
                            let v = items[idx+n]?.text || "";
                            if (/^\d{5,7}$/.test(v)) b.id = v;
                            if (/^(\d{1,3}(,\d{3})*(\.\d{2}))$/.test(v)) b.remain = v;
                        }
                        bills.push(b);
                    }
                });
                if(bills.length > 0) appData.push({ name, bills });
            }
            render();
        };

        function render() {
            const stage = document.getElementById('mainStage');
            stage.innerHTML = "";

            appData.forEach((shop, sIdx) => {
                let totalConfirmed = shop.bills.filter(b => b.status === 'ok').reduce((sum, b) => sum + toNum(b.remain), 0);
                
                let rows = shop.bills.map((b, bIdx) => `
                    <div id="bill-${b.id}" class="bill-card p-5 bg-white border-b border-slate-50 flex items-center justify-between ${b.status === 'warn' ? 'is-ignored' : ''}">
                        <div class="flex items-center gap-4">
                            <div class="flex gap-2 no-print">
                                <div onclick="changeStatus(${sIdx}, ${bIdx}, 'ok')" class="status-btn ${b.status === 'ok' ? 'bg-green-600 text-white shadow-green-200 shadow-lg' : 'bg-slate-100 text-slate-400'}">✓</div>
                                <div onclick="changeStatus(${sIdx}, ${bIdx}, 'warn')" class="status-btn ${b.status === 'warn' ? 'bg-orange-500 text-white shadow-orange-200 shadow-lg' : 'bg-slate-100 text-slate-400'}">!</div>
                            </div>
                            <div>
                                <p class="text-lg font-black text-slate-800">#${b.id}</p>
                                <p class="text-xs text-slate-400 font-bold">${b.date}</p>
                            </div>
                        </div>
                        <div class="text-left">
                            <p class="text-xl font-black ${b.status === 'ok' ? 'text-green-600' : 'text-slate-900'}">${b.remain}</p>
                            ${b.status === 'warn' ? `<input type="text" onchange="updateNote(${sIdx},${bIdx},this.value)" value="${b.note}" placeholder="سبب التعجب؟" class="mt-2 text-xs border-b-2 border-orange-300 outline-none bg-transparent font-bold text-orange-700 w-full">` : ''}
                        </div>
                    </div>
                `).join('');

                stage.innerHTML += `
                    <div class="rounded-[3rem] shadow-xl overflow-hidden border-2 border-white mb-10">
                        <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
                            <div>
                                <h2 class="text-2xl font-black italic text-indigo-400">${shop.name}</h2>
                            </div>
                            <div class="text-left">
                                <p class="text-[10px] font-black opacity-50 uppercase">المجموع المؤكد (✓)</p>
                                <p class="text-3xl font-black text-green-400">${totalConfirmed.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                            </div>
                        </div>
                        <div class="bg-white">${rows}</div>
                    </div>
                `;
            });
        }

        function changeStatus(sIdx, bIdx, status) {
            appData[sIdx].bills[bIdx].status = (appData[sIdx].bills[bIdx].status === status) ? 'none' : status;
            render();
        }

        function updateNote(sIdx, bIdx, note) {
            appData[sIdx].bills[bIdx].note = note;
        }

        function doSearch() {
            const term = document.getElementById('searchInput').value.trim();
            // إزالة التظليل السابق
            document.querySelectorAll('.bill-card').forEach(el => el.classList.remove('focus-highlight'));

            if (!term) return;

            // البحث عن الفاتورة
            const target = document.getElementById('bill-' + term);
            if (target) {
                target.classList.add('focus-highlight');
                // القفز إلى الفاتورة لتكون في منتصف الشاشة
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
