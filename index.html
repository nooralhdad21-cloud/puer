<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pure Match Pro - الإصدار المتعدد الشامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .bill-card { transition: 0.3s; border-right: 8px solid #10b981; }
        .bill-card.not-active { border-right-color: #ef4444; opacity: 0.6; background: #fff1f2; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4" onload="initApp()">

    <div class="max-w-5xl mx-auto">
        <header class="no-print bg-[#1e293b] text-white p-6 rounded-[2rem] mb-6 shadow-xl">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 italic">
                <div><label class="text-[10px] text-slate-400">المحاسب المسؤول</label>
                    <input type="text" id="accInput" class="w-full bg-slate-800 rounded-xl p-2 text-xs"></div>
                <div><label class="text-[10px] text-slate-400">المندوب</label>
                    <input type="text" id="repInput" class="w-full bg-slate-800 rounded-xl p-2 text-xs"></div>
                <div><label class="text-[10px] text-indigo-400 font-bold">خصم المطابقة %</label>
                    <select id="discInput" onchange="calculate()" class="w-full bg-slate-800 rounded-xl p-2 text-xs text-emerald-400 font-bold"></select></div>
                <div class="flex items-end">
                   <button onclick="toggleAllBills()" class="w-full bg-slate-700 hover:bg-slate-600 p-2 rounded-xl text-[10px] font-bold">⬇ إخفاء/إظهار الكل</button>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button onclick="document.getElementById('multiFile').click()" class="flex-1 bg-indigo-600 p-4 rounded-2xl text-xs font-black uppercase tracking-widest">رفع ملفات (PDF/Excel/صور)</button>
                <button onclick="window.print()" class="flex-1 bg-emerald-600 p-4 rounded-2xl text-xs font-black uppercase tracking-widest">طباعة التقرير النهائي</button>
            </div>
            <input type="file" id="multiFile" class="hidden" accept=".pdf, .xlsx, .xls, image/*" multiple>
        </header>

        <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-200">
            <div class="flex justify-between items-center border-b-4 border-slate-900 pb-6 mb-8">
                <h1 class="text-3xl font-black italic">مكتب بيور العلمي</h1>
                <div class="text-left text-[10px] font-bold text-slate-500">التاريخ: <span id="curDate"></span></div>
            </div>

            <div class="bg-slate-900 p-8 rounded-[2rem] text-white flex justify-between items-center mb-8 shadow-lg">
                <div class="flex-1">
                    <p class="text-[9px] text-indigo-400 font-black mb-1">اسم العميل / المذخر</p>
                    <input type="text" id="clientName" placeholder="بانتظار البيانات..." class="bg-transparent text-2xl font-black w-full outline-none">
                </div>
                <div class="text-left">
                    <p class="text-[9px] text-slate-500 font-black">المجموع قبل الخصم</p>
                    <p id="totalBefore" class="text-xl font-mono font-black italic">0.00 IQD</p>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200 text-[12px] font-bold text-center mb-6 italic">
                نود إعلامكم بأنه تمت مطابقة الحسابات بنجاح.
            </div>

            <div id="masterList" class="space-y-6 overflow-hidden transition-all duration-500"></div>

            <div class="mt-12 border-t-4 border-slate-900 pt-8 flex justify-between items-end">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase italic">الصافي النهائي للمطابقة:</p>
                    <p id="finalNet" class="text-5xl font-black text-slate-900 font-mono italic">0.00</p>
                    <p id="tafgeet" class="text-[11px] font-bold text-indigo-700 bg-indigo-50 px-4 py-2 rounded-xl mt-4 inline-block italic border border-indigo-100">..</p>
                </div>
                <div class="w-32 h-20 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 italic text-[8px] flex items-center justify-center text-slate-300">ختم المكتب</div>
            </div>
        </div>
    </div>

    <script>
        let allData = {}; // تخزين البيانات حسب اسم الملف
        let isVisible = true;

        function initApp() {
            document.getElementById('curDate').innerText = new Date().toLocaleDateString('en-GB');
            const sel = document.getElementById('discInput');
            for(let i=0; i<=15; i++) sel.innerHTML += `<option value="${i}">${i}%</option>`;
        }

        function toggleAllBills() {
            const list = document.getElementById('masterList');
            isVisible = !isVisible;
            list.style.maxHeight = isVisible ? "10000px" : "0px";
        }

        document.getElementById('multiFile').onchange = async (e) => {
            const files = e.target.files;
            for(let file of files) {
                if (file.type === "application/pdf") await processPDF(file);
                else if (file.type.includes("image")) await processImage(file);
                else if (file.name.endsWith(".xlsx") || file.name.endsWith(".xls")) await processExcel(file);
            }
            render();
        };

        // معالجة ملفات PDF (دقة مذخر اشور)
        async function processPDF(file) {
            const pdfJS = window['pdfjs-dist/build/pdf'];
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const pdf = await pdfJS.getDocument({data: await file.arrayBuffer()}).promise;
            let fileBills = [];
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const text = await page.getTextContent();
                const items = text.items;
                items.forEach(item => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.str)) {
                        const row = items.filter(it => Math.abs(it.transform[5] - item.transform[5]) < 5);
                        const nums = row.filter(r => /[\d,]+\.\d{2}/.test(r.str));
                        if (nums.length >= 1) {
                            let remainVal = nums[nums.length - 1].str;
                            let id = row.find(ri => /^\d{5,7}$/.test(ri.str))?.str || "---";
                            fileBills.push({ id, date: item.str, val: remainVal, active: true, note: '' });
                        }
                    }
                });
            }
            allData[file.name] = fileBills;
        }

        // معالجة صور الفواتير (OCR)
        async function processImage(file) {
            const result = await Tesseract.recognize(file, 'eng', { logger: m => console.log(m) });
            const text = result.data.text;
            let fileBills = [];
            // استخراج مبالغ تقريبية (أرقام تنتهي بـ .00)
            const matches = text.match(/[\d,]+\.\d{2}/g);
            if (matches) {
                matches.forEach((m, index) => {
                    fileBills.push({ id: "صورة-"+(index+1), date: "صورة فاتورة", val: m, active: true, note: '' });
                });
            }
            allData[file.name] = fileBills;
        }

        // معالجة ملفات الإكسل
        async function processExcel(file) {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);
            let fileBills = [];
            json.forEach((row, index) => {
                // محاولة البحث عن خانة متبقي أو مبلغ
                let val = row["المتبقي"] || row["Amount"] || row["الصافي"];
                if(val) fileBills.push({ id: "XLS-"+index, date: "إكسل", val: val.toString(), active: true, note: '' });
            });
            allData[file.name] = fileBills;
        }

        function render() {
            const container = document.getElementById('masterList');
            container.innerHTML = "";
            let totalRaw = 0;

            for (let fileName in allData) {
                let section = `<div class="mb-4"><h3 class="text-[10px] font-black text-indigo-600 border-b pb-1 mb-2">مصدر: ${fileName}</h3>`;
                allData[fileName].forEach((b, i) => {
                    const num = parseFloat(b.val.replace(/,/g, '')) || 0;
                    if(b.active) totalRaw += num;
                    
                    section += `
                        <div class="bill-card bg-white p-4 rounded-xl mb-2 flex flex-col ${b.active ? '' : 'not-active shadow-inner'}">
                            <div class="flex justify-between items-center cursor-pointer" onclick="toggleBill('${fileName}', ${i})">
                                <div><span class="text-sm font-black font-mono italic">${b.val} IQD</span>
                                     <span class="block text-[8px] text-slate-400 font-bold uppercase">#${b.id} | ${b.date}</span></div>
                                <div class="no-print">${b.active ? '✅' : '❌'}</div>
                            </div>
                            <input type="text" placeholder="أضف ملاحظة (نقص، تضرر..)" 
                                   class="no-print mt-2 text-[10px] border-b border-dashed outline-none w-full italic"
                                   value="${b.note}" oninput="updateNote('${fileName}', ${i}, this.value)">
                        </div>`;
                });
                section += `</div>`;
                container.innerHTML += section;
            }

            const discPerc = parseFloat(document.getElementById('discInput').value) || 0;
            const final = totalRaw - (totalRaw * (discPerc / 100));
            
            document.getElementById('totalBefore').innerText = totalRaw.toLocaleString(undefined, {minimumFractionDigits:2}) + " IQD";
            document.getElementById('finalNet').innerText = final.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('tafgeet').innerText = "فقط " + final.toLocaleString('ar-IQ') + " دينار عراقي لا غير";
        }

        function toggleBill(fName, index) {
            allData[fName][index].active = !allData[fName][index].active;
            render();
        }

        function updateNote(fName, index, val) {
            allData[fName][index].note = val;
            // لا نعيد الرندر هنا لتجنب فقدان الفوكس أثناء الكتابة
        }
    </script>
</body>
</html>
