<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيور العلمي - نظام المطابقة الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold">PURE SCIENCE | بيور العلمي</h1>
            <span id="userName" class="text-xs bg-blue-800 px-3 py-1 rounded-full hidden"></span>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-xl">
        <div id="loginSection" class="bg-white p-8 rounded-3xl shadow-sm mt-10 text-center">
            <div class="text-5xl mb-4">👨‍⚕️</div>
            <h2 class="font-bold mb-6 text-xl text-gray-800">تعريف الموظف المسؤول</h2>
            <input type="text" id="empName" placeholder="أدخل اسمك الثلاثي" class="w-full p-4 border-2 rounded-2xl mb-4 text-center focus:border-blue-500 outline-none transition-all">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">بدء العمل</button>
        </div>

        <div id="uploadSection" class="hidden mt-10 text-center animate-fade">
            <div class="bg-blue-50 p-10 rounded-3xl border-4 border-dashed border-blue-200">
                <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" class="w-16 mx-auto mb-4 opacity-50">
                <p class="font-bold text-blue-900 mb-4 text-lg">ارفع كشف PDF للمحافظة</p>
                <input type="file" id="pdfFile" accept=".pdf" class="hidden">
                <label for="pdfFile" class="bg-blue-600 text-white px-10 py-4 rounded-2xl cursor-pointer font-bold inline-block shadow-md hover:scale-105 transition-all">اختيار ملف الكشف</label>
            </div>
        </div>
