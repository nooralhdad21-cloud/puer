<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pharma PRO | النظام المحاسبي العالمي</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 antialiased">

    <nav class="no-print bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-200">P</div>
                <h1 class="text-xl font-black text-slate-800 tracking-tighter uppercase font-['Orbitron']">Pure <span class="text-indigo-600">Pharma</span></h1>
            </div>
            <div id="stats" class="hidden md:flex gap-6">
                <div class="text-center"><p class="text-[10px] text-slate-400 font-bold uppercase">العملاء</p><p id="countAcc" class="font-black text-indigo-600">0</p></div>
                <div class="text-center"><p class="text-[10px] text-slate-400 font-bold uppercase">إجمالي الديون</p><p id="sumTotal" class="font-black text-rose-600">0</p></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <section class="no-print mb-12 text-center">
            <div class="bg-indigo-900 rounded-[3rem] p-12 shadow-2xl relative overflow-hidden group">
                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10"></div>
                <h2 class="text-3xl md:text-5xl font-black text-white mb-4 relative z-10">نظام الاستحصال الذكي <span class="text-indigo-400">PRO</span></h2>
                <p class="text-indigo-200 mb-10 font-medium relative z-10">ارفع كشوفات الـ PDF وسيقوم النظام بفرز الديون وتجهيز القوائم فوراً</p>
                
                <div class="flex flex-col items-center relative z-10">
                    <input type="file" id="pdfUpload" class="hidden" accept=".pdf">
                    <button onclick="document.getElementById('pdfUpload').click()" class="bg-white text-indigo-900 px-16 py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-indigo-50 transition-all active:scale-95 flex items-center gap-3">
                        📂 ابدأ بمعالجة الملفات
                    </button>
                    <div id="loader" class="hidden mt-6 flex items-center gap-3 text-indigo-300 font-bold animate-pulse">
                        <div class="w-2 h-2 bg-indigo-400 rounded-full"></div> جاري تدقيق الحسابات...
                    </div>
                </div>
            </div>
        </section>

        <section class="no-print mb-10 px-2 flex flex-col md:flex-row gap-4">
            <input type="text" id="searchInput" onkeyup="filterData()" placeholder="ابحث عن صيدلية، مذخر، أو رقم قائمة..." class="flex-grow p-6 rounded-2xl border-2 border-slate-200 focus:border-indigo-600 outline-none font-bold text-lg shadow-sm transition-all">
            <button onclick="showAll()" class="bg-slate-800 text-white px-10 py-5 rounded-2xl font-black hover:bg-black transition shadow-lg">إعادة ضبط 🔄</button>
        </section>

        <div id="mainGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full flex flex-col items-center py-20 text-slate-300">
                <svg class="w-24 h-24 mb-4 opacity-20" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"></path></svg>
                <p class="text-xl font-black italic">نظام التأسيس بانتظار البيانات...</p>
            </div>
        </div>
    </main>

    <div id="modalOverlay" class="fixed inset-0 bg-slate-950/90 hidden z-50 flex items-center justify-center p-2 md:p-8 backdrop-blur-md no-print">
        <div class="bg-white rounded-[3rem] w-full max-w-5xl max-h-[92vh] overflow-hidden shadow-2xl flex flex-col modal-card">
            <div class="p-8 border-b flex justify-between items-center bg-slate-50">
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 font-black text-3xl p-2 transition">✕</button>
                <div class="flex gap-4">
                    <button onclick="window.print()" class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-black text-xs hover:bg-indigo-700 shadow-lg">🖨️ طباعة كشف برو</button>
                    <button id="waBtn" class="bg-green-600 text-white px-10 py-4 rounded-xl font-black text-xs hover:bg-green-700 shadow-lg">📱 إرسال واتساب</button>
                </div>
            </div>
            <div id="modalBody" class="p-10 overflow-y-auto custom-scroll"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
