<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مطابقة مكتب بيور العلمي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #1a1c23; }
        .report-container { background: white; padding: 1.5cm 2cm; min-height: 297mm; display: flex; flex-direction: column; }
        .bill-card { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #eee; transition: 0.2s; cursor: pointer; }
        .is-active { background: #f0fdf4; border-right: 5px solid #22c55e; }
        .not-active { opacity: 0.3; background: #fef2f2; border-right: 5px solid #ef4444; }
        
        /* التذييل المطلوب */
        .official-footer { margin-top: auto; border-top: 2px solid #000; padding-top: 20px; }
        .contact-bar { 
            background: #111827; color: white; display: flex; justify-content: center; 
            gap: 30px; padding: 12px; border-radius: 10px; margin-top: 20px; font-size: 11px;
        }
        
        @media print { .no-print { display: none !important; } .report-container { padding: 0; box-shadow: none; width: 100%; } }
    </style>
</head>
<body class="p-4" onload="initApp()">

    <div class="max-w-5xl mx-auto">
        <header class="no-print bg-[#24262d] text-white p-6 rounded-2xl mb-6 shadow-xl">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <div><label class="block text-[10px] text-gray-400 mb-1 italic">ACCOUNTANT</label><input type="text" id="myNameInput" oninput="saveName()" class="w-full bg-[#2f313a] border-none rounded-lg p-2 text-sm text-white"></div>
                <div><label class="block text-[10px] text-gray-400 mb-1 italic">REP</label><input type="text" id="repInput" oninput="sync()" class="w-full bg-[#2f313a] border-none rounded-lg p-2 text-sm text-white"></div>
                <div><label class="block text-[10px] text-gray-400 mb-1 italic">PROVINCE</label><input type="text" id="provInput" oninput="sync()" class="w-full bg-[#2f313a] border-none rounded-lg p-2 text-sm text-white"></div>
                <div><label class="block text-[10px] text-gray-400 mb-1 italic">CITY</label><input type="text" id="cityInput" oninput="sync()" class="w-full bg-[#2f313a] border-none rounded-lg p-2 text-sm text-white"></div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 items-end border-t border-gray-700 pt-4">
                <div><label class="block text-[10px] text-orange-400 mb-1">المبلغ السابق</label><input type="number" id="prevIn" oninput="calculate()" class="w-full bg-[#2f313a] border-none rounded-lg p-2 text-sm text-white"></div>
                <div><label class="block text-[10px] text-orange-400 mb-1">خصم سابق %</label><input type="number" id="prevDiscIn" oninput="calculate()" class="w-full bg-[#2f313a] border-none rounded-lg p-2 text-sm text-white"></div>
                <div><button onclick="document.getElementById('pdfFile').click()" class="w-full bg-indigo-600 p-2 rounded-lg text-xs font-bold uppercase">Upload PDF</button></div>
                <button onclick="window.print()" class="w-full bg-emerald-600 p-2 rounded-lg text-xs font-bold uppercase">Print Report</button>
            </div>
            <input type="file" id="pdfFile" class="hidden" accept=".pdf">
        </header>

        <div class="report-container shadow-2xl">
            <div class="flex justify-between items-start border-b-2 border-black pb-4 mb-6">
                <div>
                    <h1 class="text-4xl font-black text-black leading-none uppercase">Pure Scientific Bureau</h1>
                    <h2 class="text-xl font-bold text-gray-700">مكتب بيور العلمي</h2>
                </div>
                <div class="text-left text-[11px] font-bold">
                    <p>الموقع: <span id="outLoc">....</span></p>
                    <p>التاريخ: <span id="outDate">--/--/----</span></p>
                </div>
            </div>

            <div class="bg-[#111827] p-6 rounded-2xl text-white flex justify-between items-center mb-6">
                <div>
                    <p class="text-[10px] text-indigo-400 font-bold mb-1 italic">Client Account / اسم العميل</p>
                    <textarea id="outClient" placeholder="اسم المذخر هنا..." rows="1" class="text-2xl font-black bg-transparent border-none outline-none resize-none w-full"></textarea>
                </div>
                <div class="text-left border-r border-gray-700 pr-6">
                    <p class="text-[10px] text-gray-400 font-bold">إجمالي الكشف</p>
                    <p id="outFullOrig" class="text-lg font-black tracking-tighter">0 IQD</p>
                </div>
            </div>

            <div id="billsList" class="flex-grow space-y-1 mb-8">
                </div>

            <div class="official-footer">
                <div class="flex justify-between items-end">
                    <div class="flex gap-4">
                        <div class="border-2 border-dashed border-gray-200 rounded-2xl w-32 h-24 flex items-center justify-center text-[9px] text-gray-400 font-bold text-center">ختم وتوقيع<br>مكتب بيور العلمي</div>
                        <div class="border-2 border-dashed border-gray-200 rounded-2xl w-32 h-24 flex items-center justify-center text-[9px] text-gray-400 font-bold text-center">ختم وتوقيع<br>الجهة المستلمة</div>
                    </div>
                    <div class="text-left">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">صافي مبلغ المطابقة:</p>
                        <p id="resFinal" class="text-5xl font-black text-black tracking-tighter leading-none">0 IQD</p>
                        <div class="bg-indigo-50 text-indigo-700 text-[11px] font-black px-4 py-2 rounded-lg mt-4 inline-block border border-indigo-100" id="tafgeet">....</div>
                    </div>
                </div>

                <div class="contact-bar">
                    <span>📞 +964 750 426 5555</span>
                    <span>📧 info@pure-pharma.com</span>
                    <span>🌐 www.pure-pharma.com</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        function initApp() {
            const n = localStorage.getItem('p_name'); if(n) document.getElementById('myNameInput').value = n;
            document.getElementById('outDate').innerText = new Date().toLocaleDateString('en-GB');
            sync();
        }
        function saveName() { localStorage.setItem('p_name', document.getElementById('myNameInput').value); sync(); }
        function sync() {
            document.getElementById('outLoc').innerText = (document.getElementById('provInput').value || '..') + " / " + (document.getElementById('cityInput').value || '..');
            calculate();
        }

        document.getElementById('pdfFile').onchange = async (e) => {
            const file = e.target.files[0]; if (!file) return;
            const pdfJS = window['pdfjs-dist/build/pdf'];
            pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const buffer = await file.arrayBuffer();
            const pdf = await pdfJS.getDocument({data: buffer}).promise;
            db = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const items = content.items.sort((a, b) => b.transform[5] - a.transform[5]);
                let client = items.map(it => it.str).find(t => t.length > 10 && !t.includes("بيور")) || "";
                if(client) document.getElementById('outClient').value = client;
                items.forEach(item => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.str)) {
                        let id = "0", total = "0", remain = "0";
                        const row = items.filter(it => Math.abs(it.transform[5] - item.transform[5]) < 5);
                        const nums = row.filter(r => /^-?\d{1,3}(,\d{3})*(\.\d{2})?$/.test(r.str) && r.str.includes(","));
                        if(nums.length >= 1) { remain = nums[nums.length-1].str; total = nums[0].str; }
                        const idItem = row.find(ri => /^\d{5,7}$/.test(ri.str)); if(idItem) id = idItem.str;
                        db.push({ id, date: item.str, total, remain, status: 'ok' });
                    }
                });
            }
            calculate();
        };

        function calculate() {
            const list = document.getElementById('billsList'); list.innerHTML = ""; let sumRem = 0;
            db.forEach((b, i) => {
                const val = parseFloat(b.remain.replace(/,/g,'')) || 0;
                if (b.status === 'ok') sumRem += val;
                list.innerHTML += `
                    <div onclick="db[${i}].status=(db[${i}].status==='ok'?'none':'ok');calculate();" class="bill-card ${b.status === 'ok' ? 'is-active' : 'not-active'}">
                        <span class="text-sm font-black text-gray-800">${b.remain} IQD</span>
                        <span class="text-[10px] font-bold text-gray-400">#${b.id} - ${b.date}</span>
                    </div>`;
            });
            const pA = parseFloat(document.getElementById('prevIn').value) || 0;
            const pD = parseFloat(document.getElementById('prevDiscIn').value) || 0;
            const final = (pA - (pA * (pD/100))) + sumRem;
            document.getElementById('outFullOrig').innerText = sumRem.toLocaleString() + " IQD";
            document.getElementById('resFinal').innerText = final.toLocaleString() + " IQD";
            document.getElementById('tafgeet').innerText = "فقط " + final.toLocaleString('ar-IQ') + " دينار لا غير";
        }
    </script>
</body>
</html>
