<script>
    // ... (نفس الكود السابق حتى الوصول لدالة معالجة الـ PDF)

    document.getElementById('pdfFile').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const pdfJS = window['pdfjs-dist/build/pdf'];
        pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        const buffer = await file.arrayBuffer();
        const pdf = await pdfJS.getDocument({data: buffer}).promise;
        db = [];
        
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            // ترتيب العناصر حسب موقعها الرأسي ثم الأفقي لضمان دقة القراءة
            const sortedItems = content.items.sort((a, b) => b.transform[5] - a.transform[5] || a.transform[4] - b.transform[4]);
            
            let client = sortedItems.map(it => it.str).find(t => t.length > 10 && !t.includes("بيور")) || "";
            if(client) document.getElementById('outClient').value = client;

            sortedItems.forEach((item, idx) => {
                // البحث عن التاريخ كمرجع أساسي للسطر
                if (/\d{2}\/\d{2}\/\d{4}/.test(item.str)) {
                    let id = "----", amt = "0";
                    
                    // تحسين البحث عن رقم الفاتورة والمبلغ في نفس النطاق الأفقي للسطر
                    const yPos = item.transform[5];
                    const rowItems = sortedItems.filter(it => Math.abs(it.transform[5] - yPos) < 5);
                    
                    rowItems.forEach(rowItem => {
                        let text = rowItem.str.trim();
                        // التقاط رقم الفاتورة (5-7 أرقام)
                        if (/^\d{5,7}$/.test(text)) id = text;
                        // التقاط المبلغ (يحتوي على فواصل عشرية وأرقام كبيرة)
                        if (/^-?\d{1,3}(,\d{3})*(\.\d{2})?$/.test(text) && text.includes(",")) {
                            amt = text;
                        }
                    });

                    if (id !== "----") {
                        db.push({ id, date: item.str, amount: amt, status: 'none' });
                    }
                }
            });
        }
        calculate();
    };
</script>
