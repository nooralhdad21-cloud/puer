<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pharma | نظام التدقيق</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="bg-slate-800 p-8 rounded-[2rem] shadow-2xl mb-10 no-print border border-slate-700">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-right">
                    <h1 class="text-4xl font-black text-indigo-500 italic uppercase">Pure Pharma</h1>
                    <p class="text-slate-400 font-bold mt-2">نظام تحليل كشوفات الشرقاط وتكريت</p>
                </div>
                <div>
                    <input type="file" id="pdfInput" class="hidden" accept=".pdf">
                    <button onclick="document.getElementById('pdfInput').click()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-5 rounded-2xl font-black text-xl shadow-xl transition-all">
                        📂 ارفع الملف
                    </button>
                </div>
            </div>
        </header>

        <input type="text" id="search" onkeyup="doSearch()" placeholder="ابحث هنا..." class="w-full p-6 rounded-2xl bg-slate-800 border-2 border-slate-700 text-white mb-8 outline-none focus:border-indigo-500 font-bold shadow-inner">

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md no-print">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-4xl max-h-[90vh] rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <button onclick="closeModal()" class="text-slate-400 hover:text-white font-black text-2xl px-4">✕</button>
                <div class="flex gap-4">
                    <button onclick="window.print()" class="bg-white text-black px-6 py-2 rounded-xl font-black text-xs italic">Print</button>
                    <button id="waBtn" class="bg-green-600 text-white px-6 py-2 rounded-xl font-black text-xs italic">WhatsApp</button>
                </div>
            </div>
            <div id="modalContent" class="p-8 overflow-y-auto"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
