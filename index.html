<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pharma | نظام التدقيق الموحد</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .pharmacy-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; cursor: pointer; background: white; }
        .pharmacy-card:hover { transform: translateY(-5px); border-color: #4f46e5; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.1); }
        .checked-row { background-color: #d1fae5 !important; text-decoration: line-through; opacity: 0.6; }
        @media print { .no-print { display: none !important; } }
        .loading-shimmer { animation: shimmer 2s infinite; background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800">

    <div class="max-w-6xl mx-auto">
        <header class="bg-indigo-950 text-white p-8 rounded-[2rem] shadow-2xl mb-8 no-print flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-right">
                <h1 class="text-3xl font-black italic tracking-tight">PURE PHARMA PRO</h1>
                <p class="text-indigo-300 font-bold text-sm mt-1">نظام استخراج البيانات الذكي من ملفات PDF</p>
            </div>
            <div class="relative">
                <input type="file" id="pdfFile" class="hidden" accept=".pdf">
                <button onclick="document.getElementById('pdfFile').click()" class="bg-indigo-500 hover:bg-indigo-400 text-white px-10 py-4 rounded-2xl font-black shadow-lg transition-all active:scale-95 flex items-center gap-2">
                    <span>📂 ارفع ملف الكشف</span>
                </button>
                <div id="loader" class="hidden absolute -bottom-8 right-0 left-0 text-center">
                    <span class="text-[10px] font-bold text-indigo-500 animate-pulse text-nowrap">جاري معالجة الصفحات...</span>
                </div>
            </div>
        </header>

        <div class="no-print relative mb-8">
            <input type="text" id="search" onkeyup="filterGrid()" placeholder="بحث باسم الصيدلية أو رقم الحساب..." class="w-full p-5 rounded-2xl border-2 border-white shadow-sm focus:border-indigo-500 outline-none font-bold text-lg transition-all">
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md no-print">
        <div class="bg-white rounded-[2.5rem] w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 font-bold text-2xl w-10">✕</button>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest">طباعة</button>
                    <button id="whatsapp" class="bg-green-600 text-white px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest">واتساب</button>
                </div>
            </div>
            <div id="modalBody" class="p-8 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let store = {};

        // معالجة النصوص المقطعة والرموز الغريبة
        function clean(s) {
            return s.replace(/ѧ/g, '').replace(/([ا-ي])\s(?=[ا-ي])/g, '$1').trim();
        }

        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loader').classList.remove('hidden');
            const ab = await file.arrayBuffer();
            const pdf = await pdfjs.getDocument({data: ab}).promise;
            store = {};

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const text = content.items.map(s => s.str).join(' ');

                // RegEx متطور لاستخراج رقم الحساب والاسم من ملفات "أصيل"
                let idMatch = text.match(/(?:رقم|رق م|الحساب)[:\-\s]*(\d{2,6})/);
                let nameMatch = text.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|رق م|الموبايل|العن)/);

                if (idMatch) {
                    let id = idMatch[1];
                    let name = nameMatch ? clean(nameMatch[1]) : "حساب: " + id;
                    
                    if (!store[id]) store[id] = { id, name, bills: [], total: 0 };

                    // البحث عن الفواتير (رقم، تاريخ، مبلغ متبقي)
                    let regex = /(\d{5,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                    let m;
                    while ((m = regex.exec(text)) !== null) {
                        store[id].bills.push({ n: m[1], d: m[2], a: m[3] });
                        store[id].total += parseFloat(m[3].replace(/,/g, ''));
                    }
                }
            }
            renderGrid();
            document.getElementById('loader').classList.add('hidden');
        });

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            Object.values(store).forEach(c => {
                if (c.total > 0) {
                    grid.innerHTML += `
                    <div class="p-6 rounded-[2rem] pharmacy-card shadow-sm" onclick="openModal('${c.id}')" data-s="${c.name} ${c.id}">
                        <div class="text-[10px] font-black text-indigo-500 mb-2 uppercase italic tracking-widest">Account: ${c.id}</div>
                        <h3 class="text-lg font-black text-slate-800 leading-tight mb-6 h-12 overflow-hidden">${c.name}</h3>
                        <div class="border-t border-slate-50 pt-5 flex justify-between items-center">
                            <span class="text-slate-400 text-[10px] font-bold uppercase italic">Balance</span>
                            <span class="text-xl font-black text-indigo-600">${c.total.toLocaleString()} <small class="text-[10px]">د.ع</small></span>
                        </div>
                    </div>`;
                }
            });
        }

        function openModal(id) {
            const c = store[id];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('whatsapp').onclick = () => {
                let msg = `*بيور العلمي*%0A*كشف:* ${c.name}%0A*المتبقي:* ${c.total.toLocaleString()} د.ع`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            };

            document.getElementById('modalBody').innerHTML = `
                <div class="text-right mb-8">
                    <h2 class="text-3xl font-black text-slate-900 leading-none">${c.name}</h2>
                    <p class="text-indigo-500 font-bold mt-2 italic text-sm">ID: ${c.id}</p>
                </div>
                <div class="space-y-3">
                    ${c.bills.map((b, i) => `
                    <div id="row-${i}" class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center border border-slate-100 transition-colors">
                        <input type="checkbox" onchange="document.getElementById('row-${i}').classList.toggle('checked-row', this.checked)" class="w-6 h-6 accent-indigo-600 cursor-pointer">
                        <div class="text-center">
                            <span class="block text-[9px] text-slate-400 font-bold uppercase">Invoice</span>
                            <span class="font-mono font-black text-slate-700">${b.n}</span>
                        </div>
                        <div class="text-left">
                            <span class="block text-[9px] text-indigo-400 font-bold uppercase tracking-widest">${b.d}</span>
                            <span class="font-black text-lg text-slate-900">${b.a}</span>
                        </div>
                    </div>`).join('')}
                </div>
                <div class="mt-8 bg-indigo-950 text-white p-8 rounded-[2rem] flex justify-between items-center shadow-xl">
                    <span class="text-sm font-bold opacity-60 italic">Total Remaining</span>
                    <span class="text-3xl font-black">${c.total.toLocaleString()} <small class="text-xs italic">IQD</small></span>
                </div>
            `;
        }

        function filterGrid() {
            let q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('[data-s]').forEach(card => {
                card.style.display = card.getAttribute('data-s').toLowerCase().includes(q) ? "block" : "none";
            });
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
