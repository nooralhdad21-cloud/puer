<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام بيور العلمي | إدارة الكشوفات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .checked-row { background-color: #dcfce7 !important; text-decoration: line-through; opacity: 0.6; }
        .client-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .client-card:hover { transform: translateY(-5px); border-color: #4f46e5; box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.1); }
        @media print { .no-print { display: none !important; } .print-area { display: block !important; } }
    </style>
</head>
<body class="p-4 md:p-8 text-right">

    <div class="max-w-6xl mx-auto">
        <div class="bg-indigo-900 text-white p-8 rounded-3xl shadow-2xl mb-8 no-print flex flex-col md:flex-row justify-between items-center gap-6 border-b-4 border-indigo-500">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic uppercase">PurePharma Dashboard</h1>
                <p class="text-indigo-200 mt-2 font-bold">نظام معالجة كشوفات "أصيل" - الشرقاط وتكريت</p>
            </div>
            <div class="flex flex-col items-center gap-2">
                <input type="file" id="pdfFile" class="hidden" accept=".pdf">
                <button onclick="document.getElementById('pdfFile').click()" class="bg-white text-indigo-900 px-8 py-4 rounded-2xl font-black shadow-lg hover:bg-indigo-50 transition-all active:scale-95">
                    📂 ارفع ملف الكشف (PDF)
                </button>
                <div id="status" class="hidden text-xs font-bold animate-pulse text-indigo-300">جاري تحليل صفحات الملف...</div>
            </div>
        </div>

        <div class="mb-6 no-print">
            <input type="text" id="searchInput" onkeyup="searchClients()" placeholder="ابحث باسم الصيدلية أو رقم الحساب..." class="w-full p-4 rounded-2xl border-2 border-indigo-100 shadow-sm focus:border-indigo-500 outline-none font-bold">
        </div>

        <div id="clientsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 no-print">
            </div>

        <div id="detailsModal" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
            <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl flex flex-col scale-in">
                <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                    <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 font-bold text-xl transition-colors">✕ إغلاق</button>
                    <div class="flex gap-2">
                        <button onclick="window.print()" class="bg-slate-800 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-black transition">🖨️ طباعة</button>
                        <button id="waBtn" class="bg-green-600 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-green-700 transition">💬 واتساب</button>
                    </div>
                </div>
                <div id="modalContent" class="p-8 overflow-y-auto">
                    </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let store = {};

        // دالة ذكية لدمج الحروف المقطعة في نظام أصيل
        function fixAsilName(text) {
            // يزيل الرموز الغريبة ويدمج الحروف التي بينها مسافة واحدة
            return text.replace(/ѧ/g, '').replace(/([ا-ي])\s(?=[ا-ي])/g, '$1').trim();
        }

        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('status').classList.remove('hidden');
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            store = {};

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                let pageText = textContent.items.map(s => s.str).join(' ');

                // استخراج رقم العميل (ID) - المفتاح الفريد
                let idMatch = pageText.match(/(?:رقم|رق م|الحساب)[:\-\s]*(\d{4,5})/);
                // استخراج اسم العميل الخام
                let nameMatch = pageText.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|رق م|الموبايل|الموباي)/);

                if (idMatch) {
                    let id = idMatch[1];
                    let rawName = nameMatch ? nameMatch[1] : "عميل مجهول";
                    let cleanName = fixAsilName(rawName);

                    if (!store[id]) {
                        store[id] = { id: id, name: cleanName, rawName: rawName, bills: [], total: 0, p: i };
                    }

                    // استخراج أسطر الفواتير (رقم، تاريخ، مبلغ)
                    let billRegex = /(\d{6,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                    let matches;
                    while ((matches = billRegex.exec(pageText)) !== null) {
                        store[id].bills.push({ num: matches[1], date: matches[2], amount: matches[3] });
                        store[id].total += parseFloat(matches[3].replace(/,/g, ''));
                    }
                }
            }
            renderGrid();
            document.getElementById('status').classList.add('hidden');
        });

        function renderGrid() {
            const grid = document.getElementById('clientsGrid');
            grid.innerHTML = "";
            Object.values(store).forEach(c => {
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl client-card cursor-pointer shadow-sm relative overflow-hidden" onclick="openDetails('${c.id}')" data-name="${c.name} ${c.id}">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-black italic">ID: ${c.id}</span>
                            <span class="text-slate-300 text-[10px] font-bold uppercase">Page ${c.p}</span>
                        </div>
                        <h3 class="text-lg font-black text-slate-800 leading-tight mb-2 text-right">${c.name}</h3>
                        <p class="text-[10px] text-slate-400 mb-4 truncate text-right">خام: (${c.rawName})</p>
                        <div class="flex justify-between items-end border-t border-slate-50 pt-4">
                            <span class="text-slate-400 text-[10px] font-bold">TOTAL</span>
                            <span class="text-indigo-600 font-black text-xl">${c.total.toLocaleString()} د.ع</span>
                        </div>
                    </div>`;
            });
        }

        function openDetails(id) {
            const c = store[id];
            const modal = document.getElementById('detailsModal');
            const content = document.getElementById('modalContent');
            const waBtn = document.getElementById('waBtn');
            
            modal.classList.remove('hidden');
            waBtn.onclick = () => {
                let msg = `*كشف حساب مكتب بيور*%0A*العميل:* ${c.name}%0A*رقم الحساب:* ${c.id}%0A*المبلغ الإجمالي:* ${c.total.toLocaleString()} د.ع`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            };

            content.innerHTML = `
                <div class="text-right mb-8">
                    <h2 class="text-3xl font-black text-slate-900">${c.name}</h2>
                    <p class="text-indigo-500 font-bold mt-1">رقم الحساب الفريد: ${c.id}</p>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-right border-collapse">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 border-b-2 border-slate-200">
                                <th class="p-4 font-black text-sm">مطابقة</th>
                                <th class="p-4 font-black text-sm text-center">رقم الفاتورة</th>
                                <th class="p-4 font-black text-sm text-center">التاريخ</th>
                                <th class="p-4 font-black text-sm text-left font-mono">المبلغ المتبقي</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${c.bills.map((b, index) => `
                                <tr id="row-${index}" class="hover:bg-slate-50 transition">
                                    <td class="p-4"><input type="checkbox" onchange="document.getElementById('row-${index}').classList.toggle('checked-row', this.checked)" class="w-6 h-6 accent-indigo-600 cursor-pointer"></td>
                                    <td class="p-4 font-bold text-slate-700 font-mono text-center">${b.num}</td>
                                    <td class="p-4 text-slate-500 text-center font-bold text-xs">${b.date}</td>
                                    <td class="p-4 font-black text-indigo-900 text-left text-lg">${b.amount} د.ع</td>
                                </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
                <div class="mt-10 bg-indigo-900 text-white p-8 rounded-3xl flex justify-between items-center shadow-2xl">
                    <span class="text-sm font-bold opacity-80 uppercase tracking-widest italic">Grand Balance Total</span>
                    <span class="text-3xl font-black">${c.total.toLocaleString()} د.ع</span>
                </div>
            `;
        }

        function searchClients() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('client-card');
            for (let card of cards) {
                card.style.display = card.getAttribute('data-name').toLowerCase().includes(input) ? "block" : "none";
            }
        }

        function closeModal() { document.getElementById('detailsModal').classList.add('hidden'); }
    </script>
</body>
</html>
