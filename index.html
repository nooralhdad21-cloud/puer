<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Science Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 min-h-screen font-['Cairo']">

    <nav class="bg-blue-900 text-white p-4 shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-2xl font-black italic tracking-tighter">PURE <span class="text-blue-400">PRO</span></h1>
            <div id="userStatus" class="hidden bg-blue-800 px-4 py-1 rounded-full text-xs border border-blue-400 animate-pulse">متصل الآن</div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <div id="liveDashboard" class="hidden grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-b-8 border-blue-600 text-center transform transition hover:scale-105">
                <p class="text-gray-400 text-[10px] font-bold uppercase mb-2">إجمالي الفواتير</p>
                <span id="statTotal" class="text-4xl font-black text-slate-800">0</span>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-b-8 border-red-500 text-center transform transition hover:scale-105">
                <p class="text-gray-400 text-[10px] font-bold uppercase mb-2">غير مطابقة</p>
                <span id="statUnmatched" class="text-4xl font-black text-red-600">0</span>
            </div>
        </div>

        <div id="stepLogin" class="bg-white p-10 rounded-[3rem] shadow-2xl mt-10 text-center border border-white/50">
            <div class="text-6xl mb-6">📊</div>
            <h2 class="text-2xl font-black text-slate-800 mb-6">نظام المطابقة الذكي</h2>
            <input type="text" id="userName" placeholder="اسم المندوب المسؤول" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl mb-4 text-center focus:border-blue-600 outline-none transition-all font-bold">
            <button onclick="startSystem()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-[0_10px_20px_rgba(37,99,235,0.3)] hover:bg-blue-700 active:scale-95 transition-all">فتح الداشبورد</button>
        </div>

        <div id="stepUpload" class="hidden mt-10 animate-fade-in">
            <div class="bg-white p-12 rounded-[3rem] border-4 border-dashed border-blue-200 shadow-inner text-center">
                <div class="text-5xl mb-4 opacity-30">📁</div>
                <p class="font-bold text-slate-700 mb-8">ارفع كشف (الشرقاط) بصيغة PDF</p>
                <input type="file" id="pdfInput" accept=".pdf" class="hidden">
                <label for="pdfInput" class="bg-blue-600 text-white px-12 py-5 rounded-3xl cursor-pointer font-black shadow-xl hover:bg-blue-700 transition-all inline-block">اختيار الملف</label>
            </div>
        </div>

        <div id="stepList" class="hidden space-y-4 mt-4 pb-20">
            </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
