<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيور العلمي - مطابقة الكشوفات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold">نظام مطابقة مكتب بيور</h1>
            <span id="userName" class="text-sm bg-blue-800 px-3 py-1 rounded-full hidden"></span>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-xl">
        <div id="loginSection" class="bg-white p-8 rounded-3xl shadow-sm mt-10">
            <h2 class="text-center font-bold mb-6 text-xl">تسجيل الدخول</h2>
            <input type="text" id="empName" placeholder="اسم الموظف الثلاثي" class="w-full p-4 border rounded-2xl mb-4 text-center">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">دخول</button>
        </div>

        <div id="uploadSection" class="hidden mt-10 text-center">
            <div class="bg-blue-50 p-10 rounded-3xl border-4 border-dashed border-blue-200">
                <p class="font-bold text-blue-900 mb-4 text-lg">ارفع كشف المحافظة (PDF)</p>
                <input type="file" id="pdfFile" accept=".pdf" class="hidden">
                <label for="pdfFile" class="bg-blue-600 text-white px-10 py-4 rounded-2xl cursor-pointer font-bold inline-block shadow-md">اختر الملف</label>
            </div>
        </div>

        <div id="listSection" class="hidden mt-6">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-bold">فواتير الكشف:</h3>
                <span id="totalCount" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs font-bold">0</span>
            </div>
            <div id="invoiceContainer" class="space-y-4"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
