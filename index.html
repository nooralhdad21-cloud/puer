<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pharma | نظام المحاسبة والاستحصال المتطور</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* إعدادات الخط والطباعة الاحترافية */
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        
        .pharmacy-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #e2e8f0; 
            background: white; 
            border-radius: 2rem; 
            position: relative; 
        }
        
        .pharmacy-card:hover { 
            transform: translateY(-8px); 
            border-color: #6366f1; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
        }

        .hidden-node { display: none !important; }

        .checked-row { 
            background-color: #f0fdf4 !important; 
            opacity: 0.6; 
            text-decoration: line-through; 
            border-right: 5px solid #22c55e; 
        }

        .modal-content { border-radius: 3rem; overflow: hidden; background: white; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* تنسيق الطباعة الرسمي لمكتب بيور العلمي */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .modal-content { border: none !important; box-shadow: none !important; position: absolute; top: 0; width: 100%; }
            table { font-size: 16px !important; }
            .print-header { display: block !important; border-bottom: 2px solid #000; margin-bottom: 20px; padding-bottom: 10px; }
        }
        .print-header { display: none; }
    </style>
</head>
<body class="antialiased custom-scroll">

    <div class="max-w-7xl mx-auto p-4 md:p-10">
        <header class="bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl mb-10 no-print border-b-8 border-indigo-600">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-right">
                <div>
                    <h1 class="text-4xl font-black tracking-tighter text-indigo-400 italic">PURE PHARMA PRO</h1>
                    <p class="text-slate-400 font-bold mt-2">نظام تدقيق الكشوفات واستحصال الديون المتراكمة</p>
                </div>
                <div class="flex flex-col items-center">
                    <input type="file" id="pdfUpload" class="hidden" accept=".pdf">
                    <button onclick="document.getElementById('pdfUpload').click()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-5 rounded-3xl font-black shadow-lg transition-all active:scale-95 text-lg">
                        📂 ارفع كشف الحساب (PDF)
                    </button>
                    <div id="loader" class="hidden mt-4 flex items-center gap-2">
                        <div class="w-5 h-5 border-3 border-indigo-400 border-t-transparent rounded-full animate-spin"></div>
                        <span class="text-xs font-bold text-indigo-300 tracking-widest uppercase">Analyzing Data...</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="no-print flex flex-col md:flex-row gap-4 mb-10 px-2">
            <input type="text" id="searchInput" onkeyup="filterResults()" placeholder="ابحث باسم الصيدلية، الحساب، أو المبلغ..." class="flex-grow p-6 rounded-[2rem] border-2 border-slate-200 focus:border-indigo-500 outline-none font-bold text-xl shadow-sm transition-all">
            <button onclick="revealAll()" class="bg-white text-slate-500 px-10 py-6 rounded-[2rem] font-black border-2 border-slate-200 hover:bg-slate-50 transition shadow-sm">إظهار المخفي 👁️</button>
        </div>

        <div id="gridArea" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-24 bg-white/50 border-4 border-dashed border-slate-300 rounded-[4rem]">
                <p class="text-slate-400 text-2xl font-black italic">نظام المحاسبة بانتظار رفع ملف الكشوفات...</p>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/95 hidden z-50 flex items-center justify-center p-2 md:p-6 backdrop-blur-md no-print">
        <div class="bg-white rounded-[4rem] w-full max-w-6xl max-h-[94vh] overflow-hidden shadow-2xl flex flex-col modal-content">
            <div class="p-8 border-b flex justify-between items-center bg-slate-50">
                <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 font-black text-3xl w-14 h-14 flex items-center justify-center rounded-full hover:bg-red-50 transition-all">✕</button>
                <div class="flex gap-4">
                    <button onclick="window.print()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-sm hover:bg-black shadow-lg">🖨️ طباعة كشف رسمي</button>
                    <button id="waShare" class="bg-green-600 text-white px-10 py-4 rounded-2xl font-black text-sm hover:bg-green-700 shadow-lg">📱 إرسال واتساب</button>
                </div>
            </div>
            <div id="modalBody" class="p-10 overflow-y-auto custom-scroll"></div>
        </div>
    </div>

    <script>
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let masterDB = {};

        // دالة تنظيف النصوص لملفات أصيل
        function cleanStr(s) {
            return s.replace(/ѧ/g, '').replace(/([ا-ي])\s(?=[ا-ي])/g, '$1').trim();
        }

        document.getElementById('pdfUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loader').classList.remove('hidden');
            const buffer = await file.arrayBuffer();
            
            try {
                const pdf = await pdfjs.getDocument({data: buffer}).promise;
                masterDB = {};

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const text = content.items.map(s => s.str).join(' ');

                    let idMatch = text.match(/(?:رقم|الحساب|رق م)[:\-\s]*(\d{2,6})/);
                    let nameMatch = text.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|رق م|الموبايل|العن)/);

                    if (idMatch) {
                        let id = idMatch[1];
                        let name = nameMatch ? cleanStr(nameMatch[1]) : "حساب: " + id;
                        if (!masterDB[id]) masterDB[id] = { id, name, bills: [], total: 0 };

                        let regex = /(\d{5,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                        let match;
                        while ((match = regex.exec(text)) !== null) {
                            masterDB[id].bills.push({ n: match[1], d: match[2], a: match[3] });
                            masterDB[id].total += parseFloat(match[3].replace(/,/g, ''));
                        }
                    }
                }
                renderGrid();
            } catch (err) { console.error(err); }
            document.getElementById('loader').classList.add('hidden');
        });

        function renderGrid() {
            const grid = document.getElementById('gridArea');
            grid.innerHTML = "";
            Object.values(masterDB).forEach(acc => {
                if(acc.total > 0) {
                    grid.innerHTML += `
                    <div class="pharmacy-card p-8 group" id="card-${acc.id}" data-search="${acc.name} ${acc.id}">
                        <button onclick="hideNode('card-${acc.id}')" class="absolute left-5 top-5 text-slate-200 hover:text-red-500 no-print transition-colors">✕</button>
                        <div class="text-[10px] font-black text-indigo-500 mb-2 tracking-widest italic uppercase">ACC-ID: ${acc.id}</div>
                        <h3 class="text-2xl font-black text-slate-800 leading-tight mb-10 h-16 overflow-hidden cursor-pointer group-hover:text-indigo-600 transition-colors" onclick="openDetails('${acc.id}')">${acc.name}</h3>
                        <div class="flex justify-between items-center border-t border-slate-50 pt-8">
                            <span class="text-slate-400 text-xs font-bold uppercase italic">Collection</span>
                            <span class="text-3xl font-black text-indigo-600 tracking-tighter">${acc.total.toLocaleString()} <small class="text-[10px]">د.ع</small></span>
                        </div>
                    </div>`;
                }
            });
        }

        function openDetails(id) {
            const acc = masterDB[id];
            document.getElementById('modalOverlay').classList.remove('hidden');
            document.getElementById('waShare').onclick = () => {
                let msg = `*بيور العلمي - كشف حساب*%0A*العميل:* ${acc.name}%0A*المبلغ:* ${acc.total.toLocaleString()} د.ع`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            };

            document.getElementById('modalBody').innerHTML = `
                <div class="print-header">
                    <h1 style="text-align:center; font-size: 24px;">مكتب بيور العلمي لتجارة الأدوية</h1>
                    <h2 style="text-align:center;">كشف حساب استحصال ديون</h2>
                </div>
                <div class="text-right mb-12 border-r-[12px] border-indigo-600 pr-8">
                    <h2 class="text-5xl font-black text-slate-900">${acc.name}</h2>
                    <p class="text-indigo-500 font-bold text-sm mt-2 tracking-[0.2em] uppercase">Account UID: ${acc.id}</p>
                </div>
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 font-black text-[10px] uppercase border-b-2 border-slate-100">
                            <th class="p-5 no-print text-center w-24">إخفاء/سدد</th>
                            <th class="p-5">رقم القائمة</th>
                            <th class="p-5 text-center">التاريخ</th>
                            <th class="p-5 text-left">المبلغ الصافي</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        ${acc.bills.map((b, i) => `
                        <tr id="row-${id}-${i}" class="hover:bg-indigo-50/40 transition-colors group">
                            <td class="p-5 no-print text-center">
                                <div class="flex gap-3 justify-center">
                                    <input type="checkbox" onchange="document.getElementById('row-${id}-${i}').classList.toggle('checked-row', this.checked)" class="w-7 h-7 accent-indigo-600 cursor-pointer">
                                    <button onclick="hideNode('row-${id}-${i}')" class="text-slate-200 hover:text-red-500">✕</button>
                                </div>
                            </td>
                            <td class="p-5 font-black font-mono text-xl text-slate-700 italic">${b.n}</td>
                            <td class="p-5 text-slate-400 font-bold text-center text-xs tracking-widest">${b.d}</td>
                            <td class="p-5 font-black text-indigo-950 text-left text-2xl tracking-tighter">${b.a}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
                <div class="mt-14 bg-indigo-900 text-white p-12 rounded-[4rem] flex justify-between items-center shadow-2xl relative overflow-hidden">
                    <div class="absolute right-0 top-0 w-32 h-32 bg-white/5 rounded-full -mr-16 -mt-16"></div>
                    <div class="relative z-10">
                        <span class="text-xs font-black uppercase italic opacity-60 tracking-[0.3em] block mb-2">Final Balance Due</span>
                        <span class="text-xl font-bold">المجموع الكلي المطلوب للاستحصال</span>
                    </div>
                    <span class="relative z-10 text-5xl font-black italic tracking-tighter text-indigo-300">${acc.total.toLocaleString()} <small class="text-sm">د.ع</small></span>
                </div>
            `;
        }

        function hideNode(id) { document.getElementById(id).classList.add('hidden-node'); }
        function revealAll() { document.querySelectorAll('.hidden-node').forEach(e => e.classList.remove('hidden-node')); }
        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
        function filterResults() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('[data-search]').forEach(card => {
                card.style.display = card.getAttribute('data-search').toLowerCase().includes(q) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
