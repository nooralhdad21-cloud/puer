<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurePharma | نظام إدارة المحافظات والمدن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f4f7fa; font-family: 'Cairo', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .sidebar { width: 350px; height: 100vh; position: fixed; right: 0; top: 0; background: #fff; border-left: 1px solid #e5e7eb; z-index: 40; }
        .main-content { margin-right: 350px; padding: 2rem; min-height: 100vh; }
        .pharmacy-active { background: #eff6ff; border-right: 4px solid #2563eb; }
        .num-font { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>

    <aside class="sidebar flex flex-col shadow-2xl">
        <div class="p-6 border-b">
            <h1 class="text-2xl font-black text-blue-900 mb-1 italic">PUREPHARMA</h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">نظام التدقيق المركزي</p>
        </div>
        
        <div class="p-4 bg-gray-50 border-b">
            <input type="file" id="pdfUpload" class="hidden" accept=".pdf">
            <button onclick="document.getElementById('pdfUpload').click()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg mb-3">رفع كشف المدينة</button>
            <input type="text" id="searchBox" onkeyup="renderSidebar()" placeholder="بحث في العملاء..." class="w-full p-3 rounded-lg border outline-none text-sm focus:border-blue-500">
        </div>

        <div id="customerList" class="flex-1 overflow-y-auto">
            <div class="p-10 text-center text-gray-300 font-bold italic">ارفع ملف PDF لبدء الجرد</div>
        </div>
    </aside>

    <main class="main-content">
        <div id="headerInfo" class="hidden mb-8 flex justify-between items-end">
            <div>
                <nav class="flex text-sm text-gray-500 font-bold mb-2">
                    <span id="provinceLabel" class="text-blue-600">محافظة ...</span>
                    <span class="mx-2">/</span>
                    <span id="cityLabel">مدينة ...</span>
                </nav>
                <h2 class="text-3xl font-black text-slate-800">تفاصيل فواتير المدينة</h2>
            </div>
            <div class="flex gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border text-center min-w-[120px]">
                    <p class="text-[10px] font-bold text-gray-400">عدد العملاء</p>
                    <p id="clientCount" class="text-xl font-black text-slate-800">0</p>
                </div>
                <div class="bg-blue-900 p-4 rounded-2xl shadow-lg text-center min-w-[180px]">
                    <p class="text-[10px] font-bold text-blue-200">إجمالي ديون المدينة</p>
                    <p id="cityTotal" class="text-xl font-black text-white num-font">0</p>
                </div>
            </div>
        </div>

        <div id="detailsWorkspace">
            <div class="flex flex-col items-center justify-center mt-32 text-gray-300">
                <svg class="w-24 h-24 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <p class="text-xl font-bold italic text-slate-400">لم يتم اختيار عميل بعد</p>
            </div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let mainData = {}; 
        let currentActive = null;

        document.getElementById('pdfUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(this.result) }).promise;
                let textItems = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    textItems.push(...content.items.map(it => ({ str: it.str, y: Math.round(it.transform[5]) })));
                }
                analyzeFile(textItems);
            };
            reader.readAsArrayBuffer(file);
        });

        function analyzeFile(data) {
            mainData = {};
            let tempCustomer = "غير معروف";
            let city = "غير محدد";
            let province = "غير محدد";

            // ترتيب البيانات لقراءة الترويسات قبل الفواتير
            data.sort((a, b) => b.y - a.y);

            data.forEach(item => {
                let txt = item.str.trim();
                
                // 1. استخراج المدينة والمحافظة
                if (txt.includes("الشرقاط")) { city = "قضاء الشرقاط"; province = "صلاح الدين"; }
                
                // 2. تصفية أسماء العملاء (تجاهل مكتب بيور)
                if ((txt.includes("مذخر") || txt.includes("صيدلية")) && !txt.includes("بيور العلمي")) {
                    // تنظيف الاسم من الرموز والكلمات الزائدة
                    tempCustomer = txt.replace(/الاسم|:|ѧ|متر|متخر/g, 'مذخر').trim();
                    if (!mainData[tempCustomer]) {
                        mainData[tempCustomer] = { invoices: [], total: 0 };
                    }
                }

                // 3. استخراج الفواتير (رقم الفاتورة، المبلغ المتبقي)
                if (/^\d{5,6}$/.test(txt)) {
                    let invoice = { id: txt, amount: 0, date: '---' };
                    let row = data.filter(it => Math.abs(it.y - item.y) < 10);
                    
                    row.forEach(r => {
                        if (r.str.includes('/')) invoice.date = r.str;
                        if (/^[\d,]+\.\d{2}$/.test(r.str)) {
                            invoice.amount = parseFloat(r.str.replace(/,/g, ''));
                        }
                    });

                    if (invoice.amount > 0 && tempCustomer !== "غير معروف") {
                        mainData[tempCustomer].invoices.push(invoice);
                        mainData[tempCustomer].total += invoice.amount;
                    }
                }
            });

            // تحديث العناوين في الواجهة
            document.getElementById('provinceLabel').innerText = province;
            document.getElementById('cityLabel').innerText = city;
            document.getElementById('headerInfo').classList.remove('hidden');
            
            renderSidebar();
            updateGlobalStats();
        }

        function renderSidebar() {
            const list = document.getElementById('customerList');
            const query = document.getElementById('searchBox').value.toLowerCase();
            list.innerHTML = "";

            Object.keys(mainData).forEach(name => {
                if (name.toLowerCase().includes(query)) {
                    const div = document.createElement('div');
                    div.className = `p-5 border-b cursor-pointer hover:bg-gray-50 transition-all ${currentActive === name ? 'pharmacy-active' : ''}`;
                    div.onclick = () => selectCustomer(name);
                    div.innerHTML = `
                        <h4 class="font-black text-sm text-slate-800 mb-1">${name}</h4>
                        <div class="flex justify-between items-center text-[10px] font-bold text-gray-400">
                            <span>${mainData[name].invoices.length} فاتورة</span>
                            <span class="text-blue-600">${mainData[name].total.toLocaleString()} د.ع</span>
                        </div>
                    `;
                    list.appendChild(div);
                }
            });
        }

        function selectCustomer(name) {
            currentActive = name;
            renderSidebar();
            const customer = mainData[name];
            const workspace = document.getElementById('detailsWorkspace');

            workspace.innerHTML = `
                <div class="bg-white rounded-3xl p-8 shadow-xl border border-gray-100 animate-in fade-in duration-500">
                    <div class="flex justify-between items-start mb-8 pb-6 border-b border-gray-50">
                        <div>
                            <h2 class="text-2xl font-black text-slate-800 mb-1">${name}</h2>
                            <p class="text-sm font-bold text-blue-500 italic">📍 كافة فواتير العميل المسجلة في هذا الملف</p>
                        </div>
                        <div class="text-left bg-blue-50 p-4 rounded-2xl border border-blue-100">
                            <p class="text-[10px] font-black text-blue-400 uppercase">إجمالي مبلغه في الملف</p>
                            <p class="text-2xl font-black text-blue-900 num-font">${customer.total.toLocaleString()}</p>
                        </div>
                    </div>

                    <div class="overflow-hidden rounded-2xl border border-gray-100">
                        <table class="w-full text-right bg-white text-sm">
                            <thead class="bg-gray-50 text-gray-400 font-black text-[10px] uppercase">
                                <tr>
                                    <th class="p-4">رقم الفاتورة</th>
                                    <th class="p-4 text-center">التاريخ</th>
                                    <th class="p-4 text-left">المبلغ المتبقي</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-50">
                                ${customer.invoices.map(inv => `
                                    <tr class="hover:bg-slate-50 transition-colors">
                                        <td class="p-4 font-black text-slate-700">#${inv.id}</td>
                                        <td class="p-4 text-center text-gray-500 font-bold">${inv.date}</td>
                                        <td class="p-4 text-left font-black text-blue-700 num-font">${inv.amount.toLocaleString()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function updateGlobalStats() {
            const names = Object.keys(mainData);
            let grandTotal = 0;
            names.forEach(n => grandTotal += mainData[n].total);
            
            document.getElementById('clientCount').innerText = names.length;
            document.getElementById('cityTotal').innerText = grandTotal.toLocaleString() + " د.ع";
        }
    </script>
</body>
</html>
