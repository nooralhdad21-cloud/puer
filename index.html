<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurePharma | مكتب بيور العلمي</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .pharmacy-card { transition: all 0.2s; border: 1px solid #e5e7eb; background: white; cursor: pointer; }
        .pharmacy-card:hover { transform: translateY(-3px); border-color: #4f46e5; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .checked-row { background-color: #d1fae5 !important; text-decoration: line-through; opacity: 0.6; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="bg-indigo-900 text-white p-8 rounded-2xl shadow-lg mb-8 flex flex-col md:flex-row justify-between items-center gap-4 no-print">
            <div>
                <h1 class="text-3xl font-black italic">PUREPHARMA</h1>
                <p class="text-indigo-300 text-sm font-bold">نظام كشوفات الشرقاط وتكريت - النسخة المعتمدة</p>
            </div>
            <div>
                <input type="file" id="uploadFile" class="hidden" accept=".pdf">
                <button onclick="document.getElementById('uploadFile').click()" class="bg-indigo-500 hover:bg-indigo-400 px-8 py-3 rounded-xl font-bold shadow-md transition-all active:scale-95">
                    📂 ارفع ملف الكشف PDF
                </button>
            </div>
        </div>

        <div class="no-print">
            <input type="text" id="searchInput" onkeyup="searchFunction()" placeholder="ابحث باسم الصيدلية أو رقم الحساب..." class="w-full p-4 rounded-xl border-2 border-gray-200 mb-8 outline-none focus:border-indigo-500 font-bold text-lg shadow-sm">
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm no-print">
        <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 font-bold text-2xl px-4">✕</button>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="bg-gray-800 text-white px-6 py-2 rounded-lg text-xs font-bold uppercase">طباعة الكشف</button>
                    <button id="whatsappBtn" class="bg-green-600 text-white px-6 py-2 rounded-lg text-xs font-bold uppercase">إرسال واتساب</button>
                </div>
            </div>
            <div id="modalContent" class="p-8 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const pdfLib = window['pdfjs-dist/build/pdf'];
        pdfLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let allData = {};

        // تنظيف النصوص من رموز نظام أصيل
        function cleanText(text) {
            return text.replace(/ѧ/g, '').replace(/([ا-ي])\s(?=[ا-ي])/g, '$1').trim();
        }

        document.getElementById('uploadFile').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfLib.getDocument({data: arrayBuffer}).promise;
            allData = {};

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const rawText = content.items.map(s => s.str).join(' ');

                // استخراج رقم الحساب والاسم
                let idMatch = rawText.match(/(?:رقم|رق م|الحساب)[:\-\s]*(\d{2,6})/);
                let nameMatch = rawText.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|رق م|الموبايل|العن)/);

                if (idMatch) {
                    let id = idMatch[1];
                    let name = nameMatch ? cleanText(nameMatch[1]) : "جهة غير معروفة";

                    if (!allData[id]) {
                        allData[id] = { id, name, bills: [], total: 0 };
                    }

                    // التقاط الفواتير
                    let billRegex = /(\d{5,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                    let match;
                    while ((match = billRegex.exec(rawText)) !== null) {
                        allData[id].bills.push({ id: match[1], date: match[2], amount: match[3] });
                        allData[id].total += parseFloat(match[3].replace(/,/g, ''));
                    }
                }
            }
            displayGrid();
        });

        function displayGrid() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = "";
            Object.values(allData).forEach(item => {
                if (item.total > 0) {
                    grid.innerHTML += `
                    <div class="p-6 rounded-2xl pharmacy-card shadow-sm" onclick="openDetails('${item.id}')" data-search="${item.name} ${item.id}">
                        <div class="text-[10px] font-black text-indigo-500 mb-2 italic">ID: ${item.id}</div>
                        <h3 class="text-lg font-black text-gray-800 mb-4 h-12 overflow-hidden">${item.name}</h3>
                        <div class="border-t pt-4 flex justify-between items-center">
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Balance</span>
                            <span class="text-xl font-black text-indigo-600">${item.total.toLocaleString()} د.ع</span>
                        </div>
                    </div>`;
                }
            });
        }

        function openDetails(id) {
            const client = allData[id];
            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('whatsappBtn').onclick = () => {
                let msg = `*مكتب بيور العلمي*%0A*كشف حساب:* ${client.name}%0A*الإجمالي المتبقي:* ${client.total.toLocaleString()} د.ع`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            };

            document.getElementById('modalContent').innerHTML = `
                <div class="text-right mb-8">
                    <h2 class="text-3xl font-black text-gray-900">${client.name}</h2>
                    <p class="text-indigo-600 font-bold italic text-lg">رقم الحساب: ${client.id}</p>
                </div>
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b text-gray-400 uppercase text-xs">
                            <th class="p-4 font-black">حالة المطابقة</th>
                            <th class="p-4 font-black text-center">رقم الفاتورة</th>
                            <th class="p-4 font-black text-left">المبلغ</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${client.bills.map((b, index) => `
                        <tr id="row-${index}" class="border-b border-gray-50 transition-colors">
                            <td class="p-4"><input type="checkbox" onchange="document.getElementById('row-${index}').classList.toggle('checked-row', this.checked)" class="w-6 h-6 accent-indigo-600 cursor-pointer"></td>
                            <td class="p-4 font-bold text-gray-700 text-center font-mono">${b.id}</td>
                            <td class="p-4 font-black text-indigo-900 text-left text-lg">${b.amount} د.ع</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
                <div class="mt-8 bg-indigo-900 text-white p-8 rounded-2xl flex justify-between items-center">
                    <span class="text-sm font-bold opacity-60">إجمالي الحساب المتبقي</span>
                    <span class="text-3xl font-black">${client.total.toLocaleString()} د.ع</span>
                </div>
            `;
        }

        function searchFunction() {
            let query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('[data-search]').forEach(card => {
                card.style.display = card.getAttribute('data-search').toLowerCase().includes(query) ? "block" : "none";
            });
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
    </script>
</body>
</html>
