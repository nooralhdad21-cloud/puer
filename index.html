<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتب بيور | فلتر كشف الشرقاط السريع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-blue-600">
            <div>
                <h1 class="text-2xl font-black text-blue-900">نظام فلترة الكشوفات</h1>
                <p id="locationDisplay" class="text-sm text-gray-500 font-bold italic">ارفع ملف (كشف الشرقاط) للبدء</p>
            </div>
            <input type="file" id="pdfFile" class="hidden" accept=".pdf">
            <button onclick="document.getElementById('pdfFile').click()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black hover:bg-blue-700 shadow-lg transition-all">رفع الكشف الآن</button>
        </div>

        <div id="filterBar" class="hidden flex flex-wrap gap-3 mb-6">
            <button onclick="filterType('all')" class="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold">الكل</button>
            <button onclick="filterType('صيدلية')" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold">الصيدليات فقط</button>
            <button onclick="filterType('مذخر')" class="bg-amber-500 text-white px-6 py-2 rounded-lg font-bold">المذاخر فقط</button>
            <div class="mr-auto bg-white px-4 py-2 rounded-lg border font-black text-blue-800" id="totalCount">إجمالي الديون: 0 د.ع</div>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let allData = [];

        document.getElementById('pdfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('locationDisplay').innerText = "جاري قراءة الملف وتصنيف الأسماء...";
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(this.result) }).promise;
                let textRows = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    textRows.push(...content.items.map(it => ({ str: it.str, y: Math.round(it.transform[5]) })));
                }
                processData(textRows);
            };
            reader.readAsArrayBuffer(file);
        });

        function processData(rows) {
            allData = [];
            let currentName = "";
            let city = "الشرقاط";

            rows.sort((a, b) => b.y - a.y);

            rows.forEach((item, index) => {
                let txt = item.str.trim();

                // استخراج الاسم وتصنيفه (صيدلية أو مذخر)
                if ((txt.includes("صيدلية") || txt.includes("مذخر") || txt.includes("مكتب")) && !txt.includes("بيور العلمي")) {
                    currentName = txt.replace(/الاسم|:|ѧ|متر|متخر|منخر/g, 'مذخر').trim();
                    if (!allData.find(d => d.name === currentName)) {
                        allData.push({ name: currentName, type: txt.includes("صيدلية") ? "صيدلية" : "مذخر", invoices: [], total: 0 });
                    }
                }

                // استخراج الفواتير والمبالغ المتبقية
                if (/^\d{5,6}$/.test(txt)) {
                    let amount = 0;
                    let row = rows.filter(r => Math.abs(r.y - item.y) < 10);
                    row.forEach(r => {
                        if (/^[\d,]+\.\d{2}$/.test(r.str)) amount = parseFloat(r.str.replace(/,/g, ''));
                    });

                    if (amount > 0 && currentName) {
                        let emp = allData.find(d => d.name === currentName);
                        if (emp && !emp.invoices.find(v => v.id === txt)) {
                            emp.invoices.push({ id: txt, amount: amount });
                            emp.total += amount;
                        }
                    }
                }
            });

            document.getElementById('locationDisplay').innerText = "تم استخراج البيانات لمدينة: الشرقاط / محافظة صلاح الدين";
            document.getElementById('filterBar').classList.remove('hidden');
            filterType('all');
        }

        function filterType(type) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = "";
            let grandTotal = 0;

            allData.forEach(item => {
                if (type === 'all' || item.type === type) {
                    grandTotal += item.total;
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-xl shadow-sm border-r-4 " + (item.type === 'صيدلية' ? 'border-emerald-500' : 'border-amber-500');
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[10px] font-bold px-2 py-1 rounded bg-gray-100 text-gray-500 mb-2 inline-block">${item.type.toUpperCase()}</span>
                                <h3 class="font-black text-slate-800">${item.name}</h3>
                                <p class="text-xs text-gray-400 mt-1 font-bold italic">عدد الفواتير: ${item.invoices.length}</p>
                            </div>
                            <div class="text-left">
                                <p class="text-lg font-black text-blue-700">${item.total.toLocaleString()} <span class="text-[10px]">د.ع</span></p>
                            </div>
                        </div>
                        <details class="mt-4 border-t pt-2">
                            <summary class="text-xs font-bold text-gray-400 cursor-pointer hover:text-blue-600">عرض تفاصيل الفواتير والمبالغ المتبقية...</summary>
                            <div class="mt-2 space-y-1">
                                ${item.invoices.map(v => `
                                    <div class="flex justify-between text-[11px] font-bold p-1 bg-gray-50 rounded">
                                        <span>فاتورة #${v.id}</span>
                                        <span class="text-slate-700">${v.amount.toLocaleString()}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </details>
                    `;
                    grid.appendChild(card);
                }
            });
            document.getElementById('totalCount').innerText = "إجمالي الديون: " + grandTotal.toLocaleString() + " د.ع";
        }
    </script>
</body>
</html>
