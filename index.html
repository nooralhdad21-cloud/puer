<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مطابقة مكتب بيور العلمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; }
        .glass-morphism { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-blue-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-blue-900 font-bold italic">P</div>
                <h1 class="text-lg font-bold tracking-tight">بيور العلمي <span class="text-blue-300 text-xs font-normal">Pure Science</span></h1>
            </div>
            <div id="userBadge" class="text-xs bg-blue-800 px-3 py-1 rounded-full border border-blue-700 hidden"></div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <section id="loginStep" class="mb-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-slate-800 font-bold mb-4 flex items-center gap-2">
                    <span>👤</span> تعريف الموظف المسؤول
                </h2>
                <input type="text" id="employeeName" placeholder="اكتب اسمك الثلاثي..." class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button onclick="saveEmployee()" class="w-full mt-3 bg-blue-600 text-white py-3 rounded-xl font-semibold shadow-md active:scale-95 transition-transform">حفظ والهوية</button>
            </div>
        </section>

        <section id="uploadStep" class="hidden mb-6">
            <div class="bg-blue-50 border-2 border-dashed border-blue-200 p-8 rounded-2xl text-center cursor-pointer hover:bg-blue-100 transition-colors relative">
                <input type="file" id="excelFile" class="absolute inset-0 opacity-0 cursor-pointer" accept=".xlsx, .xls">
                <div class="text-blue-600 text-4xl mb-2">📁</div>
                <p class="text-blue-800 font-medium">ارفع كشف المكتب (Excel)</p>
