<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مكتب بيور | معالج كشوفات أصيل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="max-w-6xl mx-auto p-8">
        <div class="bg-blue-800 text-white p-8 rounded-3xl shadow-lg mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black italic">PUREPHARMA SYSTEM</h1>
                <p class="text-blue-200 mt-2">نظام استخراج البيانات بناءً على الرقم الفريد (كشف الشرقاط)</p>
            </div>
            <div class="flex gap-4">
                <input type="file" id="pdfInput" class="hidden" accept=".pdf">
                <button onclick="document.getElementById('pdfInput').click()" class="bg-white text-blue-800 px-8 py-4 rounded-2xl font-black shadow-md hover:bg-blue-50 transition-all">رفع ملف الكشف (27 صفحة)</button>
            </div>
        </div>

        <div id="status" class="hidden mb-6 p-4 bg-yellow-100 border-r-4 border-yellow-500 text-yellow-800 font-bold animate-pulse text-center rounded-xl">جاري قراءة صفحات الملف واستخراج الأرقام الفريدة...</div>

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
            <table class="w-full text-right border-collapse">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="p-5 font-bold">رقم العميل (الفريد)</th>
                        <th class="p-5 font-bold">الاسم الخام من الملف (قابل للخطأ)</th>
                        <th class="p-5 font-bold text-center">عدد العمليات</th>
                        <th class="p-5 font-bold text-left">إجمالي المبلغ المتبقي</th>
                    </tr>
                </thead>
                <tbody id="resultTable" class="divide-y divide-gray-200 text-gray-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('status').classList.remove('hidden');
            const reader = new FileReader();

            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let store = {};

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const items = content.items;

                    let currentPageID = "";
                    let currentPageName = "اسم غير محدد";

                    // الخطوة 1: البحث عن الرقم الفريد والاسم في الصفحة
                    for (let j = 0; j < items.length; j++) {
                        let txt = items[j].str.trim();

                        // رادار الاسم الخام (يأخذه كما هو)
                        if (txt.includes("الاس م") || txt.includes("الاسم")) {
                            currentPageName = items[j+1] ? items[j+1].str : "غير واضح";
                        }

                        // رادار الرقم الفريد (4-5 أرقام)
                        let idMatch = txt.match(/\b\d{4,5}\b/);
                        if (idMatch && (txt.includes("رقم") || txt.includes("رق م"))) {
                            currentPageID = idMatch[0];
                            if (!store[currentPageID]) {
                                store[currentPageID] = { 
                                    id: currentPageID, 
                                    rawName: currentPageName, 
                                    total: 0, 
                                    count: 0 
                                };
                            }
                        }

                        // الخطوة 2: جمع المبالغ بناءً على الرقم الفريد المكتشف
                        if (currentPageID && /^[\d,]+\.\d{2}$/.test(txt)) {
                            let amount = parseFloat(txt.replace(/,/g, ''));
                            store[currentPageID].total += amount;
                            store[currentPageID].count++;
                        }
                    }
                }
                renderResults(store);
            };
            reader.readAsArrayBuffer(file);
        });

        function renderResults(store) {
            const table = document.getElementById('resultTable');
            const status = document.getElementById('status');
            table.innerHTML = "";
            status.classList.add('hidden');

            Object.values(store).forEach(client => {
                if (client.id) {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50 transition-colors";
                    tr.innerHTML = `
                        <td class="p-5 font-black text-blue-700">${client.id}</td>
                        <td class="p-5 font-bold text-gray-500 leading-relaxed">(${client.rawName})</td>
                        <td class="p-5 text-center font-bold text-slate-400">${client.count}</td>
                        <td class="p-5 text-left font-black text-emerald-600 text-lg">${client.total.toLocaleString()} د.ع</td>
                    `;
                    table.appendChild(tr);
                }
            });
        }
    </script>
</body>
</html>
