<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurePharma | نظام مكتب بيور العلمي</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .pharmacy-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e2e8f0; background: white; cursor: pointer; position: relative; overflow: hidden; }
        .pharmacy-card:hover { transform: translateY(-5px); border-color: #4f46e5; shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .checked-row { background-color: #f0fdf4 !important; text-decoration: line-through; opacity: 0.6; border-right: 4px solid #22c55e; }
        .loader-spin { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="bg-slate-900 text-white p-8 rounded-3xl shadow-xl mb-8 no-print flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-right">
                <h1 class="text-3xl font-black italic tracking-tighter text-indigo-400 uppercase">Pure Pharma System</h1>
                <p class="text-slate-400 font-bold mt-1 text-sm">نظام تحليل الكشوفات الموحد (تكريت، شرقاط، وغيرها)</p>
            </div>
            <div class="flex flex-col items-center">
                <input type="file" id="pdfUpload" class="hidden" accept=".pdf">
                <button onclick="document.getElementById('pdfUpload').click()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-4 rounded-2xl font-black shadow-lg transition-all active:scale-95 text-lg">
                    📁 ارفع ملف الكشف (PDF)
                </button>
                <div id="statusArea" class="hidden mt-4 flex items-center gap-3">
                    <div class="loader-spin"></div>
                    <span id="statusText" class="text-xs font-bold text-indigo-300">جاري المعالجة...</span>
                </div>
            </div>
        </div>

        <div class="no-print mb-8">
            <input type="text" id="searchInput" onkeyup="filterClients()" placeholder="بحث باسم الصيدلية أو رقم الحساب..." class="w-full p-5 rounded-2xl border-2 border-slate-200 focus:border-indigo-500 outline-none font-bold text-lg shadow-sm transition-all">
        </div>

        <div id="clientsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/80 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm no-print">
        <div class="bg-white rounded-[2.5rem] w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 font-bold text-2xl w-10 h-10">✕</button>
                <div class="flex gap-3">
                    <button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-black transition">Print</button>
                    <button id="whatsappShare" class="bg-green-600 text-white px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-green-700 transition">WhatsApp</button>
                </div>
            </div>
            <div id="modalBody" class="p-8 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        // إعداد مكتبة PDF.js
        const pdfJS = window['pdfjs-dist/build/pdf'];
        pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let mainStore = {};

        // دالة تنظيف وتصحيح نصوص ملفات "أصيل"
        function formatText(t) {
            return t.replace(/ѧ/g, '').replace(/([ا-ي])\s(?=[ا-ي])/g, '$1').trim();
        }

        document.getElementById('pdfUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const statusArea = document.getElementById('statusArea');
            statusArea.classList.remove('hidden');
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfJS.getDocument({data: arrayBuffer}).promise;
                mainStore = {};

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const textContent = content.items.map(s => s.str).join(' ');

                    // استخراج رقم الحساب والاسم باستخدام RegEx مرن
                    let idMatch = textContent.match(/(?:رقم|رق م|الحساب)[:\-\s]*(\d{2,6})/);
                    let nameMatch = textContent.match(/(?:الاسم|الاس م)[:\-\s]*(.*?)(?=رقم|رق م|الموبايل|العن)/);

                    if (idMatch) {
                        let id = idMatch[1];
                        let name = nameMatch ? formatText(nameMatch[1]) : "حساب: " + id;

                        if (!mainStore[id]) {
                            mainStore[id] = { id, name, bills: [], total: 0 };
                        }

                        // استخراج الفواتير (رقم، تاريخ، متبقي)
                        let billPattern = /(\d{5,8})\s+(\d{4}\/\d{1,2}\/\d{1,2})\s+([\d,]+\.\d{2})/g;
                        let m;
                        while ((m = billPattern.exec(textContent)) !== null) {
                            mainStore[id].bills.push({ id: m[1], date: m[2], amt: m[3] });
                            mainStore[id].total += parseFloat(m[3].replace(/,/g, ''));
                        }
                    }
                }
                renderClients();
            } catch (err) {
                alert("خطأ في قراءة الملف، تأكد أنه PDF صحيح.");
            }
            statusArea.classList.add('hidden');
        });

        function renderClients() {
            const grid = document.getElementById('clientsGrid');
            grid.innerHTML = "";
            Object.values(mainStore).forEach(c => {
                if (c.total > 0) {
                    grid.innerHTML += `
                    <div class="p-7 rounded-[2rem] pharmacy-card shadow-sm" onclick="openModal('${c.id}')" data-info="${c.name} ${c.id}">
                        <div class="text-[10px] font-black text-indigo-500 mb-2 uppercase italic tracking-widest">Client ID: ${c.id}</div>
                        <h3 class="text-xl font-black text-slate-800 leading-tight mb-6 h-12 overflow-hidden">${c.name}</h3>
                        <div class="flex justify-between items-center border-t border-slate-50 pt-5">
                            <span class="text-slate-400 text-[10px] font-bold uppercase italic">Balance Due</span>
                            <span class="text-indigo-600 font-black text-2xl tracking-tighter">${c.total.toLocaleString()} <small class="text-[10px]">د.ع</small></span>
                        </div>
                    </div>`;
                }
            });
        }

        function openModal(id) {
            const c = mainStore[id];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('whatsappShare').onclick = () => {
                let msg = `*مكتب بيور العلمي*%0A*كشف العميل:* ${c.name}%0A*الإجمالي المتبقي:* ${c.total.toLocaleString()} د.ع`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            };

            document.getElementById('modalBody').innerHTML = `
                <div class="text-right mb-8">
                    <h2 class="text-3xl font-black text-slate-900">${c.name}</h2>
                    <p class="text-indigo-500 font-bold italic">رقم الحساب الموحد: ${c.id}</p>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-right border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 border-b text-[10px] font-black uppercase">
                                <th class="p-4">تحديد</th>
                                <th class="p-4 text-center">رقم الفاتورة</th>
                                <th class="p-4 text-center">التاريخ</th>
                                <th class="p-4 text-left text-indigo-700">المبلغ</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${c.bills.map((b, i) => `
                            <tr id="row-${i}" class="hover:bg-indigo-50/30 transition-colors">
                                <td class="p-4"><input type="checkbox" onchange="document.getElementById('row-${i}').classList.toggle('checked-row', this.checked)" class="w-6 h-6 accent-indigo-600 cursor-pointer"></td>
                                <td class="p-4 font-black text-slate-700 font-mono text-center text-lg">${b.id}</td>
                                <td class="p-4 text-slate-400 text-center font-bold text-xs">${b.date}</td>
                                <td class="p-4 font-black text-indigo-900 text-left text-xl">${b.amt} <small class="text-xs">د.ع</small></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
                <div class="mt-8 bg-slate-900 text-white p-10 rounded-3xl flex justify-between items-center shadow-2xl border-b-8 border-indigo-500">
                    <div class="text-right">
                        <span class="text-indigo-400 font-black text-xs uppercase block mb-1 tracking-widest">Total Remaining</span>
                        <span class="text-lg font-bold opacity-70">إجمالي المبالغ غير المسددة</span>
                    </div>
                    <span class="text-4xl font-black text-indigo-400">${c.total.toLocaleString()} <small class="text-sm">IQD</small></span>
                </div>
            `;
        }

        function filterClients() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('[data-info]').forEach(card => {
                card.style.display = card.getAttribute('data-info').toLowerCase().includes(q) ? "block" : "none";
            });
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
