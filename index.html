<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Pharma | إدارة الحسابات والاستحصال</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100">

    <div class="max-w-7xl mx-auto p-4 md:p-10">
        <header class="main-header no-print">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-right">
                    <h1 class="text-4xl font-black text-indigo-600">PURE PHARMA</h1>
                    <p class="text-slate-500 font-bold mt-1">نظام الاستحصال والمحاسبة الذكي</p>
                </div>
                <div class="flex flex-col items-center">
                    <input type="file" id="pdfInput" class="hidden" accept=".pdf">
                    <button onclick="document.getElementById('pdfInput').click()" class="btn-main">
                        📂 رفع ملف الكشوفات
                    </button>
                    <div id="status" class="hidden mt-3 text-xs font-black animate-pulse text-indigo-500">جاري معالجة البيانات المحاسبية...</div>
                </div>
            </div>
        </header>

        <div class="no-print flex flex-col md:flex-row gap-4 mb-8">
            <input type="text" id="search" onkeyup="filterData()" placeholder="بحث باسم الصيدلية أو رقم الحساب..." class="search-bar">
            <button onclick="revealAll()" class="btn-secondary">إظهار العناصر المخفية 👁️</button>
        </div>

        <div id="outputGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <div id="detailsModal" class="modal-overlay hidden no-print">
        <div class="modal-content">
            <div class="modal-header">
                <button onclick="closeModal()" class="btn-close">✕</button>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="btn-print">طباعة كشف حساب</button>
                    <button id="whatsappLink" class="btn-whatsapp">واتساب</button>
                </div>
            </div>
            <div id="modalBody" class="p-6 md:p-10 overflow-y-auto"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
