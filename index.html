<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Pure Pharma | Smart Auditor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .bill-card { transition: all 0.3s ease; }
        .is-ignored { opacity: 0.4; filter: grayscale(0.5); }
        .search-highlight { border: 4px solid #6366f1 !important; transform: scale(1.02); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .status-btn { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.2s; cursor: pointer; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-5xl mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 no-print border-b-4 border-indigo-600 flex flex-wrap items-center gap-4">
            <div class="flex-1 min-w-[300px] relative">
                <input type="text" id="searchInput" oninput="runSearch()" placeholder="ابحث برقم الفاتورة أو اسم الصيدلية للمطابقة..." 
                       class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-500 outline-none font-bold">
                <span class="absolute left-4 top-4 text-slate-300 font-black">SEARCH</span>
            </div>
            <input type="file" id="pdfFile" class="hidden" accept=".pdf">
            <button onclick="document.getElementById('pdfFile').click()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg hover:bg-indigo-700">ارفع الملف</button>
        </div>

        <div id="resultsContainer" class="space-y-10">
            </div>
    </div>

    <script>
        const pdfJS = window['pdfjs-dist/build/pdf'];
        pdfJS.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let store = [];

        function clean(s) { return s.replace(/[ѧ\x00-\x1F\x7F-\x9F]/g, "").replace(/\s+/g, " ").trim(); }
        function parsePrice(s) { return parseFloat(s.replace(/,/g, '')) || 0; }

        document.getElementById('pdfFile').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            store = [];
            const buffer = await file.arrayBuffer();
            const pdf = await pdfJS.getDocument({data: buffer}).promise;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                const items = content.items.map(it => ({ text: clean(it.str), y: it.transform[5] }));
                
                items.sort((a,b) => b.y - a.y);
                let name = items.find(it => it.text.length > 10 && !it.text.includes("بيور"))?.text || "غير معروف";
                
                let bills = [];
                items.forEach((item, idx) => {
                    if (/\d{2}\/\d{2}\/\d{4}/.test(item.text)) {
                        let b = { id: "---", date: item.text, remain: "0.00", status: 'none', note: '' };
                        for (let n = -10; n <= 10; n++) {
                            let v = items[idx+n]?.text || "";
                            if (/^\d{5,7}$/.test(v)) b.id = v;
                            if (/^(\d{1,3}(,\d{3})*(\.\d{2}))$/.test(v)) b.remain = v;
                        }
                        bills.push(b);
                    }
                });
                store.push({ name, bills });
            }
            render();
        };

        function render(filteredData = store, searchTerm = "") {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = "";

            filteredData.forEach((shop, sIdx) => {
                let activeBills = shop.bills.filter(b => b.status === 'ok');
                let totalSafe = activeBills.reduce((acc, b) => acc + parsePrice(b.remain), 0);
                
                let billsHtml = shop.bills.map((b, bIdx) => {
                    const isMatched = searchTerm && (b.id.includes(searchTerm) || shop.name.includes(searchTerm));
                    return `
                    <div class="p-4 flex items-center justify-between bill-card ${b.status === 'warn' ? 'is-ignored' : ''} ${isMatched ? 'search-highlight rounded-xl' : ''}">
                        <div class="flex items-center gap-4">
                            <div class="flex gap-1 no-print">
                                <div onclick="updateStatus(${sIdx}, ${bIdx}, 'ok')" class="status-btn ${b.status === 'ok' ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-400'}">✓</div>
                                <div onclick="updateStatus(${sIdx}, ${bIdx}, 'warn')" class="status-btn ${b.status === 'warn' ? 'bg-orange-500 text-white' : 'bg-slate-100 text-slate-400'}">!</div>
                            </div>
                            <div>
                                <span class="text-sm font-black text-slate-700">#${b.id}</span>
                                <span class="text-[10px] text-slate-400 block">${b.date}</span>
                            </div>
                        </div>
                        <div class="text-left">
                            <span class="font-black ${b.status === 'ok' ? 'text-green-600' : 'text-slate-900'}">${b.remain}</span>
                            ${b.status === 'warn' ? `<input type="text" onchange="saveNote(${sIdx},${bIdx},this.value)" value="${b.note}" placeholder="سبب التعجب.." class="block mt-1 text-[10px] border-b border-orange-300 outline-none bg-transparent">` : ''}
                        </div>
                    </div>
                `}).join('');

                container.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
                        <div class="bg-slate-900 p-6 text-white flex justify-between items-end">
                            <div>
                                <p class="text-[10px] text-indigo-400 font-bold italic">Identity Match:</p>
                                <h2 class="text-xl font-black">${shop.name}</h2>
                            </div>
                            <div class="text-left">
                                <p class="text-[10px] opacity-50 font-bold">المجموع الصافي (✓)</p>
                                <p class="text-2xl font-black text-green-400">${totalSafe.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                            </div>
                        </div>
                        <div class="divide-y divide-slate-50">${billsHtml}</div>
                    </div>
                `;
            });
        }

        function updateStatus(sIdx, bIdx, status) {
            store[sIdx].bills[bIdx].status = (store[sIdx].bills[bIdx].status === status) ? 'none' : status;
            render();
        }

        function saveNote(sIdx, bIdx, note) {
            store[sIdx].bills[bIdx].note = note;
            render();
        }

        function runSearch() {
            const term = document.getElementById('searchInput').value.trim();
            if(!term) { render(store); return; }
            
            // فلترة لعرض الصيدلية التي تحتوي على الفاتورة المطلوبة فقط
            const filtered = store.filter(shop => 
                shop.name.includes(term) || shop.bills.some(b => b.id.includes(term))
            );
            render(filtered, term);
        }
    </script>
</body>
</html>
