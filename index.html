<!DOCTYPE html>

    <title>Pure Pharma | نظام المحاسبة والاستحصال</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .pharmacy-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e2e8f0; background: white; border-radius: 2rem; position: relative; }
        .pharmacy-card:hover { transform: translateY(-8px); border-color: #6366f1; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .hidden-node { display: none !important; }
        .checked-row { background-color: #f0fdf4 !important; opacity: 0.6; text-decoration: line-through; border-right: 4px solid #22c55e; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .modal-content { border: none !important; box-shadow: none !important; position: absolute; top: 0; width: 100%; }
        }
    </style>
</head>
